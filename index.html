@keyframes pieceInR{from{opacity:0;transform:translateX(36px)}to{opacity:1;transform:translateX(0)}}
@keyframes pieceOut{to{opacity:0;transform:scale(.7)}}

function areaName(id){var a=AREAS.find(function(x){return x.id===id;});return a?a.name:id||'';}

// 「年下」「年上」「近い年齢」などの希望が、実際の相手の年齢と合っているか判定する
// 「許容できる年齢の範囲」に、相手の実際の年齢が入っているか判定する
// 入力された年齢を、許された範囲(floor〜ceil)からはみ出さないように収める
// 下限は「初期値(自分の年齢-5)」より狭めさせない。20歳未満にもしない
function clampAgeMin(val,defaultMin){
  var n=parseInt(val);
  if(isNaN(n))return defaultMin;
  if(n>defaultMin)n=defaultMin; // これより狭める(数字を大きくする)のは禁止
  if(n<20)n=20;
  return n;
}
// 上限は「初期値(自分の年齢+5)」より狭めさせない。99歳より上にはしない
function clampAgeMax(val,defaultMax){
  var n=parseInt(val);
  if(isNaN(n))return defaultMax;
  if(n<defaultMax)n=defaultMax; // これより狭める(数字を小さくする)のは禁止
  if(n>99)n=99;
  return n;
}

function ageMatches(isAny,minAge,maxAge,otherAge){
  if(isAny)return true;
  if(otherAge==null||minAge==null||maxAge==null)return true;
  return otherAge>=minAge&&otherAge<=maxAge;
}

// ユーザーが入力した文字を画面にそのまま貼り付けても安全な形に変換する（チャット等のなりすまし・不正表示対策）
function escapeHtml(str){
  if(str==null)return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

  screen:'loading',user:null,profile:null,authTab:'register',

};

function render(){
  var map={loading:loadingH,splash:splashH,email:emailH,profile_new:profileNewH,profile_edit:profileEditH,area_select:areaSelectH,mode_select:modeSelectH,recruit:recruitH,waiting:waitH,matched:matchedH,chat:chatH,review:reviewH,cardregister:cardRegisterH,report:reportH,inquiry:inquiryH,terms:termsH,privacy:privacyH,newpassword:newPasswordH,forgot_password:forgotPasswordH,faqbot:faqBotH};

function go(sc){
  if(sc!=='chat'&&S._chatTimer){clearInterval(S._chatTimer);S._chatTimer=null;_sendingMsg=false;}
  S.screen=sc;S.error='';S.info='';
  sessionStorage.setItem('ngo_screen',sc);
  sessionStorage.setItem('ngo_form',JSON.stringify(S.form));
  sessionStorage.setItem('ngo_pf',JSON.stringify(S.pf));
  if(sc!=='cardregister'&&_payjpCardEl){try{_payjpCardEl.unmount();}catch(e){}_payjpCardEl=null;_payjpElements=null;}
  render();
  if(sc==='cardregister'){
    _payjpCardEl=null;_payjpElements=null;
    var tries=0;
    function tryMount(){var el=document.getElementById('payjp-card-el');if(el){mountPayjp();}else if(tries++<20){setTimeout(tryMount,100);}}
    setTimeout(tryMount,150);
  }
  if(sc==='splash'&&S.user){
    syncTicketCount();
  }
}

// トップ画面表示時にDBから最新のticket_countを取得し直す（表示はDBを基準に同期）
async function syncTicketCount(){
  if(!S.user)return;
  var res=await DB.from('profiles').select('ticket_count').eq('user_id',S.user.id).single();
  if(res.data&&S.profile&&S.profile.ticket_count!==res.data.ticket_count){
    S.profile.ticket_count=res.data.ticket_count;
    if(S.screen==='splash'){
      // render前にS.matchとS.registrationが生きているか確認してから描画
      render();
    }
  }
}
function re(sc){S.screen=sc;sessionStorage.setItem('ngo_screen',sc);sessionStorage.setItem('ngo_pf',JSON.stringify(S.pf));render();}

async function init(){
  try{
    var sc=supabase;
    DB=sc.createClient('https://dwubothomxjwfudkeepy.supabase.co','sb_publishable_vpUd5hulLV1-gI1wsAkgWA_hrB9ZOJ9');
    // ★追加：パスワード再設定メールのリンクから来た場合は専用画面を表示する
    if(window.location.hash&&window.location.hash.indexOf('type=recovery')!==-1){
      S.screen='newpassword';
      render();
      return;
    }
    var r=await Promise.race([DB.auth.getSession(),new Promise(function(res){setTimeout(function(){res({data:{session:null}});},5000);})]);
    var sess=r.data&&r.data.session;
    if(sess&&sess.user){S.user=sess.user;await loadProfile();routeAfterLoad();}
    else{go('splash');}
    loadStats();
    DB.auth.onAuthStateChange(function(event,session){
      if(event==='SIGNED_IN'&&session&&session.user&&!S.user){S.user=session.user;loadProfile();}
    });
  }catch(e){go('splash');}
}

async function doSignUp(){
  var email=document.getElementById('einp').value.trim();
  var pass=document.getElementById('pinp').value;
  if(!email||!pass){S.error='メールとパスワードを入力してください';re('email');return;}
  if(pass.length<6){S.error='パスワードは6文字以上です';re('email');return;}
  go('loading');
  var res=await DB.auth.signUp({email:email,password:pass});
  if(res.error){var r2=await DB.auth.signInWithPassword({email:email,password:pass});if(r2.error){S.error='登録に失敗しました';go('email');return;}S.user=r2.data.user;await loadProfile();routeAfterLoad();return;}
  if(res.data&&res.data.session){S.user=res.data.user;await loadProfile();routeAfterLoad();return;}
  if(res.data&&res.data.user){var r3=await DB.auth.signInWithPassword({email:email,password:pass});if(r3.error){S.error='ログインタブからサインインしてください';go('email');return;}S.user=r3.data.user;await loadProfile();routeAfterLoad();return;}
  S.error='登録に失敗しました';go('email');
}

async function doSignIn(){

async function loadProfile(){
  var res=await DB.from('profiles').select('*').eq('user_id',S.user.id).single();
  S.profile=res.data;
  if(!S.profile)return;

  // matched状態を確認してデータをセット（遷移はしない）
  var matchedReg=await DB.from('registrations').select('*').eq('user_id',S.user.id).eq('status','matched').order('created_at',{ascending:false}).limit(1).single();
  if(matchedReg.data&&matchedReg.data.match_id){
    S.registration=matchedReg.data;
    S.form={area:matchedReg.data.area_id,slot:matchedReg.data.slot,drink_style:matchedReg.data.drink_style,timing:matchedReg.data.timing,age_min:matchedReg.data.age_min,age_max:matchedReg.data.age_max,age_any:matchedReg.data.age_any};
    var m=await DB.from('matches').select('*').eq('id',matchedReg.data.match_id).single();
    if(m.data)S.match=m.data;
    await loadMatchMembers();
    return;
  }

  // waiting状態を確認してデータをセット（遷移はしない）
  var reg=await DB.from('registrations').select('*').eq('user_id',S.user.id).eq('status','waiting').order('created_at',{ascending:false}).limit(1).single();
  if(reg.data){
    S.registration=reg.data;
    S.form={area:reg.data.area_id,slot:reg.data.slot,drink_style:reg.data.drink_style,timing:reg.data.timing,age_min:reg.data.age_min,age_max:reg.data.age_max,age_any:reg.data.age_any};
  }
}

// 画面遷移の責務はここだけが持つ。loadProfileとは完全に分離
async function routeAfterLoad(){
  if(!S.profile){
    var lastScreen0=sessionStorage.getItem('ngo_screen');
    if(lastScreen0==='email'){
      go('email');
      return;
    }
    if(lastScreen0==='profile_new'&&S.user){
      var savedPf=sessionStorage.getItem('ngo_pf');
      if(savedPf){
        try{S.pf=JSON.parse(savedPf);}catch(e){S.pf={nickname:'',age:'',gender:null,job:null,smoke:null,alcohol:null};}
      }else{
        S.pf={nickname:'',age:'',gender:null,job:null,smoke:null,alcohol:null};
      }
      go('profile_new');
      return;
    }
    S.pf={nickname:'',age:'',gender:null,job:null,smoke:null,alcohol:null};
    go('splash');
    return;
  }
  if(!S.profile.stripe_customer_id){
    go('cardregister');
    return;
  }
  if(S.registration&&S.registration.status==='waiting'){
    startPolling();
    go('waiting');
    return;
  }
  if(S.match&&S.registration&&S.registration.status==='matched'){
    // 通報状態も同期しておく
    await syncReportStatus();
    // リロード前の画面をsessionStorageから復元
    var lastScreen=sessionStorage.getItem('ngo_screen');
    if(lastScreen==='chat'){
      await initChat();
      go('chat');
    }else if(lastScreen==='review'){
      go('review');
    }else if(lastScreen==='matched'){
      go('matched');
    }else if(lastScreen==='report'){
      var opponentR=S.matchMembers.find(function(m){return m.user_id!==S.user.id;});
      S._reportTargetUserId=opponentR?opponentR.user_id:null;
      go('report');
    }else{
      go('splash'); // matched状態はトップへ。マッチ継続カードで案内する
    }
    return;
  }
  // ★追加：マッチ中でも待機中でもない場合も、リロード前の画面と入力内容を復元する
  // ただし「アプリを閉じてしばらく経っている」場合は、募集内容はまっさらに戻す
  var lastScreen2=sessionStorage.getItem('ngo_screen');
  var restorable=['area_select','mode_select','recruit','profile_edit','terms','privacy','inquiry','faqbot','forgot_password'];
  var recruitFlowScreens=['area_select','mode_select','recruit'];
  var lastActive=parseInt(sessionStorage.getItem('ngo_last_active')||'0');
  var awayMs=Date.now()-lastActive;
  var wasAwayLong=lastActive>0&&awayMs>2*60*1000; // 2分以上離れていたら「閉じていた」とみなす
  if(lastScreen2&&recruitFlowScreens.indexOf(lastScreen2)!==-1&&wasAwayLong){
    // 長時間離れていた場合は募集の途中内容を捨てて、トップからやり直してもらう
    S.form={area:null,slot:null,drink_style:null,timing:null,age_min:null,age_max:null,age_any:false};
    go('splash');
    return;
  }
  if(lastScreen2&&restorable.indexOf(lastScreen2)!==-1){
    var savedForm=sessionStorage.getItem('ngo_form');
    if(savedForm){
      try{
        var parsed=JSON.parse(savedForm);
        S.form=Object.assign(S.form,parsed);
      }catch(e){}
    }
    if(lastScreen2==='profile_edit'){
      goProfileEdit();
    }else if(lastScreen2==='faqbot'){
      if(!S.faqMsgs||!S.faqMsgs.length){goFaqBot();}else{go('faqbot');}
    }else{
      go(lastScreen2);
    }
    return;
  }
  go('splash');
}

// 選んだ写真をSupabaseのストレージにアップロードし、公開URLを返す
async function uploadProfilePhoto(userId,file){
  if(!file)return null;
  var ext=(file.name&&file.name.split('.').pop())||'jpg';
  var path=userId+'/'+Date.now()+'.'+ext;
  var up=await DB.storage.from('avatars').upload(path,file,{upsert:true});
  if(up.error)return null;
  var pub=DB.storage.from('avatars').getPublicUrl(path);
  return pub.data&&pub.data.publicUrl?pub.data.publicUrl:null;
}

// カード登録専用（決済は行わない）。完了後はトップへ
async function confirmCardRegister(){
  var btn=document.getElementById('cardreg-btn');
  var errEl=document.getElementById('cardreg-err');
  // 二重登録防止：DB基準で既に登録済みならPAY.JPへのリクエストを行わず終了
  var alreadyRegistered=await isCardRegistered();
  if(alreadyRegistered){
    go('splash');
    return;
  }
  if(!_payjp||!_payjpCardEl){if(errEl)errEl.textContent='カードが読み込まれていません';return;}
  if(btn){btn.disabled=true;btn.textContent='処理中...';}
  try{
    var r=await _payjp.createToken(_payjpCardEl);
    if(r.error){if(errEl)errEl.textContent=r.error.message;if(btn){btn.disabled=false;btn.textContent='カードを登録する →';}return;}
    var regRes=await fetch('/api/charge',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({mode:'register_card',token:r.id,description:'Nomi Go ユーザー'})});
    var regData=await regRes.json();
    if(!regData.success){if(errEl)errEl.textContent=regData.error||'カード登録に失敗しました';if(btn){btn.disabled=false;btn.textContent='カードを登録する →';}return;}
    var custUpd=await DB.from('profiles').update({stripe_customer_id:regData.customer_id}).eq('user_id',S.user.id);
    if(custUpd.error){if(errEl)errEl.textContent='カード情報の保存に失敗しました: '+custUpd.error.message;if(btn){btn.disabled=false;btn.textContent='カードを登録する →';}return;}
    S.profile.stripe_customer_id=regData.customer_id;
    go('splash');
  }catch(e){if(errEl)errEl.textContent='エラー: '+e.message;if(btn){btn.disabled=false;btn.textContent='カードを登録する →';}}
}

// チケット購入：確認ダイアログ→保存済みcustomer_idで即決済
var _ticketPurchasing=false;

function buyTicketConfirm(){
  if(_ticketPurchasing)return;
  if(!S.profile||!S.profile.stripe_customer_id){
    // カード未登録 → メッセージ表示のみ（遷移なし）
    S.error='カードを登録してください';
    return;
  }
  if(confirm('チケットを購入しますか？\n登録済みのカードから\n3,000円（税込）を決済します。')){
    chargeForTicket(S.profile.stripe_customer_id);
  }
}

async function chargeForTicket(customerId){
  if(_ticketPurchasing)return;
  _ticketPurchasing=true;
  try{
    var res=await fetch('/api/charge',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({mode:'charge_customer',customer_id:customerId,amount:3000,description:'Nomi Go チケット購入'})});
    var data=await res.json();
    if(!data.success){
      S.error=data.error||'決済に失敗しました';
      _ticketPurchasing=false;
      return;
    }
    var current=await DB.from('profiles').select('ticket_count').eq('user_id',S.user.id).single();
    var newCount=(current.data&&current.data.ticket_count?current.data.ticket_count:0)+1;
    var upd=await DB.from('profiles').update({ticket_count:newCount}).eq('user_id',S.user.id).select().single();
    if(upd.error||!upd.data){
      S.error='チケット反映エラー: '+(upd.error?upd.error.message:'不明なエラー');
      _ticketPurchasing=false;
      return;
    }
    // ★修正：DB更新結果（upd.data）だけを使ってS.profileを更新する（二重取得を廃止）
    S.profile.ticket_count=upd.data.ticket_count;
    S.error='';
    S.ticketPurchaseSuccess=true;
    // ★修正：S.profile更新が終わった直後にだけrender()を実行
    render();

    // 4秒後にメッセージを消す（画面遷移なし）
    setTimeout(function(){S.ticketPurchaseSuccess=false;_ticketPurchasing=false;render();},4000);
  }catch(e){
    S.error='エラー: '+e.message;
    _ticketPurchasing=false;
  }
}

async function doRegister(){
  go('loading');
  // ★追加：万が一通信が返ってこなくても、10秒で強制的に諦めて画面を戻す(永久に固まるのを防ぐ)
  var timeoutFlag={hit:false};
  var timeoutId=setTimeout(function(){
    timeoutFlag.hit=true;
    _isSubmitting=false;
    S.error='通信に時間がかかっています。もう一度お試しください。';
    re('recruit');
  },10000);
  try{
    var existing=await DB.from('registrations').select('id').eq('user_id',S.user.id).eq('status','waiting').single();
    if(timeoutFlag.hit)return;
    if(existing.data){clearTimeout(timeoutId);_isSubmitting=false;S.registration=existing.data;startPolling();go('waiting');return;}
    var ins=await DB.from('registrations').insert({
      user_id:S.user.id,
      area_id:S.form.area,
      slot:S.form.slot,
      mode:S.form.mode||'1v1',
      gender:S.profile.gender,
      drink_style:S.form.drink_style,
      timing:'どちらでもOK',
      duration_pref:S.form.slot==='今すぐ'?(S.form.duration_pref||null):null,
      age_any:!!S.form.age_any,
      age_min:S.form.age_any?null:parseInt(S.form.age_min),
      age_max:S.form.age_any?null:parseInt(S.form.age_max),
      age:S.profile.age,
      smoke:S.profile.smoke,
      alcohol:S.profile.alcohol,
      partner_age:S.form.mode==='2v2'&&S.form.partner_age?parseInt(S.form.partner_age):null,
      payment_intent_id:S.chargeId||null,
      status:'waiting'
    }).select().single();
    if(timeoutFlag.hit)return;
    if(ins.error){clearTimeout(timeoutId);_isSubmitting=false;S.error='登録エラー: '+ins.error.message;re('recruit');return;}
    clearTimeout(timeoutId);
    S.registration=ins.data;
    var matched=await tryMatch();
    if(matched){go('matched');}else{startPolling();go('waiting');}
  }catch(e){clearTimeout(timeoutId);if(!timeoutFlag.hit){_isSubmitting=false;S.error='登録に失敗しました: '+e.message;re('recruit');}}
}

function dbgLog(msg){
  // 開発中の記録機能は本番では不要なため停止（呼び出し箇所自体は残るが何もしない）
}

async function tryMatch(){
  if(!S.registration){dbgLog('S0: registration=null');return false;}
  var p=S.profile;
  dbgLog('S1: area='+S.form.area+' slot='+S.form.slot+' timing='+S.form.timing);

  // 候補取得（同じ人数モードを希望している人だけを対象にする）
  var candidates=await DB.from('registrations').select('*').eq('status','waiting').eq('area_id',S.form.area).eq('mode',S.registration.mode||'1v1').neq('gender',p.gender).neq('user_id',S.user.id);
  dbgLog('S2: err='+(candidates.error?candidates.error.message:'なし')+' 件数='+(candidates.data?candidates.data.length:0));
  if(!candidates.data||candidates.data.length===0){return false;}

  // ★追加：飲みスタイルが同じ人 かつ お互いの希望年齢を満たす人だけに絞り込む
  var filtered=candidates.data.filter(function(c){
    if(c.drink_style!==S.form.drink_style)return false;
    var iWantThem=ageMatches(S.form.age_any,S.form.age_min?parseInt(S.form.age_min):null,S.form.age_max?parseInt(S.form.age_max):null,c.age);
    var theyWantMe=ageMatches(c.age_any,c.age_min,c.age_max,p.age);
    return iWantThem&&theyWantMe;
  });
  dbgLog('S3: filtered='+filtered.length);
  if(filtered.length===0){return false;}

  var best=filtered[0];
  var prof=await DB.from('profiles').select('*').eq('user_id',best.user_id).single();
  dbgLog('S4: prof='+(prof.data?prof.data.nickname:'null')+' err='+(prof.error?prof.error.message:'なし'));
  best.profileData=prof.data||{};

  if(!S.form.slot){dbgLog('S4x: slot=undefined abort');return false;}

  // ★レースコンディション対策：相手のregistrationをstatus='waiting'条件付きUPDATEで先に確保
  // status='waiting'の行だけを対象にすることで、他端末が先に確保した場合は更新件数が0になり処理を中断できる
  var lockOpponent=await DB.from('registrations').update({status:'processing'}).eq('id',best.id).eq('status','waiting').select().single();
  dbgLog('S4b: lock err='+(lockOpponent.error?lockOpponent.error.message:'なし')+' data='+(lockOpponent.data?'OK':'null'));
  if(lockOpponent.error||!lockOpponent.data){
    dbgLog('S4b: 他端末が先に確保済みのため中断');
    return false;
  }

  // matches作成
  var matchRes=await DB.from('matches').insert({
    area_id:S.form.area,
    slot:S.form.slot,
    mode:'1v1',
    timing:S.form.timing,
    status:'confirmed'
  }).select().single();
  dbgLog('S5: err='+(matchRes.error?matchRes.error.message:'なし')+' id='+(matchRes.data?matchRes.data.id.slice(0,8):'null'));
  if(matchRes.error){
    // matches作成失敗時は相手のregistrationをwaitingに戻す
    await DB.from('registrations').update({status:'waiting'}).eq('id',best.id);
    return false;
  }
  S.match=matchRes.data;

  // 自分と相手のregistrationをmatchedに更新
  var u1=await DB.from('registrations').update({status:'matched',match_id:matchRes.data.id}).eq('id',S.registration.id);
  var u2=await DB.from('registrations').update({status:'matched',match_id:matchRes.data.id}).eq('id',best.id);
  dbgLog('S6: u1='+(u1.error?u1.error.message:'OK')+' u2='+(u2.error?u2.error.message:'OK'));

  if(u1.error||u2.error)return false;

  // ★修正：DBだけでなくアプリ内のメモ(S.registration)もmatchedに更新する
  // これがないと「トップへ戻る」時に古い状態(waiting)のままと誤判定されてしまう
  S.registration.status='matched';
  S.registration.match_id=matchRes.data.id;

  // ★修正：チケット消費対象は「マッチした2人のうち男性」に固定する
  // p=自分のprofile、best.profileData=相手のprofile。どちらが男性かを判定してIDを渡す
  var maleUserId=(p.gender==='male')?S.user.id:best.user_id;
  await consumeTicket(matchRes.data.id,maleUserId);
  
  // ★重要：消費後に必ずstate同期
  await syncUserState();

  await loadMatchMembers();
  // ★重要：state更新後に描画
  render();
  return true;
}

async function consumeTicket(matchId,targetUserId){
  dbgLog('T0: consumeTicket呼び出し matchId='+matchId.slice(0,8));
  // 条件付き更新：ticket_consumed=falseの行だけを対象にすることで二重消費を防止（冪等性の担保）
  var lockRes=await DB.from('matches').update({ticket_consumed:true}).eq('id',matchId).eq('ticket_consumed',false).select().single();
  dbgLog('T1: lockRes err='+(lockRes.error?lockRes.error.message:'なし')+' data='+(lockRes.data?JSON.stringify(lockRes.data).slice(0,80):'null'));
  if(lockRes.error||!lockRes.data){
    dbgLog('T1x: 消費済みor対象なしのため中断');
    return;
  }
  // ★修正：S.user.id（操作した人）ではなく、渡された男性ユーザーIDを対象にする
  var current=await DB.from('profiles').select('ticket_count').eq('user_id',targetUserId).single();
  dbgLog('T2: current err='+(current.error?current.error.message:'なし')+' ticket_count='+(current.data?current.data.ticket_count:'null'));
  var oldCount=current.data&&current.data.ticket_count?current.data.ticket_count:0;
  var newCount=oldCount-1;
  if(newCount<0)newCount=0;
  // 読み取った時点のticket_countを条件に含めることで、その間に他の処理が値を変えていた場合の上書きを防ぐ
  var upd=await DB.from('profiles').update({ticket_count:newCount}).eq('user_id',targetUserId).eq('ticket_count',oldCount).select().single();
  dbgLog('T3: upd err='+(upd.error?upd.error.message:'なし')+' newCount='+(upd.data?upd.data.ticket_count:'null'));
  if(upd.error||!upd.data){
    dbgLog('T3x: DB更新失敗');
  }
  // ※ここではstate更新をしない（syncUserStateで後から行う）
}

function startPolling(){
  if(S.pollTimer)clearInterval(S.pollTimer);
  dbgLog('polling開始 reg='+(S.registration?S.registration.id.slice(0,8):'null'));
  S.pollTimer=setInterval(async function(){
    try{
      if(S.registration){
        var reg=await DB.from('registrations').select('status,match_id').eq('id',S.registration.id).single();
        if(reg.data&&reg.data.status==='matched'&&reg.data.match_id){
          clearInterval(S.pollTimer);
          var m=await DB.from('matches').select('*').eq('id',reg.data.match_id).single();
          if(m.data){
            // ★修正：DBだけでなくアプリ内のメモ(S.registration)もmatchedに更新する
            S.registration.status='matched';
            S.registration.match_id=reg.data.match_id;
            S.match=m.data;await loadMatchMembers();_isSubmitting=false;go('matched');return;
          }
        }
      }
      var matched=await tryMatch();
      if(matched){clearInterval(S.pollTimer);_isSubmitting=false;go('matched');}
      loadStats();
    }catch(e){}
  },8000);
}

// マッチ結果ステータスを一度だけ更新する（status='confirmed'の行のみ対象。二重送信・上書き防止）
async function setMatchResultOnce(matchId,newStatus,extraFields){
  if(!matchId)return false;
  var updateData=Object.assign({status:newStatus},extraFields||{});
  var res=await DB.from('matches').update(updateData).eq('id',matchId).eq('status','confirmed').select().single();
  if(res.error||!res.data){
    return false;
  }
  return true;
}

// 自分の回答をresult_a or result_bに保存し、双方揃ったらverdictを判定する
async function saveUserResult(matchId,userResult){
  if(!matchId||!S.user)return;
  // 現在のmatchを取得（statusに関係なく取得）
  var cur=await DB.from('matches').select('*').eq('id',matchId).single();
  if(cur.error||!cur.data)return;
  var m=cur.data;
  var updateData={};
  var otherResult=null;

  if(!m.result_a_user_id){
    // 誰も記録していない→自分がAスロットに記録
    updateData.result_a=userResult;
    updateData.result_a_user_id=S.user.id;
    otherResult=null; // まだ相手は未回答
  }else if(m.result_a_user_id===S.user.id){
    // 自分はすでにAスロット記録済み→何もしない
    return;
  }else if(!m.result_b_user_id){
    // 相手がAスロット記録済み→自分はBスロットに記録
    updateData.result_b=userResult;
    updateData.result_b_user_id=S.user.id;
    otherResult=m.result_a;
  }else if(m.result_b_user_id===S.user.id){
    // 自分はすでにBスロット記録済み→何もしない
    return;
  }else{
    return;
  }

  // 双方の回答が揃った場合はverdictを判定
  if(otherResult){
    var myResult=userResult;
    var theirResult=otherResult;
    if(myResult==='completed'&&theirResult==='completed'){
      updateData.verdict='normal';
    }else if(myResult==='cancelled'&&theirResult==='cancelled'){
      updateData.verdict='both_cancelled';
    }else{
      updateData.verdict='needs_review';
    }
  }

  if(Object.keys(updateData).length>0){
    await DB.from('matches').update(updateData).eq('id',matchId);
  }
}

// ④ メッセージをidベースで重複判定して反映する共通処理
function applyMessages(data){
  var sys=[{type:'system',id:'sys-0',content:'マッチング成立！チャットが作成されました'}];
  if(S.match.ticket_consumed&&S.profile&&S.profile.gender==='male'){
    sys.push({type:'system',id:'sys-1',content:'🎫 チケットを1枚使用しました'});
  }
  var msgs=data.map(function(m){
    var nick='?';
    if(m.user_id===S.user.id&&S.profile){nick=S.profile.nickname;}
    else{var mm=S.matchMembers.find(function(x){return x.user_id===m.user_id;});if(mm&&mm.profiles)nick=mm.profiles.nickname||'?';}
    return {id:m.id,user_id:m.user_id,content:m.content,mine:m.user_id===S.user.id,nickname:nick};
  });
  var newMsgs=sys.concat(msgs);
  // idベースで重複判定（件数比較だけだと内容変化を検知できないため）
  var currentIds=S.chatMsgs.map(function(m){return m.id;}).join(',');
  var newIds=newMsgs.map(function(m){return m.id;}).join(',');
  if(currentIds!==newIds){
    S.chatMsgs=newMsgs;
    if(S.screen==='chat'){
      render();
      setTimeout(function(){var el=document.querySelector('.chat-msgs');if(el)el.scrollTop=el.scrollHeight;},50);
    }
  }
}

// 評価送信の確認ダイアログ用（submitReview()自体は変更しない）
var _reviewSubmitting=false;

// 星を押した時に呼ぶ。2個以下⇔3個以上でタグの種類が変わるため、切り替わったら選択をリセットする
function setReviewStars(n){
  var wasLow=S.reviewStars>0&&S.reviewStars<=2;
  var isLow=n<=2;
  if(wasLow!==isLow){
    S.reviewChecks=REVIEW_TAGS.map(function(){return false;});
    S.reviewOtherText='';
  }
  S.reviewStars=n;
  re('review');
}

function confirmSubmitReview(){
  if(_reviewSubmitting)return;
  if(!S.match||S.reviewStars===0)return;
  var anyTagSelected=S.reviewChecks.some(function(c){return c;});
  if(!anyTagSelected){alert('評価タグを1つ以上選んでください');return;}
  // ★修正：「その他」を選んでいる場合は、文字が入力されているか確認する
  var isLowNow=S.reviewStars>0&&S.reviewStars<=2;
  var checksNow=isLowNow?REVIEW_TAGS_LOW:REVIEW_TAGS;
  var otherIdxNow=checksNow.length-1;
  if(S.reviewChecks[otherIdxNow]&&(!S.reviewOtherText||!S.reviewOtherText.trim())){
    alert('「その他」を選んだ場合は内容を入力してください');
    return;
  }
  if(!confirm('評価を送信しますか？\nこの操作は送信後に変更できません。'))return;
  _reviewSubmitting=true;
  re('review');
  submitReview().catch(function(){}).finally(function(){_reviewSubmitting=false;});
}

async function submitReview(){
  if(!S.match||S.reviewStars===0)return;
  var matchId=S.match.id;
  var targets=S.matchMembers.filter(function(m){return m.user_id!==S.user.id;});
  for(var i=0;i<targets.length;i++){
    // 選ばれたタグの名前だけを配列にまとめる（新しい保存場所：review_tags）
    // ★修正：星2以下は低評価用タグ、星3以上は通常タグから正しい名前を選ぶ
    var tagSource=(S.reviewStars>0&&S.reviewStars<=2)?REVIEW_TAGS_LOW:REVIEW_TAGS;
    var otherIdxSubmit=tagSource.length-1;
    var selectedTags=S.reviewChecks.map(function(checked,idx){
      if(!checked)return null;
      // 「その他」が選ばれていて文字が入力されていれば、その文字を保存する
      if(idx===otherIdxSubmit&&S.reviewOtherText&&S.reviewOtherText.trim()){
        return S.reviewOtherText.trim();
      }
      return tagSource[idx];
    }).filter(function(t){return t!==null;});
    // ★修正：古い3項目(tag_punctual等)は「良い評価」の意味専用の場所。悪い評価の時はここには入れない(false固定)
    var isLowNow2=S.reviewStars>0&&S.reviewStars<=2;
    var legacyPunctual=isLowNow2?false:S.reviewChecks[0];
    var legacyFriendly=isLowNow2?false:S.reviewChecks[1];
    var legacyAgain=isLowNow2?false:S.reviewChecks[2];
    await DB.from('reviews').insert({match_id:matchId,reviewer_id:S.user.id,reviewee_id:targets[i].user_id,stars:S.reviewStars,tag_punctual:legacyPunctual,tag_friendly:legacyFriendly,tag_again:legacyAgain,review_tags:selectedTags});
  }
  await setMatchResultOnce(matchId,'completed',{completed_at:new Date().toISOString()});
  await saveUserResult(matchId,'completed');
  if(S.registration)await DB.from('registrations').update({status:'completed'}).eq('id',S.registration.id);
  S.registration=null;S.match=null;S.matchMembers=[];S.form={area:null,slot:null,drink_style:null,timing:null,age_min:null,age_max:null,age_any:false};_isSubmitting=false;
  S.reviewStars=0;S.reviewChecks=[false,false,false];S.reviewOtherText='';S.chatMsgs=[];S.chargeId=null;go('splash');
}

// パスワード再設定メールを送信する（Supabaseの標準機能を利用）
async function sendPasswordReset(){
  var email=document.getElementById('fp-einp').value.trim();
  if(!email){S.error='メールアドレスを入力してください';S.info='';re('forgot_password');return;}
  S.error='';
  var res=await DB.auth.resetPasswordForEmail(email,{redirectTo:window.location.origin});
  if(res.error){S.error='送信に失敗しました: '+res.error.message;re('forgot_password');return;}
  S.info='再設定用のメールを送りました。メール内のリンクを開いてください。';
  re('forgot_password');
}

// メール内のリンクから戻ってきた時（パスワード再設定モード）に新しいパスワードを保存する
async function saveNewPassword(){
  var pass=document.getElementById('newpass-inp').value;
  var errEl=document.getElementById('newpass-err');
  if(!pass||pass.length<6){if(errEl)errEl.textContent='パスワードは6文字以上です';return;}
  var res=await DB.auth.updateUser({password:pass});
  if(res.error){if(errEl)errEl.textContent='エラー: '+res.error.message;return;}
  alert('パスワードを変更しました。もう一度ログインしてください。');
  await DB.auth.signOut();
  S.user=null;S.profile=null;
  go('splash');
}

function newPasswordH(){

}

// プロフィール編集の保存（新規登録のsaveProfile()とは別の関数。既存の登録処理には触れない）
async function saveProfileEdit(){
  var p=S.pf;
  if(!p.nickname||!p.age||!p.gender||!p.job||p.smoke===null||p.alcohol===null){S.error='すべての項目を入力してください';re('profile_edit');return;}
  go('loading');
  var photoUrl=S.profile.photo_url;
  if(p.photoFile){
    var uploaded=await uploadProfilePhoto(S.user.id,p.photoFile);
    if(uploaded)photoUrl=uploaded;
  }
  var upd=await DB.from('profiles').update({nickname:p.nickname,age:parseInt(p.age),gender:p.gender,job:p.job,smoke:p.smoke,alcohol:p.alcohol,photo_url:photoUrl,updated_at:new Date().toISOString()}).eq('user_id',S.user.id);
  if(upd.error){S.error='保存に失敗しました: '+upd.error.message;re('profile_edit');return;}
  S.profile.nickname=p.nickname;S.profile.age=parseInt(p.age);S.profile.gender=p.gender;S.profile.job=p.job;S.profile.smoke=p.smoke;S.profile.alcohol=p.alcohol;S.profile.photo_url=photoUrl;
  go('splash');
}

async function goSplashFromMatched(){
  if(S.match&&S.matchMembers.length===0){
    await loadMatchMembers();
  }
  await syncReportStatus();
  // await中に他の非同期処理がS.match/S.registrationを上書きする可能性があるため
  // go('splash')直前に値を確認してから遷移する
  var savedMatch=S.match;
  var savedReg=S.registration;
  var savedMembers=S.matchMembers.slice();
  go('splash');
  // goが呼ぶrenderの後に確実に値が残っているよう再セット
  if(savedMatch&&savedReg&&savedReg.status==='matched'){
    S.match=savedMatch;
    S.registration=savedReg;
    S.matchMembers=savedMembers;
    render();
  }
}

  var otherOk=!S.reviewChecks[otherIdx]||(S.reviewOtherText&&S.reviewOtherText.trim().length>0);

// 「その他」の文字入力のたびに、送信ボタンの押せる/押せないだけを直接書き換える（画面全体は再描画しない）
// 「もう1人の年齢」を1文字打つたびに、画面全体は再描画せずボタンの押せる/押せないだけ直接書き換える
function updateRecruitSubmitBtn(){
  var btn=document.getElementById('recruit-submit-btn');
  if(!btn)return;
  var f=S.form;
  var isPair=f.mode==='2v2';
  var allOk=f.area&&f.slot&&f.drink_style&&(!isPair||f.partner_age);
  btn.disabled=!(allOk&&!_isSubmitting);
}

function updateReviewSubmitBtn(){
  var btn=document.getElementById('review-submit-btn');
  if(!btn)return;
  var isLow=S.reviewStars>0&&S.reviewStars<=2;
  var checks=isLow?REVIEW_TAGS_LOW:REVIEW_TAGS;
  var otherIdx=checks.length-1;
  var anyTagSelected=S.reviewChecks.some(function(c){return c;});
  var otherOk=!S.reviewChecks[otherIdx]||(S.reviewOtherText&&S.reviewOtherText.trim().length>0);
  var canSubmit=S.reviewStars>0&&anyTagSelected&&otherOk&&!_reviewSubmitting;
  btn.disabled=!canSubmit;
}

// FAQチャットボット：ユーザーの発言にキーワードが含まれていれば対応する答えを返す
function goFaqBot(){
  S.faqMsgs=[{type:'bot',content:'こんにちは！よくある質問にお答えします。気になることを聞いてみてください。'}];
  go('faqbot');
}

function findFaqAnswer(text){
  for(var i=0;i<FAQ_QA.length;i++){
    var kws=FAQ_QA[i].keywords;
    for(var j=0;j<kws.length;j++){
      if(text.indexOf(kws[j])!==-1)return FAQ_QA[i].answer;
    }
  }
  return null;
}

function sendFaqMsg(){
  var inp=document.getElementById('faq-input');
  var txt=inp?inp.value.trim():'';
  if(!txt)return;
  inp.value='';
  S.faqMsgs.push({type:'user',content:txt});
  var answer=findFaqAnswer(txt);
  if(answer){
    S.faqMsgs.push({type:'bot',content:answer});
  }else{
    S.faqMsgs.push({type:'bot',content:'申し訳ありません、うまくお答えできませんでした。',showInquiryBtn:true});
    // 答えられなかった質問を記録しておく(次に追加すべき質問がわかるように)
    DB.from('faq_misses').insert({user_id:S.user?S.user.id:null,question:txt}).then(function(){}).catch(function(){});
  }
  re('faqbot');
  setTimeout(function(){var el=document.querySelector('.chat-msgs');if(el)el.scrollTop=el.scrollHeight;},50);
}

// ボタンをタップした時、そのまま質問を送ったのと同じ扱いにする
function tapFaqQuestion(label,answer){
  S.faqMsgs.push({type:'user',content:label});
  S.faqMsgs.push({type:'bot',content:answer});
  re('faqbot');
  setTimeout(function(){var el=document.querySelector('.chat-msgs');if(el)el.scrollTop=el.scrollHeight;},50);
}

function faqBotH(){
  var msgsHtml=(S.faqMsgs||[]).map(function(m){

    var inquiryBtn=m.showInquiryBtn?'<button style="margin-top:8px;padding:8px 14px;border-radius:20px;border:1.5px solid var(--wine);background:transparent;color:var(--wine);font-family:inherit;font-size:12px;font-weight:700;cursor:pointer" onclick="go(\'inquiry\')">お問い合わせはこちら →</button>':'';
