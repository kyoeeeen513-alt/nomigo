<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Nomi Go</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://js.pay.jp/v2/pay.js"></script>
<style>
:root{--hero:#7A2230;--bg:#241318;--surface:#301A20;--card:#3D2028;--border:#5C2C36;--border2:#4A232C;--wine:#D14E62;--wine-bg:rgba(209,78,98,.2);--cream:#F5ECE7;--muted:#B08E8E;--lgray:#6A4A50;--gold:#E0B060;--gold-bg:rgba(224,176,96,.16);--green:#5AAA70;--red:#E05555;--red-bg:rgba(224,85,85,.13);}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#0A0507;font-family:-apple-system,'Hiragino Sans','Yu Gothic UI',sans-serif;color:var(--cream)}
#app{min-height:100%;max-width:430px;margin:0 auto;background:var(--bg);display:flex;flex-direction:column}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes pop{0%{transform:scale(.88);opacity:0}60%{transform:scale(1.04)}100%{transform:scale(1);opacity:1}}
@keyframes pieceInL{from{opacity:0;transform:translateX(-36px)}to{opacity:1;transform:translateX(0)}}
@keyframes pieceInR{from{opacity:0;transform:translateX(36px)}to{opacity:1;transform:translateX(0)}}
@keyframes pieceOut{to{opacity:0;transform:scale(.7)}}
@keyframes beerIn{from{opacity:0;transform:scale(.4) rotate(-10deg)}to{opacity:1;transform:scale(1) rotate(0)}}
@keyframes sparkleFade{0%{opacity:0;transform:scale(.5)}40%{opacity:1;transform:scale(1.1)}100%{opacity:0;transform:scale(1.4)}}
.intro-anim{position:relative;height:64px;display:flex;align-items:center;justify-content:center;margin-bottom:8px}
.intro-piece{position:absolute;font-size:34px;animation-fill-mode:forwards;opacity:0}
.intro-piece-l{animation:pieceInL .5s ease forwards,pieceOut .35s ease forwards;animation-delay:0s,.85s;transform:translateX(-8px)}
.intro-piece-r{animation:pieceInR .5s ease forwards,pieceOut .35s ease forwards;animation-delay:0s,.85s;transform:translateX(8px)}
.intro-beer{position:absolute;font-size:38px;opacity:0;animation:beerIn .45s ease forwards;animation-delay:1.05s}
.intro-sparkle{position:absolute;font-size:20px;opacity:0;animation:sparkleFade 1s ease forwards;animation-delay:1.2s}
@keyframes spin{to{transform:rotate(360deg)}}
.screen{flex:1;display:flex;flex-direction:column;animation:fadeUp .28s ease both}
.hdr{padding:16px 20px;border-bottom:1px solid var(--border2);flex-shrink:0;background:var(--bg);display:flex;align-items:center;gap:12px}
.hdr-back{background:transparent;border:none;cursor:pointer;font-family:inherit;font-size:13px;color:var(--muted);padding:4px 0;font-weight:600;flex-shrink:0}
.hdr-info{flex:1}
.hdr-step{font-size:10px;font-weight:700;color:var(--wine);letter-spacing:.12em;margin-bottom:2px}
.hdr-title{font-size:20px;font-weight:800;letter-spacing:-.02em}
.body{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.body::-webkit-scrollbar{width:0}
.ftr{padding:14px 20px 28px;flex-shrink:0;border-top:1px solid var(--border2);background:var(--bg)}
.btn{display:flex;align-items:center;justify-content:center;border:none;cursor:pointer;font-family:inherit;font-weight:800;border-radius:10px;transition:all .15s;font-size:16px;padding:15px 20px;width:100%;letter-spacing:.01em}
.btn-wine{background:var(--wine);color:#fff}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.inp{width:100%;padding:13px 14px;border-radius:10px;border:1.5px solid var(--border);background:var(--card);color:var(--cream);font-family:inherit;font-size:16px;outline:none;transition:border-color .15s}
.inp::placeholder{color:var(--muted)}
.inp:focus{border-color:var(--wine)}
.sel-btn{flex:1;padding:14px 8px;border-radius:12px;border:1.5px solid var(--border);background:var(--card);color:var(--muted);font-family:inherit;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;transition:all .18s;font-size:13px;font-weight:700}
.sel-btn.on{border-color:var(--wine);background:var(--wine-bg);color:var(--cream)}
.choice-btn{width:100%;padding:14px 16px;border-radius:10px;border:1.5px solid var(--border);background:var(--card);color:var(--muted);font-family:inherit;cursor:pointer;text-align:left;font-size:14px;font-weight:600;transition:all .18s;display:flex;align-items:center;justify-content:space-between}
.choice-btn.on{border-color:var(--wine);background:var(--wine-bg);color:var(--cream)}
.sec-label{font-size:10px;font-weight:700;color:var(--wine);letter-spacing:.14em;padding:16px 20px 8px}
.err-msg{font-size:12px;color:var(--red);padding:4px 0;text-align:center}
.loading{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--wine);border-radius:50%;animation:spin 1s linear infinite}
.drow{display:flex;align-items:center;justify-content:space-between;padding:13px 20px;border-bottom:1px solid var(--border2)}
.drow-k{font-size:13px;color:var(--muted)}
.drow-v{font-size:14px;font-weight:700}
.match-wrap{flex:1;display:flex;flex-direction:column;overflow-y:auto;padding:0 0 40px}
.member-row{display:flex;align-items:center;gap:12px;padding:13px 20px;border-bottom:1px solid var(--border2)}
.chat-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden}
.chat-msgs{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:12px}
.chat-msgs::-webkit-scrollbar{width:0}
.msg-system{text-align:center;font-size:11px;color:var(--muted);padding:7px 14px;background:var(--surface);border-radius:20px;align-self:center}
.msg-row{display:flex;gap:10px;align-items:flex-end}
.msg-row.mine{flex-direction:row-reverse}
.msg-av{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.msg-bubble{padding:10px 13px;border-radius:14px;font-size:14px;max-width:200px;line-height:1.5}
.chat-input{padding:12px 16px;border-top:1px solid var(--border2);display:flex;gap:10px;background:var(--bg);flex-shrink:0}
.chat-inp{flex:1;padding:11px 14px;border-radius:24px;border:1.5px solid var(--border);background:var(--card);color:var(--cream);font-family:inherit;font-size:15px;outline:none}
.chat-inp:focus{border-color:var(--wine)}
.chat-send{width:42px;height:42px;border-radius:50%;background:var(--wine);border:none;cursor:pointer;color:#fff;font-size:18px;flex-shrink:0}
.star-btn{font-size:32px;cursor:pointer;background:none;border:none;padding:4px}
.check-item{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:10px;background:var(--card);border:1.5px solid var(--border);cursor:pointer;transition:all .15s;width:100%;font-family:inherit;text-align:left}
.check-item.on{border-color:var(--wine);background:var(--wine-bg)}
.tag-chip{display:inline-flex;align-items:center;padding:9px 16px;border-radius:999px;background:var(--card);border:1.5px solid var(--border);cursor:pointer;transition:all .15s;font-family:inherit;font-size:13px;font-weight:700;color:var(--muted)}
.tag-chip.on{border-color:var(--wine);background:var(--wine);color:#fff}
.tab-btn{flex:1;padding:11px;border:none;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s}
.range-row{display:flex;gap:6px;padding:0 20px}
.range-btn{flex:1;padding:10px 4px;border-radius:8px;border:1.5px solid var(--border);background:var(--card);color:var(--muted);font-family:inherit;cursor:pointer;font-size:11px;font-weight:700;text-align:center;transition:all .18s}
.range-btn.on{border-color:var(--wine);background:var(--wine-bg);color:var(--cream)}
.mode-card{position:relative;border-radius:16px;overflow:hidden;cursor:pointer;border:2px solid var(--border);transition:all .18s}
.mode-card:active{transform:scale(.98)}
.mode-card img{width:100%;height:180px;object-fit:cover;object-position:center;display:block}
.mode-card-square img{object-position:center 25%}
.mode-card-label{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.8));padding:18px 16px 14px}
.mode-card-title{font-size:17px;font-weight:900;color:#fff}
</style>
</head>
<body>
<div id="app"><div class="loading"><div class="spinner"></div></div></div>
<script>
var _payjp=null,_payjpElements=null,_payjpCardEl=null;
var _sbReady=false;
var DB;

const AREAS=[
  {id:'umeda',name:'梅田'},
  {id:'shinjuku',name:'新宿'},
  {id:'shibuya',name:'渋谷'},
  {id:'ueno',name:'上野'}
];
const JOBS=['会社員','自営業・フリーランス','学生','公務員','医療・福祉','IT・エンジニア','クリエイター','サービス業','その他'];
const DRINK_STYLES=['ガッツリ飲みたい','ゆっくり飲みたい','ご飯メイン'];
const TIMINGS=['一次会','二次会','どちらでもOK'];
const AGE_PREFS=['年下','近い年齢','年上','年齢問わない','おまかせ'];
const SLOTS=['今すぐ','19:00','20:00','21:00','22:00'];
const REVIEW_TAGS=['時間を守った','話しやすかった','また飲みたい','礼儀正しかった','優しかった','聞き上手だった','盛り上げ上手だった','写真通りだった','その他'];
const REVIEW_TAGS_LOW=['時間を守らなかった','話しにくかった','もう会いたくない','礼儀が良くなかった','冷たい態度だった','会話が弾まなかった','場を盛り下げた','写真と印象が違った','その他'];
const ALCOHOL_LEVELS=['とても弱い','弱い','普通','強い','とても強い'];

function areaName(id){var a=AREAS.find(function(x){return x.id===id;});return a?a.name:id||'';}

// ユーザーが入力した文字を画面にそのまま貼り付けても安全な形に変換する（チャット等のなりすまし・不正表示対策）
function escapeHtml(str){
  if(str==null)return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

var _isSubmitting=false;
var S={
  screen:'loading',user:null,profile:null,authTab:'register',
  form:{area:null,slot:null,drink_style:null,timing:null,age_pref:null},
  registration:null,match:null,matchMembers:[],
  chatMsgs:[],reviewStars:0,reviewChecks:[false,false,false],
  stats:{active:0,todayMatches:0},
  error:'',info:'',pollTimer:null,chargeId:null,
  pf:{nickname:'',age:'',gender:null,job:null,smoke:null,alcohol:null}
};

function render(){
  var map={loading:loadingH,splash:splashH,email:emailH,profile_new:profileNewH,profile_edit:profileEditH,mode_select:modeSelectH,recruit:recruitH,waiting:waitH,matched:matchedH,chat:chatH,review:reviewH,cardregister:cardRegisterH,report:reportH,inquiry:inquiryH,terms:termsH,privacy:privacyH,newpassword:newPasswordH,forgot_password:forgotPasswordH};
  document.getElementById('app').innerHTML=(map[S.screen]||loadingH)();
}

function go(sc){
  if(sc!=='chat'&&S._chatTimer){clearInterval(S._chatTimer);S._chatTimer=null;_sendingMsg=false;}
  S.screen=sc;S.error='';S.info='';
  sessionStorage.setItem('ngo_screen',sc);
  sessionStorage.setItem('ngo_form',JSON.stringify(S.form));
  if(sc!=='cardregister'&&_payjpCardEl){try{_payjpCardEl.unmount();}catch(e){}_payjpCardEl=null;_payjpElements=null;}
  render();
  if(sc==='cardregister'){
    _payjpCardEl=null;_payjpElements=null;
    var tries=0;
    function tryMount(){var el=document.getElementById('payjp-card-el');if(el){mountPayjp();}else if(tries++<20){setTimeout(tryMount,100);}}
    setTimeout(tryMount,150);
  }
  if(sc==='splash'&&S.user){
    syncTicketCount();
  }
}

// トップ画面表示時にDBから最新のticket_countを取得し直す（表示はDBを基準に同期）
async function syncTicketCount(){
  if(!S.user)return;
  var res=await DB.from('profiles').select('ticket_count').eq('user_id',S.user.id).single();
  if(res.data&&S.profile&&S.profile.ticket_count!==res.data.ticket_count){
    S.profile.ticket_count=res.data.ticket_count;
    if(S.screen==='splash'){
      // render前にS.matchとS.registrationが生きているか確認してから描画
      render();
    }
  }
}
function re(sc){S.screen=sc;render();}

function mountPayjp(){
  if(_payjpCardEl)return;
  var el=document.getElementById('payjp-card-el');
  if(!el)return;
  if(!_payjp)_payjp=Payjp('pk_test_5d6152d2f055a7440fccb417');
  _payjpElements=_payjp.elements();
  var style={base:{color:'#EDE5E0',fontSize:'16px','::placeholder':{color:'#9A8080'}},invalid:{color:'#CC4040'}};
  _payjpCardEl=_payjpElements.create('card',{style:style});
  _payjpCardEl.mount('#payjp-card-el');
}

async function init(){
  try{
    var sc=supabase;
    DB=sc.createClient('https://dwubothomxjwfudkeepy.supabase.co','sb_publishable_vpUd5hulLV1-gI1wsAkgWA_hrB9ZOJ9');
    // ★追加：パスワード再設定メールのリンクから来た場合は専用画面を表示する
    if(window.location.hash&&window.location.hash.indexOf('type=recovery')!==-1){
      S.screen='newpassword';
      render();
      return;
    }
    var r=await Promise.race([DB.auth.getSession(),new Promise(function(res){setTimeout(function(){res({data:{session:null}});},5000);})]);
    var sess=r.data&&r.data.session;
    if(sess&&sess.user){S.user=sess.user;await loadProfile();routeAfterLoad();}
    else{go('splash');}
    loadStats();
    DB.auth.onAuthStateChange(function(event,session){
      if(event==='SIGNED_IN'&&session&&session.user&&!S.user){S.user=session.user;loadProfile();}
    });
  }catch(e){go('splash');}
}

async function doSignUp(){
  var email=document.getElementById('einp').value.trim();
  var pass=document.getElementById('pinp').value;
  if(!email||!pass){S.error='メールとパスワードを入力してください';re('email');return;}
  if(pass.length<6){S.error='パスワードは6文字以上です';re('email');return;}
  go('loading');
  var res=await DB.auth.signUp({email:email,password:pass});
  if(res.error){var r2=await DB.auth.signInWithPassword({email:email,password:pass});if(r2.error){S.error='登録に失敗しました';go('email');return;}S.user=r2.data.user;await loadProfile();routeAfterLoad();return;}
  if(res.data&&res.data.session){S.user=res.data.user;await loadProfile();routeAfterLoad();return;}
  if(res.data&&res.data.user){var r3=await DB.auth.signInWithPassword({email:email,password:pass});if(r3.error){S.error='ログインタブからサインインしてください';go('email');return;}S.user=r3.data.user;await loadProfile();routeAfterLoad();return;}
  S.error='登録に失敗しました';go('email');
}

async function doSignIn(){
  var email=document.getElementById('einp').value.trim();
  var pass=document.getElementById('pinp').value;
  if(!email||!pass){S.error='メールとパスワードを入力してください';re('email');return;}
  go('loading');
  var res=await DB.auth.signInWithPassword({email:email,password:pass});
  if(res.error){S.error='メールかパスワードが違います';go('email');return;}
  S.user=res.data.user;await loadProfile();routeAfterLoad();
}

async function logout(){
  if(S.pollTimer)clearInterval(S.pollTimer);
  await DB.auth.signOut();
  S.user=null;S.profile=null;S.registration=null;S.match=null;go('splash');
}

// データ取得のみ。画面遷移は一切行わない
// DB→state更新専用関数（renderは呼ばない）
async function syncUserState(){
  if(!S.user)return;
  var res=await DB.from('profiles').select('*').eq('user_id',S.user.id).single();
  if(res.data){
    S.profile=res.data;
  }
}

async function loadProfile(){
  var res=await DB.from('profiles').select('*').eq('user_id',S.user.id).single();
  S.profile=res.data;
  if(!S.profile)return;

  // matched状態を確認してデータをセット（遷移はしない）
  var matchedReg=await DB.from('registrations').select('*').eq('user_id',S.user.id).eq('status','matched').order('created_at',{ascending:false}).limit(1).single();
  if(matchedReg.data&&matchedReg.data.match_id){
    S.registration=matchedReg.data;
    S.form={area:matchedReg.data.area_id,slot:matchedReg.data.slot,drink_style:matchedReg.data.drink_style,timing:matchedReg.data.timing,age_pref:matchedReg.data.age_pref};
    var m=await DB.from('matches').select('*').eq('id',matchedReg.data.match_id).single();
    if(m.data)S.match=m.data;
    await loadMatchMembers();
    return;
  }

  // waiting状態を確認してデータをセット（遷移はしない）
  var reg=await DB.from('registrations').select('*').eq('user_id',S.user.id).eq('status','waiting').order('created_at',{ascending:false}).limit(1).single();
  if(reg.data){
    S.registration=reg.data;
    S.form={area:reg.data.area_id,slot:reg.data.slot,drink_style:reg.data.drink_style,timing:reg.data.timing,age_pref:reg.data.age_pref};
  }
}

// 画面遷移の責務はここだけが持つ。loadProfileとは完全に分離
async function routeAfterLoad(){
  if(!S.profile){
    S.pf={nickname:'',age:'',gender:null,job:null,smoke:null,alcohol:null};
    go('splash');
    return;
  }
  if(!S.profile.stripe_customer_id){
    go('cardregister');
    return;
  }
  if(S.registration&&S.registration.status==='waiting'){
    startPolling();
    go('waiting');
    return;
  }
  if(S.match&&S.registration&&S.registration.status==='matched'){
    // 通報状態も同期しておく
    await syncReportStatus();
    // リロード前の画面をsessionStorageから復元
    var lastScreen=sessionStorage.getItem('ngo_screen');
    if(lastScreen==='chat'){
      go('chat');
    }else if(lastScreen==='review'){
      go('review');
    }else if(lastScreen==='matched'){
      go('matched');
    }else{
      go('splash'); // matched状態はトップへ。マッチ継続カードで案内する
    }
    return;
  }
  // ★追加：マッチ中でも待機中でもない場合も、リロード前の画面と入力内容を復元する
  var lastScreen2=sessionStorage.getItem('ngo_screen');
  var restorable=['mode_select','recruit','profile_edit','terms','privacy','inquiry'];
  if(lastScreen2&&restorable.indexOf(lastScreen2)!==-1){
    var savedForm=sessionStorage.getItem('ngo_form');
    if(savedForm){
      try{
        var parsed=JSON.parse(savedForm);
        S.form=Object.assign(S.form,parsed);
      }catch(e){}
    }
    if(lastScreen2==='profile_edit'){
      goProfileEdit();
    }else{
      go(lastScreen2);
    }
    return;
  }
  go('splash');
}

function saveInputs(){
  var nn=document.getElementById('pf-nn');var ag=document.getElementById('pf-ag');
  if(nn)S.pf.nickname=nn.value.trim();if(ag)S.pf.age=ag.value;
}

async function saveProfile(){
  var p=S.pf;
  if(!p.nickname||!p.age||!p.gender||!p.job||p.smoke===null||p.alcohol===null){S.error='すべての項目を入力してください';re('profile_new');return;}
  go('loading');
  await DB.from('profiles').upsert({user_id:S.user.id,nickname:p.nickname,age:parseInt(p.age),gender:p.gender,job:p.job,smoke:p.smoke,alcohol:p.alcohol,verified_level:1,updated_at:new Date().toISOString()});
  await DB.from('user_stats').upsert({user_id:S.user.id});
  S.profile={user_id:S.user.id,nickname:p.nickname,age:parseInt(p.age),gender:p.gender,job:p.job,smoke:p.smoke,alcohol:p.alcohol};
  go('cardregister');
}

async function loadStats(){
  try{
    var r1=await DB.from('registrations').select('*',{count:'exact',head:true}).eq('status','waiting');
    var r2=await DB.from('matches').select('*',{count:'exact',head:true}).gte('created_at',new Date().toISOString().split('T')[0]);
    if(r1.error)console.error('[loadStats] r1 error:',r1.error);
    if(r2.error)console.error('[loadStats] r2 error:',r2.error);
    S.stats.active=r1.count!=null?r1.count:0;
    S.stats.todayMatches=r2.count!=null?r2.count:0;
    var el=document.getElementById('live-n');if(el)el.textContent=S.stats.active;
    if(S.screen==='splash')render();
  }catch(e){console.error('[loadStats] exception:',e);}
}

async function goRecruit(){
  if(!S.user){go('email');return;}
  if(!S.profile){S.pf={nickname:'',age:'',gender:null,job:null,smoke:null,alcohol:null};go('profile_new');return;}
  // マッチ中は新しい募集不可
  if(S.match&&S.registration&&S.registration.status==='matched'){
    alert('現在マッチ中です。現在のマッチが終了すると、新しいお相手を探せます。');
    return;
  }
  var registered=await isCardRegistered();
  if(!registered){go('cardregister');return;}
  go('mode_select');
}

// 1:1か2:2かを選ぶ画面（選んだら募集画面へ進む）
function selectMode(m){
  S.form.mode=m;
  go('recruit');
}

  var m=S.form.mode;

// customer_idの存在をDBから取得し、唯一の正として判定する（フロントstateには依存しない）
async function isCardRegistered(){
  if(!S.user)return false;
  var res=await DB.from('profiles').select('stripe_customer_id').eq('user_id',S.user.id).single();
  if(res.error||!res.data)return false;
  var hasCard=!!res.data.stripe_customer_id;
  if(S.profile)S.profile.stripe_customer_id=res.data.stripe_customer_id; // フロントstateをDBに再同期
  return hasCard;
}

async function startRecruit(){
  if(_isSubmitting)return;
  var f=S.form;
  if(!f.area||!f.slot||!f.drink_style||!f.age_pref){S.error='すべて選択してください';re('recruit');return;}
  if(S.profile&&S.profile.gender==='male'){
    if(!S.profile.ticket_count||S.profile.ticket_count<1){S.error='ticket_zero';re('recruit');return;}
  }
  _isSubmitting=true;
  await doRegister();
}

async function goBuyTicket(){
  if(!S.user){go('email');return;}
  var registered=await isCardRegistered();
  if(registered){
    buyTicketConfirm();
  }else{
    // カード未登録 → メッセージ表示のみ（遷移なし）
    S.error='カードを登録してください';
  }
}

// カード登録専用（決済は行わない）。完了後はトップへ
async function confirmCardRegister(){
  var btn=document.getElementById('cardreg-btn');
  var errEl=document.getElementById('cardreg-err');
  // 二重登録防止：DB基準で既に登録済みならPAY.JPへのリクエストを行わず終了
  var alreadyRegistered=await isCardRegistered();
  if(alreadyRegistered){
    go('splash');
    return;
  }
  if(!_payjp||!_payjpCardEl){if(errEl)errEl.textContent='カードが読み込まれていません';return;}
  if(btn){btn.disabled=true;btn.textContent='処理中...';}
  try{
    var r=await _payjp.createToken(_payjpCardEl);
    if(r.error){if(errEl)errEl.textContent=r.error.message;if(btn){btn.disabled=false;btn.textContent='カードを登録する →';}return;}
    var regRes=await fetch('/api/charge',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({mode:'register_card',token:r.id,description:'Nomi Go ユーザー'})});
    var regData=await regRes.json();
    if(!regData.success){if(errEl)errEl.textContent=regData.error||'カード登録に失敗しました';if(btn){btn.disabled=false;btn.textContent='カードを登録する →';}return;}
    var custUpd=await DB.from('profiles').update({stripe_customer_id:regData.customer_id}).eq('user_id',S.user.id);
    if(custUpd.error){if(errEl)errEl.textContent='カード情報の保存に失敗しました: '+custUpd.error.message;if(btn){btn.disabled=false;btn.textContent='カードを登録する →';}return;}
    S.profile.stripe_customer_id=regData.customer_id;
    go('splash');
  }catch(e){if(errEl)errEl.textContent='エラー: '+e.message;if(btn){btn.disabled=false;btn.textContent='カードを登録する →';}}
}

// チケット購入：確認ダイアログ→保存済みcustomer_idで即決済
var _ticketPurchasing=false;

function buyTicketConfirm(){
  if(_ticketPurchasing)return;
  if(!S.profile||!S.profile.stripe_customer_id){
    // カード未登録 → メッセージ表示のみ（遷移なし）
    S.error='カードを登録してください';
    return;
  }
  if(confirm('チケットを購入しますか？\n登録済みのカードから\n3,000円（税込）を決済します。')){
    chargeForTicket(S.profile.stripe_customer_id);
  }
}

async function chargeForTicket(customerId){
  if(_ticketPurchasing)return;
  _ticketPurchasing=true;
  try{
    var res=await fetch('/api/charge',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({mode:'charge_customer',customer_id:customerId,amount:3000,description:'Nomi Go チケット購入'})});
    var data=await res.json();
    if(!data.success){
      S.error=data.error||'決済に失敗しました';
      _ticketPurchasing=false;
      return;
    }
    var current=await DB.from('profiles').select('ticket_count').eq('user_id',S.user.id).single();
    var newCount=(current.data&&current.data.ticket_count?current.data.ticket_count:0)+1;
    var upd=await DB.from('profiles').update({ticket_count:newCount}).eq('user_id',S.user.id).select().single();
    if(upd.error||!upd.data){
      S.error='チケット反映エラー: '+(upd.error?upd.error.message:'不明なエラー');
      _ticketPurchasing=false;
      return;
    }
    // ★修正：DB更新結果（upd.data）だけを使ってS.profileを更新する（二重取得を廃止）
    S.profile.ticket_count=upd.data.ticket_count;
    S.error='';
    S.ticketPurchaseSuccess=true;
    // ★修正：S.profile更新が終わった直後にだけrender()を実行
    render();

    // 4秒後にメッセージを消す（画面遷移なし）
    setTimeout(function(){S.ticketPurchaseSuccess=false;_ticketPurchasing=false;render();},4000);
  }catch(e){
    S.error='エラー: '+e.message;
    _ticketPurchasing=false;
  }
}

async function doRegister(){
  go('loading');
  try{
    var existing=await DB.from('registrations').select('id').eq('user_id',S.user.id).eq('status','waiting').single();
    if(existing.data){_isSubmitting=false;S.registration=existing.data;startPolling();go('waiting');return;}
    var ins=await DB.from('registrations').insert({
      user_id:S.user.id,
      area_id:S.form.area,
      slot:S.form.slot,
      mode:S.form.mode||'1v1',
      gender:S.profile.gender,
      drink_style:S.form.drink_style,
      timing:'どちらでもOK',
      age_pref:S.form.age_pref,
      age:S.profile.age,
      smoke:S.profile.smoke,
      alcohol:S.profile.alcohol,
      payment_intent_id:S.chargeId||null,
      status:'waiting'
    }).select().single();
    if(ins.error){_isSubmitting=false;S.error='登録エラー: '+ins.error.message;go('recruit');return;}
    S.registration=ins.data;
    var matched=await tryMatch();
    if(matched){go('matched');}else{startPolling();go('waiting');}
  }catch(e){_isSubmitting=false;S.error='登録に失敗しました: '+e.message;go('recruit');}
}

function dbgLog(msg){
  // 開発中の記録機能は本番では不要なため停止（呼び出し箇所自体は残るが何もしない）
}

async function tryMatch(){
  if(!S.registration){dbgLog('S0: registration=null');return false;}
  var p=S.profile;
  dbgLog('S1: area='+S.form.area+' slot='+S.form.slot+' timing='+S.form.timing);

  // 候補取得（同じ人数モードを希望している人だけを対象にする）
  var candidates=await DB.from('registrations').select('*').eq('status','waiting').eq('area_id',S.form.area).eq('mode',S.registration.mode||'1v1').neq('gender',p.gender).neq('user_id',S.user.id);
  dbgLog('S2: err='+(candidates.error?candidates.error.message:'なし')+' 件数='+(candidates.data?candidates.data.length:0));
  if(!candidates.data||candidates.data.length===0){return false;}

  var filtered=candidates.data.filter(function(c){
    var t1=S.form.timing;var t2=c.timing;
    return t1==='どちらでもOK'||t2==='どちらでもOK'||t1===t2;
  });
  dbgLog('S3: filtered='+filtered.length);
  if(filtered.length===0){return false;}

  var best=filtered[0];
  var prof=await DB.from('profiles').select('*').eq('user_id',best.user_id).single();
  dbgLog('S4: prof='+(prof.data?prof.data.nickname:'null')+' err='+(prof.error?prof.error.message:'なし'));
  best.profileData=prof.data||{};

  if(!S.form.slot){dbgLog('S4x: slot=undefined abort');return false;}

  // ★レースコンディション対策：相手のregistrationをstatus='waiting'条件付きUPDATEで先に確保
  // status='waiting'の行だけを対象にすることで、他端末が先に確保した場合は更新件数が0になり処理を中断できる
  var lockOpponent=await DB.from('registrations').update({status:'processing'}).eq('id',best.id).eq('status','waiting').select().single();
  dbgLog('S4b: lock err='+(lockOpponent.error?lockOpponent.error.message:'なし')+' data='+(lockOpponent.data?'OK':'null'));
  if(lockOpponent.error||!lockOpponent.data){
    dbgLog('S4b: 他端末が先に確保済みのため中断');
    return false;
  }

  // matches作成
  var matchRes=await DB.from('matches').insert({
    area_id:S.form.area,
    slot:S.form.slot,
    mode:'1v1',
    timing:S.form.timing,
    status:'confirmed'
  }).select().single();
  dbgLog('S5: err='+(matchRes.error?matchRes.error.message:'なし')+' id='+(matchRes.data?matchRes.data.id.slice(0,8):'null'));
  if(matchRes.error){
    // matches作成失敗時は相手のregistrationをwaitingに戻す
    await DB.from('registrations').update({status:'waiting'}).eq('id',best.id);
    return false;
  }
  S.match=matchRes.data;

  // 自分と相手のregistrationをmatchedに更新
  var u1=await DB.from('registrations').update({status:'matched',match_id:matchRes.data.id}).eq('id',S.registration.id);
  var u2=await DB.from('registrations').update({status:'matched',match_id:matchRes.data.id}).eq('id',best.id);
  dbgLog('S6: u1='+(u1.error?u1.error.message:'OK')+' u2='+(u2.error?u2.error.message:'OK'));

  if(u1.error||u2.error)return false;

  // ★修正：DBだけでなくアプリ内のメモ(S.registration)もmatchedに更新する
  // これがないと「トップへ戻る」時に古い状態(waiting)のままと誤判定されてしまう
  S.registration.status='matched';
  S.registration.match_id=matchRes.data.id;

  // ★修正：チケット消費対象は「マッチした2人のうち男性」に固定する
  // p=自分のprofile、best.profileData=相手のprofile。どちらが男性かを判定してIDを渡す
  var maleUserId=(p.gender==='male')?S.user.id:best.user_id;
  await consumeTicket(matchRes.data.id,maleUserId);
  
  // ★重要：消費後に必ずstate同期
  await syncUserState();

  await loadMatchMembers();
  // ★重要：state更新後に描画
  render();
  return true;
}

async function consumeTicket(matchId,targetUserId){
  dbgLog('T0: consumeTicket呼び出し matchId='+matchId.slice(0,8));
  // 条件付き更新：ticket_consumed=falseの行だけを対象にすることで二重消費を防止（冪等性の担保）
  var lockRes=await DB.from('matches').update({ticket_consumed:true}).eq('id',matchId).eq('ticket_consumed',false).select().single();
  dbgLog('T1: lockRes err='+(lockRes.error?lockRes.error.message:'なし')+' data='+(lockRes.data?JSON.stringify(lockRes.data).slice(0,80):'null'));
  if(lockRes.error||!lockRes.data){
    dbgLog('T1x: 消費済みor対象なしのため中断');
    return;
  }
  // ★修正：S.user.id（操作した人）ではなく、渡された男性ユーザーIDを対象にする
  var current=await DB.from('profiles').select('ticket_count').eq('user_id',targetUserId).single();
  dbgLog('T2: current err='+(current.error?current.error.message:'なし')+' ticket_count='+(current.data?current.data.ticket_count:'null'));
  var oldCount=current.data&&current.data.ticket_count?current.data.ticket_count:0;
  var newCount=oldCount-1;
  if(newCount<0)newCount=0;
  // 読み取った時点のticket_countを条件に含めることで、その間に他の処理が値を変えていた場合の上書きを防ぐ
  var upd=await DB.from('profiles').update({ticket_count:newCount}).eq('user_id',targetUserId).eq('ticket_count',oldCount).select().single();
  dbgLog('T3: upd err='+(upd.error?upd.error.message:'なし')+' newCount='+(upd.data?upd.data.ticket_count:'null'));
  if(upd.error||!upd.data){
    dbgLog('T3x: DB更新失敗');
  }
  // ※ここではstate更新をしない（syncUserStateで後から行う）
}

function startPolling(){
  if(S.pollTimer)clearInterval(S.pollTimer);
  dbgLog('polling開始 reg='+(S.registration?S.registration.id.slice(0,8):'null'));
  S.pollTimer=setInterval(async function(){
    try{
      if(S.registration){
        var reg=await DB.from('registrations').select('status,match_id').eq('id',S.registration.id).single();
        if(reg.data&&reg.data.status==='matched'&&reg.data.match_id){
          clearInterval(S.pollTimer);
          var m=await DB.from('matches').select('*').eq('id',reg.data.match_id).single();
          if(m.data){
            // ★修正：DBだけでなくアプリ内のメモ(S.registration)もmatchedに更新する
            S.registration.status='matched';
            S.registration.match_id=reg.data.match_id;
            S.match=m.data;await loadMatchMembers();_isSubmitting=false;go('matched');return;
          }
        }
      }
      var matched=await tryMatch();
      if(matched){clearInterval(S.pollTimer);_isSubmitting=false;go('matched');}
      loadStats();
    }catch(e){}
  },8000);
}

async function cancelReg(){
  if(S.pollTimer)clearInterval(S.pollTimer);
  if(S.registration)await DB.from('registrations').update({status:'cancelled'}).eq('id',S.registration.id);
  S.registration=null;S.match=null;S.chargeId=null;go('splash');
}

// マッチ結果ステータスを一度だけ更新する（status='confirmed'の行のみ対象。二重送信・上書き防止）
async function setMatchResultOnce(matchId,newStatus,extraFields){
  if(!matchId)return false;
  var updateData=Object.assign({status:newStatus},extraFields||{});
  var res=await DB.from('matches').update(updateData).eq('id',matchId).eq('status','confirmed').select().single();
  if(res.error||!res.data){
    return false;
  }
  return true;
}

// 自分の回答をresult_a or result_bに保存し、双方揃ったらverdictを判定する
async function saveUserResult(matchId,userResult){
  if(!matchId||!S.user)return;
  // 現在のmatchを取得（statusに関係なく取得）
  var cur=await DB.from('matches').select('*').eq('id',matchId).single();
  if(cur.error||!cur.data)return;
  var m=cur.data;
  var updateData={};
  var otherResult=null;

  if(!m.result_a_user_id){
    // 誰も記録していない→自分がAスロットに記録
    updateData.result_a=userResult;
    updateData.result_a_user_id=S.user.id;
    otherResult=null; // まだ相手は未回答
  }else if(m.result_a_user_id===S.user.id){
    // 自分はすでにAスロット記録済み→何もしない
    return;
  }else if(!m.result_b_user_id){
    // 相手がAスロット記録済み→自分はBスロットに記録
    updateData.result_b=userResult;
    updateData.result_b_user_id=S.user.id;
    otherResult=m.result_a;
  }else if(m.result_b_user_id===S.user.id){
    // 自分はすでにBスロット記録済み→何もしない
    return;
  }else{
    return;
  }

  // 双方の回答が揃った場合はverdictを判定
  if(otherResult){
    var myResult=userResult;
    var theirResult=otherResult;
    if(myResult==='completed'&&theirResult==='completed'){
      updateData.verdict='normal';
    }else if(myResult==='cancelled'&&theirResult==='cancelled'){
      updateData.verdict='both_cancelled';
    }else{
      updateData.verdict='needs_review';
    }
  }

  if(Object.keys(updateData).length>0){
    await DB.from('matches').update(updateData).eq('id',matchId);
  }
}

async function cancelAfterMatch(){

    await setMatchResultOnce(S.match.id,'cancelled');
    await saveUserResult(S.match.id,'cancelled');

  if(S.registration)await DB.from('registrations').update({status:'cancelled'}).eq('id',S.registration.id);
  S.registration=null;S.match=null;S.chargeId=null;go('splash');
}

async function loadMatchMembers(){
  if(!S.match)return;
  var r=await DB.from('registrations').select('*').eq('match_id',S.match.id);
  if(!r.data)return;
  for(var i=0;i<r.data.length;i++){
    var prof=await DB.from('profiles').select('*').eq('user_id',r.data[i].user_id).single();
    r.data[i].profiles=prof.data||{};
  }
  S.matchMembers=r.data;
  await syncReportStatus();
}

async function openChat(){
  var registered=await isCardRegistered();
  if(!registered){go('cardregister');return;}
  // initChatで全データ（match・通報状態・メッセージ）を確定させてから描画
  if(S._chatTimer){clearInterval(S._chatTimer);S._chatTimer=null;}
  if(S.user){
    var reg=await DB.from('registrations').select('*').eq('user_id',S.user.id).eq('status','matched').order('created_at',{ascending:false}).limit(1).single();
    if(reg.data){
      S.registration=reg.data;
      if(reg.data.match_id){
        var m=await DB.from('matches').select('*').eq('id',reg.data.match_id).single();
        if(m.data)S.match=m.data;
      }
    }
    // 通報状態を確定（このawaitが完了してからはじめて描画する）
    await syncReportStatus();
  }
  await loadMessagesAsync();
  // 全データ確定後に画面遷移（ここで初めてchatH()が呼ばれる）
  S.screen='chat';
  S.error='';
  sessionStorage.setItem('ngo_screen','chat');
  render();
  setTimeout(function(){var el=document.querySelector('.chat-msgs');if(el)el.scrollTop=el.scrollHeight;},50);
  S._chatTimer=setInterval(function(){loadMessages();},3000);
}

async function initChat(){
  // openChatから呼ばれる場合はopenChat内で処理するため、ここはポーリング再開用に残す
  if(S._chatTimer){clearInterval(S._chatTimer);S._chatTimer=null;}
  await syncReportStatus();
  await loadMessagesAsync();
  S._chatTimer=setInterval(function(){loadMessages();},3000);
}

// 非同期版loadMessages（initChat内でawait用）
async function loadMessagesAsync(){
  if(!S.match||!S.match.id)return;
  var res=await DB.from('messages').select('*').eq('match_id',S.match.id).order('created_at',{ascending:true});
  if(res.error)return;
  applyMessages(res.data);
}

function loadMessages(){
  if(!S.match||!S.match.id){return;}
  DB.from('messages').select('*').eq('match_id',S.match.id).order('created_at',{ascending:true}).then(function(res){
    if(res.error)return;
    applyMessages(res.data);
  });
}

// ④ メッセージをidベースで重複判定して反映する共通処理
function applyMessages(data){
  var sys=[{type:'system',id:'sys-0',content:'マッチング成立！チャットが作成されました'}];
  if(S.match.ticket_consumed&&S.profile&&S.profile.gender==='male'){
    sys.push({type:'system',id:'sys-1',content:'🎫 チケットを1枚使用しました'});
  }
  var msgs=data.map(function(m){
    var nick='?';
    if(m.user_id===S.user.id&&S.profile){nick=S.profile.nickname;}
    else{var mm=S.matchMembers.find(function(x){return x.user_id===m.user_id;});if(mm&&mm.profiles)nick=mm.profiles.nickname||'?';}
    return {id:m.id,user_id:m.user_id,content:m.content,mine:m.user_id===S.user.id,nickname:nick};
  });
  var newMsgs=sys.concat(msgs);
  // idベースで重複判定（件数比較だけだと内容変化を検知できないため）
  var currentIds=S.chatMsgs.map(function(m){return m.id;}).join(',');
  var newIds=newMsgs.map(function(m){return m.id;}).join(',');
  if(currentIds!==newIds){
    S.chatMsgs=newMsgs;
    if(S.screen==='chat'){
      render();
      setTimeout(function(){var el=document.querySelector('.chat-msgs');if(el)el.scrollTop=el.scrollHeight;},50);
    }
  }
}

var _sendingMsg=false;
function sendMsg(){
  // ⑤ 二重送信防止
  if(_sendingMsg)return;
  var inp=document.getElementById('cinput');var txt=inp?inp.value.trim():'';if(!txt)return;
  inp.value='';
  _sendingMsg=true;
  var sendBtn=document.querySelector('.chat-send');
  if(sendBtn)sendBtn.disabled=true;

// 評価送信の確認ダイアログ用（submitReview()自体は変更しない）
var _reviewSubmitting=false;

// 星を押した時に呼ぶ。2個以下⇔3個以上でタグの種類が変わるため、切り替わったら選択をリセットする
function setReviewStars(n){
  var wasLow=S.reviewStars>0&&S.reviewStars<=2;
  var isLow=n<=2;
  if(wasLow!==isLow){
    S.reviewChecks=REVIEW_TAGS.map(function(){return false;});
    S.reviewOtherText='';
  }
  S.reviewStars=n;
  re('review');
}

function confirmSubmitReview(){
  if(_reviewSubmitting)return;
  if(!S.match||S.reviewStars===0)return;
  var anyTagSelected=S.reviewChecks.some(function(c){return c;});
  if(!anyTagSelected){alert('評価タグを1つ以上選んでください');return;}
  // ★修正：「その他」を選んでいる場合は、文字が入力されているか確認する
  var isLowNow=S.reviewStars>0&&S.reviewStars<=2;
  var checksNow=isLowNow?REVIEW_TAGS_LOW:REVIEW_TAGS;
  var otherIdxNow=checksNow.length-1;
  if(S.reviewChecks[otherIdxNow]&&(!S.reviewOtherText||!S.reviewOtherText.trim())){
    alert('「その他」を選んだ場合は内容を入力してください');
    return;
  }
  if(!confirm('評価を送信しますか？\nこの操作は送信後に変更できません。'))return;
  _reviewSubmitting=true;
  re('review');
  submitReview().catch(function(){}).finally(function(){_reviewSubmitting=false;});
}

async function submitReview(){
  if(!S.match||S.reviewStars===0)return;
  var matchId=S.match.id;
  var targets=S.matchMembers.filter(function(m){return m.user_id!==S.user.id;});
  for(var i=0;i<targets.length;i++){
    // 選ばれたタグの名前だけを配列にまとめる（新しい保存場所：review_tags）
    // ★修正：星2以下は低評価用タグ、星3以上は通常タグから正しい名前を選ぶ
    var tagSource=(S.reviewStars>0&&S.reviewStars<=2)?REVIEW_TAGS_LOW:REVIEW_TAGS;
    var otherIdxSubmit=tagSource.length-1;
    var selectedTags=S.reviewChecks.map(function(checked,idx){
      if(!checked)return null;
      // 「その他」が選ばれていて文字が入力されていれば、その文字を保存する
      if(idx===otherIdxSubmit&&S.reviewOtherText&&S.reviewOtherText.trim()){
        return S.reviewOtherText.trim();
      }
      return tagSource[idx];
    }).filter(function(t){return t!==null;});
    // ★修正：古い3項目(tag_punctual等)は「良い評価」の意味専用の場所。悪い評価の時はここには入れない(false固定)
    var isLowNow2=S.reviewStars>0&&S.reviewStars<=2;
    var legacyPunctual=isLowNow2?false:S.reviewChecks[0];
    var legacyFriendly=isLowNow2?false:S.reviewChecks[1];
    var legacyAgain=isLowNow2?false:S.reviewChecks[2];
    await DB.from('reviews').insert({match_id:matchId,reviewer_id:S.user.id,reviewee_id:targets[i].user_id,stars:S.reviewStars,tag_punctual:legacyPunctual,tag_friendly:legacyFriendly,tag_again:legacyAgain,review_tags:selectedTags});
  }
  await setMatchResultOnce(matchId,'completed',{completed_at:new Date().toISOString()});
  await saveUserResult(matchId,'completed');
  if(S.registration)await DB.from('registrations').update({status:'completed'}).eq('id',S.registration.id);
  S.registration=null;S.match=null;S.matchMembers=[];S.form={area:null,slot:null,drink_style:null,timing:null,age_pref:null};
  S.reviewStars=0;S.reviewChecks=[false,false,false];S.reviewOtherText='';S.chatMsgs=[];S.chargeId=null;go('splash');
}

// 通報状態の単一ソース：この関数だけがS._hasReportedを更新する
async function syncReportStatus(){
  S._hasReported=false;
  if(!S.user||!S.match||!S.match.id)return;
  try{
    var rep=await DB.from('reports').select('id').filter('reporter_id','eq',S.user.id).filter('match_id','eq',S.match.id);
    S._hasReported=!!(rep.data&&rep.data.length>0);
  }catch(e){S._hasReported=false;}
}

async function goSplashFromMatched(){
  if(S.match&&S.matchMembers.length===0){
    await loadMatchMembers();
  }
  await syncReportStatus();
  // await中に他の非同期処理がS.match/S.registrationを上書きする可能性があるため
  // go('splash')直前に値を確認してから遷移する
  var savedMatch=S.match;
  var savedReg=S.registration;
  var savedMembers=S.matchMembers.slice();
  go('splash');
  // goが呼ぶrenderの後に確実に値が残っているよう再セット
  if(savedMatch&&savedReg&&savedReg.status==='matched'){
    S.match=savedMatch;
    S.registration=savedReg;
    S.matchMembers=savedMembers;
    render();
  }
}

    +'<div style="margin:18px 20px 40px;padding:12px 14px;background:var(--surface);border:1px solid var(--border2);border-radius:10px;display:flex;align-items:center;gap:8px"><span style="font-size:14px">🛡️</span><span style="font-size:11.5px;color:var(--muted);line-height:1.6">困ったことがあれば「その他のメニュー」から報告してください。</span></div>'
    +'</div>';
}

function chatH(){
  var msgsHtml=S.chatMsgs.map(function(msg){if(msg.type==='system')return '<div class="msg-system">'+escapeHtml(msg.content)+'</div>';var isMe=msg.user_id===S.user.id;var gn=msg.profiles?msg.profiles.gender:'';var nick=escapeHtml(msg.nickname||(msg.profiles?msg.profiles.nickname:'?'));return '<div class="msg-row '+(isMe?'mine':'')+'">'+(!isMe?'<div class="msg-av" style="background:'+(gn==='male'?'rgba(50,80,160,.4)':'rgba(160,50,100,.4)')+';color:'+(gn==='male'?'#8AAAE0':'#E08AB0')+'">'+nick[0]+'</div>':'')+'<div>'+(!isMe?'<div style="font-size:10px;color:var(--muted);margin-bottom:3px">'+nick+'</div>':'')+'<div class="msg-bubble" style="background:'+(isMe?'var(--wine)':'var(--card)')+';color:'+(isMe?'#fff':'var(--cream)')+'">'+escapeHtml(msg.content)+'</div></div></div>';}).join('');
  var reportBanner=S._hasReported?'<div style="padding:8px 16px;background:rgba(204,64,64,.1);border-bottom:1px solid rgba(204,64,64,.2);font-size:11px;color:var(--red);text-align:center">通報済み：運営が内容を確認中です</div>':'';
  return '<div class="screen" style="overflow:hidden"><div class="hdr"><button class="hdr-back" onclick="go(\'matched\')">← 戻る</button><div class="hdr-info"><div class="hdr-step">チャット</div></div><button style="background:transparent;color:var(--muted);border:1px solid var(--border);font-size:12px;padding:6px 12px;border-radius:8px;font-weight:600;cursor:pointer" onclick="go(\'review\')">飲み終わった</button></div>'+reportBanner+'<div class="chat-wrap"><div class="chat-msgs" id="chatmsgs">'+msgsHtml+'</div><div class="chat-input"><input class="chat-inp" id="cinput" type="text" placeholder="メッセージを送る..." onkeydown="if(event.key===\'Enter\')sendMsg()"><button class="chat-send" onclick="sendMsg()">↑</button></div></div></div>';
}

function reviewH(){
  var isLow=S.reviewStars>0&&S.reviewStars<=2;
  var checks=isLow?REVIEW_TAGS_LOW:REVIEW_TAGS;
  var otherIdx=checks.length-1;
  var starsHtml=[1,2,3,4,5].map(function(n){return '<button class="star-btn" onclick="setReviewStars('+n+')">'+(n<=S.reviewStars?'⭐':'☆')+'</button>';}).join('');
  var checksHtml=checks.map(function(c,i){return '<button class="tag-chip '+(S.reviewChecks[i]?'on':'')+'" onclick="S.reviewChecks['+i+']=!S.reviewChecks['+i+'];re(\'review\')">'+c+'</button>';}).join('');
  // 「その他」が選ばれている時だけ、下に文字入力欄を出す。入力のたびにボタンの押せる状態だけ直接更新する（画面全体は再描画しない）
  var otherInput=S.reviewChecks[otherIdx]?'<div style="padding:0 20px 16px"><input class="inp" id="review-other-inp" type="text" placeholder="自由に入力してください" maxlength="50" value="'+(S.reviewOtherText||'')+'" oninput="S.reviewOtherText=this.value;updateReviewSubmitBtn()"></div>':'';
  // ★修正：星を押す前はタグ欄自体を表示しない
  var checksSection=S.reviewStars>0?'<div style="padding:16px 20px;display:flex;flex-wrap:wrap;gap:8px">'+checksHtml+'</div>'+otherInput:'';
  var anyTagSelected=S.reviewChecks.some(function(c){return c;});
  // ★修正：「その他」を選んでいる場合は文字が入っていないとボタンも押せないようにする
  var otherOk=!S.reviewChecks[otherIdx]||(S.reviewOtherText&&S.reviewOtherText.trim().length>0);
  var canSubmit=S.reviewStars>0&&anyTagSelected&&otherOk&&!_reviewSubmitting;
  var submitBtnLabel=_reviewSubmitting?'送信中...':'評価を送信する';
  return '<div class="screen"><div class="hdr"><button class="hdr-back" onclick="go(\'chat\')">← 戻る</button><div class="hdr-info"><div class="hdr-title">今夜の評価</div></div></div><div class="body"><div style="padding:28px 20px 20px;text-align:center;border-bottom:1px solid var(--border2)"><div style="font-size:32px;margin-bottom:12px">🍺</div><div style="font-size:20px;font-weight:800;margin-bottom:6px">お疲れ様でした！</div></div><div style="padding:20px 20px 0;text-align:center"><div class="sec-label" style="padding:0 0 14px;text-align:center">総合評価</div><div style="display:flex;justify-content:center;gap:8px">'+starsHtml+'</div></div>'+checksSection+'</div><div class="ftr"><button class="btn btn-wine" id="review-submit-btn" '+(canSubmit?'':'disabled ')+'onclick="confirmSubmitReview()">'+submitBtnLabel+'</button></div></div>';
}

// 「その他」の文字入力のたびに、送信ボタンの押せる/押せないだけを直接書き換える（画面全体は再描画しない）
function updateReviewSubmitBtn(){
  var btn=document.getElementById('review-submit-btn');
  if(!btn)return;
  var isLow=S.reviewStars>0&&S.reviewStars<=2;
  var checks=isLow?REVIEW_TAGS_LOW:REVIEW_TAGS;
  var otherIdx=checks.length-1;
  var anyTagSelected=S.reviewChecks.some(function(c){return c;});
  var otherOk=!S.reviewChecks[otherIdx]||(S.reviewOtherText&&S.reviewOtherText.trim().length>0);
  var canSubmit=S.reviewStars>0&&anyTagSelected&&otherOk&&!_reviewSubmitting;
  btn.disabled=!canSubmit;
}

function reportH(){
  var reasons=['無断キャンセル','不適切な言動','スパム','危険行為','その他'];
  var preset=S._reportPresetReason||'';
  if(S._reportDone){
    return '<div class="screen"><div class="hdr"><button class="hdr-back" onclick="S._reportDone=false;go(\'matched\')">← 戻る</button><div class="hdr-info"><div class="hdr-title">通報</div></div></div><div class="body" style="padding:40px 24px;text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px"><div style="font-size:40px">✅</div><div style="font-size:16px;font-weight:800;color:var(--cream)">ご報告ありがとうございます。</div><div style="font-size:13px;color:var(--muted);line-height:1.7">内容を確認のうえ、必要に応じて対応いたします。<br><br>マッチ状態は継続中です。<br>チャットはいつでも再開できます。</div></div><div class="ftr" style="display:flex;flex-direction:column;gap:8px"><button class="btn btn-wine" onclick="S._reportDone=false;go(\'matched\')">マッチ画面に戻る</button><button class="btn" style="background:transparent;color:var(--muted);font-size:13px;padding:10px" onclick="S._reportDone=false;go(\'splash\')">トップへ戻る</button></div></div>';
  }
  var options=reasons.map(function(r){return '<option value="'+r+'"'+(r===preset?' selected':'')+'>'+r+'</option>';}).join('');
  return '<div class="screen"><div class="hdr"><button class="hdr-back" onclick="S._reportPresetReason=null;go(\'matched\')">← 戻る</button><div class="hdr-info"><div class="hdr-step">通報</div><div class="hdr-title">問題を報告する</div></div></div><div class="body" style="padding:24px;display:flex;flex-direction:column;gap:14px"><div class="sec-label" style="padding:0 0 8px">通報理由を選択してください</div><select id="report-reason" class="inp"><option value="">選択してください</option>'+options+'</select><div class="sec-label" style="padding:0 0 8px">詳細（任意）</div><textarea id="report-desc" class="inp" style="height:100px;resize:none" placeholder="具体的な状況があれば記入してください"></textarea><div id="report-err" class="err-msg"></div></div><div class="ftr"><button class="btn btn-wine" id="report-btn" onclick="submitReport()">通報する</button></div></div>';
}

// 利用規約（全文・省略なし）

  var body='<div style="font-size:13px;color:var(--cream);line-height:1.9;white-space:pre-wrap">'
+'本利用規約（以下「本規約」といいます。）は、本サービス「Nomi Go」（以下「本サービス」といいます。）の利用条件を定めるものです。ユーザーは本規約に同意の上、本サービスを利用するものとします。\n\n'
+'第1条（サービス概要）\n本サービスは、ユーザー同士がリアルタイムでマッチングし、飲み会等の交流機会を形成することを目的としたマッチングサービスです。本サービスは、ユーザー間のマッチング機会を提供するものであり、実際の出会いや行動について保証するものではありません。\n\n'

+'第3条（禁止事項）\nユーザーは、本サービスの利用にあたり、以下の行為を行ってはなりません。\n・虚偽情報の登録\n・他ユーザーへの迷惑行為、誹謗中傷\n・営業・勧誘・宣伝目的での利用\n・なりすまし行為\n・法令または公序良俗に反する行為\n・本サービスの運営を妨害する行為\n\n'
+'第4条（マッチングおよび利用）\nマッチングの成立は出会いや約束の成立を保証するものではなく、その後の行動はすべてユーザー自身の責任において行うものとします。\n\n'
+'第5条（チケットおよび課金）\n・男性ユーザーのみチケットを消費\n・チケットはマッチ成立時に消費\n・返金は原則行わない（運営判断を除く）\n\n'
+'第6条（評価・通報機能）\n評価および通報は運営が確認し、必要に応じてアカウント停止等の措置を行う場合があります。\n\n'

// プライバシーポリシー（全文・省略なし）
function privacyH(){
  var body='<div style="font-size:13px;color:var(--cream);line-height:1.9;white-space:pre-wrap">'
+'本プライバシーポリシーは、「Nomi Go」（以下「本サービス」）におけるユーザー情報の取扱いについて定めるものです。\n\n'

+'第2条（利用目的）\n取得した情報は以下の目的で利用します。\n・サービス提供のため\n・マッチング機能の提供\n・不正利用防止\n・課金処理\n・ユーザーサポート\n・サービス改善\n\n'
+'第3条（第三者提供）\n以下の場合を除き第三者提供は行いません。\n・本人同意がある場合\n・法令に基づく場合\n・安全確保のため必要な場合\n\n'
+'第4条（業務委託）\n決済処理等を外部サービス（PAY.JP等）に委託する場合があります。\n\n'

function inquiryH(){
  if(S._inquiryDone){
    return '<div class="screen"><div class="hdr"><button class="hdr-back" onclick="S._inquiryDone=false;go(\'splash\')">← 戻る</button><div class="hdr-info"><div class="hdr-title">お問い合わせ</div></div></div><div class="body" style="padding:40px 24px;text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px"><div style="font-size:40px">✅</div><div style="font-size:16px;font-weight:800;color:var(--cream)">送信が完了しました。</div><div style="font-size:13px;color:var(--muted);line-height:1.7">お問い合わせありがとうございます。<br>内容を確認のうえ、対応いたします。</div></div><div class="ftr"><button class="btn btn-wine" onclick="S._inquiryDone=false;go(\'splash\')">トップに戻る</button></div></div>';
  }
  return '<div class="screen"><div class="hdr"><button class="hdr-back" onclick="go(\'splash\')">← 戻る</button><div class="hdr-info"><div class="hdr-step">お問い合わせ</div><div class="hdr-title">運営へ連絡する</div></div></div><div class="body" style="padding:24px;display:flex;flex-direction:column;gap:14px"><div class="sec-label" style="padding:0 0 8px">お問い合わせ内容</div><textarea id="inquiry-content" class="inp" style="height:160px;resize:none" placeholder="ご質問・ご要望・お困りのことをご記入ください"></textarea><div id="inquiry-err" class="err-msg"></div></div><div class="ftr"><button class="btn btn-wine" id="inquiry-btn" onclick="submitInquiry()">送信する</button></div></div>';
}

init();
setInterval(loadStats,30000);

</script>
