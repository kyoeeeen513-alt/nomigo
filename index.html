<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Nomi Go</title>

<style>
:root{--hero:#5A1620;--bg:#4A121A;--surface:#3D0F16;--card:#45151E;--border:#682630;--border2:#521F28;--wine:#D14848;--wine-bg:rgba(209,72,72,.2);--cream:#F7ECE8;--muted:#D0A0A8;--lgray:#9A5A64;--gold:#E0B060;--gold-bg:rgba(224,176,96,.16);--green:#5AAA70;--red:#FF7A5C;--red-bg:rgba(255,122,92,.13);}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#0A0507;font-family:-apple-system,'Hiragino Sans','Yu Gothic UI',sans-serif;color:var(--cream)}
#app{min-height:100%;max-width:430px;margin:0 auto;background:var(--bg);display:flex;flex-direction:column}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes pop{0%{transform:scale(.88);opacity:0}60%{transform:scale(1.04)}100%{transform:scale(1);opacity:1}}
@keyframes pieceInL{from{opacity:0;transform:translateX(-36px)}to{opacity:1;transform:translateX(0)}}
@keyframes pieceInR{from{opacity:0;transform:translateX(36px)}to{opacity:1;transform:translateX(0)}}
@keyframes pieceOut{to{opacity:0;transform:scale(.7)}}
@keyframes beerIn{from{opacity:0;transform:scale(.4) rotate(-10deg)}to{opacity:1;transform:scale(1) rotate(0)}}
@keyframes sparkleFade{0%{opacity:0;transform:scale(.5)}40%{opacity:1;transform:scale(1.1)}100%{opacity:0;transform:scale(1.4)}}
.intro-anim{position:relative;height:64px;display:flex;align-items:center;justify-content:center;margin-bottom:8px}
.intro-piece{position:absolute;font-size:34px;animation-fill-mode:forwards;opacity:0}
.intro-piece-l{animation:pieceInL .5s ease forwards,pieceOut .35s ease forwards;animation-delay:0s,.85s;transform:translateX(-8px)}
.intro-piece-r{animation:pieceInR .5s ease forwards,pieceOut .35s ease forwards;animation-delay:0s,.85s;transform:translateX(8px)}
.intro-beer{position:absolute;font-size:38px;opacity:0;animation:beerIn .45s ease forwards;animation-delay:1.05s}
.intro-sparkle{position:absolute;font-size:20px;opacity:0;animation:sparkleFade 1s ease forwards;animation-delay:1.2s}
@keyframes spin{to{transform:rotate(360deg)}}
.verify-waiting{position:relative;width:110px;height:110px;display:flex;align-items:center;justify-content:center}
.verify-waiting-ring{position:absolute;inset:0;border-radius:50%;border:2px solid var(--wine);opacity:0;animation:verifyPulse 2.6s ease-out infinite}
.verify-waiting-ring2{animation-delay:1.3s}
@keyframes verifyPulse{0%{transform:scale(.55);opacity:.7}70%{opacity:0}100%{transform:scale(1);opacity:0}}
.verify-waiting-core{width:56px;height:56px;border-radius:50%;background:var(--card);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:22px;animation:verifyBreathe 2.6s ease-in-out infinite}
@keyframes verifyBreathe{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.verify-dots span{opacity:0;animation:verifyDot 1.4s infinite}
.verify-dots span:nth-child(1){animation-delay:0s}
.verify-dots span:nth-child(2){animation-delay:.2s}
.verify-dots span:nth-child(3){animation-delay:.4s}
@keyframes verifyDot{0%,80%,100%{opacity:0}40%{opacity:1}}
.screen{flex:1;display:flex;flex-direction:column;animation:fadeUp .28s ease both}
.hdr{padding:16px 20px;border-bottom:1px solid var(--border2);flex-shrink:0;background:var(--bg);display:flex;align-items:center;gap:12px}
.hdr-back{background:transparent;border:none;cursor:pointer;font-family:inherit;font-size:13px;color:var(--muted);padding:4px 0;font-weight:600;flex-shrink:0}
.hdr-info{flex:1}
.hdr-step{font-size:10px;font-weight:700;color:var(--wine);letter-spacing:.12em;margin-bottom:2px}
.hdr-title{font-size:20px;font-weight:800;letter-spacing:-.02em}
.body{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.body::-webkit-scrollbar{width:0}
.ftr{padding:14px 20px 28px;flex-shrink:0;border-top:1px solid var(--border2);background:var(--bg)}
.btn{display:flex;align-items:center;justify-content:center;border:none;cursor:pointer;font-family:inherit;font-weight:800;border-radius:10px;transition:all .15s;font-size:16px;padding:15px 20px;width:100%;letter-spacing:.01em}
.btn-wine{background:var(--wine);color:#fff}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.inp{width:100%;padding:13px 14px;border-radius:10px;border:1.5px solid var(--border);background:#FFFFFF;color:#6A4A50;font-family:inherit;font-size:16px;outline:none;transition:border-color .15s,background-color .15s}
.inp::placeholder{color:#B08E8E}
.inp:focus{border-color:var(--wine)}
.inp.filled{border-color:var(--wine);background:#FBE9E9}
.sel-btn{flex:1;padding:14px 8px;border-radius:12px;border:1.5px solid var(--border);background:#FFFFFF;color:#6A4A50;font-family:inherit;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;transition:all .18s;font-size:13px;font-weight:700}
.sel-btn.on{border-color:var(--wine);background:var(--wine-bg);color:var(--cream)}
.choice-btn{width:100%;padding:14px 16px;border-radius:10px;border:1.5px solid var(--border);background:#FFFFFF;color:#6A4A50;font-family:inherit;cursor:pointer;text-align:left;font-size:14px;font-weight:600;transition:all .18s;display:flex;align-items:center;justify-content:space-between}
.choice-btn.on{border-color:var(--wine);background:var(--wine-bg);color:var(--cream)}
.sec-label{font-size:10px;font-weight:700;color:var(--wine);letter-spacing:.14em;padding:16px 20px 8px}
.err-msg{font-size:12px;color:var(--red);padding:4px 0;text-align:center}
.loading{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--wine);border-radius:50%;animation:spin 1s linear infinite}
.drow{display:flex;align-items:center;justify-content:space-between;padding:13px 20px;border-bottom:1px solid var(--border2)}
.drow-k{font-size:13px;color:var(--muted)}
.drow-v{font-size:14px;font-weight:700}
.match-wrap{flex:1;display:flex;flex-direction:column;overflow-y:auto;padding:0 0 40px}
.member-row{display:flex;align-items:center;gap:12px;padding:13px 20px;border-bottom:1px solid var(--border2)}
.chat-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden}
.chat-msgs{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:12px}
.chat-msgs::-webkit-scrollbar{width:0}
.msg-system{text-align:center;font-size:11px;color:var(--muted);padding:7px 14px;background:var(--surface);border-radius:20px;align-self:center}
.msg-row{display:flex;gap:10px;align-items:flex-end}
.msg-row.mine{flex-direction:row-reverse}
.msg-av{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.msg-bubble{padding:10px 13px;border-radius:14px;font-size:14px;max-width:200px;line-height:1.5}
.chat-input{padding:12px 16px;border-top:1px solid var(--border2);display:flex;gap:10px;background:var(--bg);flex-shrink:0}
.chat-inp{flex:1;padding:11px 14px;border-radius:24px;border:1.5px solid var(--border);background:var(--card);color:var(--cream);font-family:inherit;font-size:15px;outline:none}
.chat-inp:focus{border-color:var(--wine)}
.chat-send{width:42px;height:42px;border-radius:50%;background:var(--wine);border:none;cursor:pointer;color:#fff;font-size:18px;flex-shrink:0}
.star-btn{cursor:pointer;background:none;border:none;padding:4px;outline:none;-webkit-appearance:none;appearance:none;box-shadow:none;display:inline-flex}
.star-btn:focus,.star-btn:active,.star-btn:focus-visible{outline:2px solid var(--gold) !important;outline-offset:2px;border-radius:6px;box-shadow:none !important}
.check-item{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:10px;background:var(--card);border:1.5px solid var(--border);cursor:pointer;transition:all .15s;width:100%;font-family:inherit;text-align:left}
.check-item.on{border-color:var(--wine);background:var(--wine-bg)}
.tag-chip{display:inline-flex;align-items:center;padding:9px 16px;border-radius:999px;background:var(--card);border:1.5px solid var(--border);cursor:pointer;transition:all .15s;font-family:inherit;font-size:13px;font-weight:700;color:var(--muted)}
.tag-chip.on{border-color:var(--wine);background:var(--wine);color:#fff}
.tab-btn{flex:1;padding:11px;border:none;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s}
.range-row{display:flex;gap:6px;padding:0 20px}
.range-btn{flex:1;padding:10px 4px;border-radius:8px;border:1.5px solid var(--border);background:#FFFFFF;color:#6A4A50;font-family:inherit;cursor:pointer;font-size:11px;font-weight:700;text-align:center;transition:all .18s}
.range-btn.on{border-color:var(--wine);background:var(--wine-bg);color:var(--cream)}
.mode-card{position:relative;border-radius:16px;overflow:hidden;cursor:pointer;border:2px solid var(--border);transition:all .18s}
.mode-card:active{transform:scale(.98)}
.mode-card img{width:100%;height:180px;object-fit:cover;object-position:center;display:block}
.mode-card-square img{object-position:center 25%}
.mode-card-label{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.8));padding:18px 16px 14px}
.mode-card-title{font-size:17px;font-weight:900;color:#fff}
.card-selected{border-color:var(--gold) !important;box-shadow:0 0 0 3px var(--gold-bg),0 0 20px 4px rgba(224,176,96,.7);transition:box-shadow .15s,border-color .15s}
.area-card img{filter:saturate(.65) contrast(1.08) brightness(.85)}
.area-card-tint{position:absolute;inset:0;background:linear-gradient(180deg,rgba(74,18,26,.35),rgba(74,18,26,.15) 40%,rgba(0,0,0,.65));pointer-events:none}
.area-card-label{position:absolute;bottom:0;left:0;right:0;padding:16px}
.area-card-title{font-size:22px;font-weight:900;color:#fff;letter-spacing:.02em;text-shadow:0 2px 8px rgba(0,0,0,.6)}
</style>
</head>

function seededRandom(seed){
  var x=Math.sin(seed)*10000;
  return x-Math.floor(x);
}
function getTodaySeed(){
  var d=new Date();
  return d.getFullYear()*10000+(d.getMonth()+1)*100+d.getDate();
}

// 12жҳҹеә§Г—4й …зӣ®гҒ¶гӮ“гҒ®гҖҢд»Ҡж—ҘгҒ®йҒӢеӢўгҖҚгӮ’1еӣһгҒ гҒ‘з”ҹжҲҗгҒ—гҒҰгӮӯгғЈгғғгӮ·гғҘгҒҷгӮӢ
var _todayFortuneCache=null;
function getTodayFortunes(){
  if(_todayFortuneCache&&_todayFortuneCache._seed===getTodaySeed())return _todayFortuneCache;
  var seed=getTodaySeed();
  var result={_seed:seed,signs:[]};
  ZODIAC_SIGNS.forEach(function(sign,si){
    var cats=FORTUNE_CATEGORIES.map(function(cat,ci){
      var r1=seededRandom(seed+si*31+ci*7+1);
      var r2=seededRandom(seed+si*31+ci*7+2);
      var stars=1+Math.floor(r1*5); // 1гҖң5
      var tpl=cat.templates[Math.floor(r2*cat.templates.length)];
      return {label:cat.label,icon:cat.icon,stars:stars,text:tpl};
    });
    result.signs.push({name:sign.name,emoji:sign.emoji,cats:cats});
  });
  _todayFortuneCache=result;
  return result;
}

function starsHtmlSmall(n){
  var s='';
  for(var i=1;i<=5;i++){s+=(i<=n?'вҳ…':'вҳҶ');}
  return s;
}

function areaName(id){var a=AREAS.find(function(x){return x.id===id;});return a?a.name:id||'';}

function clampAgeMin(val,defaultMin){
  var n=parseInt(val);
  if(isNaN(n))return defaultMin;
  if(n>defaultMin)n=defaultMin;
  if(n<20)n=20;
  return n;
}
function clampAgeMax(val,defaultMax){
  var n=parseInt(val);
  if(isNaN(n))return defaultMax;
  if(n<defaultMax)n=defaultMax;
  if(n>99)n=99;
  return n;
}

function ageMatches(isAny,minAge,maxAge,otherAge){
  if(isAny)return true;
  if(otherAge==null||minAge==null||maxAge==null)return true;
  return otherAge>=minAge&&otherAge<=maxAge;
}

function escapeHtml(str){
  if(str==null)return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function digitsOnly(el){
  var v=el.value.replace(/[пјҗ-пјҷ]/g,function(c){return String.fromCharCode(c.charCodeAt(0)-0xFEE0);});
  el.value=v.replace(/[^0-9]/g,'');
}

function startWaitMessageRotation(){
  if(S._waitMsgTimer)clearInterval(S._waitMsgTimer);
  S._waitSignIdx=Math.floor(seededRandom(Date.now())*12); // й–Ӣе§Ӣжҳҹеә§гҒҜгғ©гғігғҖгғ 
  renderZodiacCard(false);
  S._waitMsgTimer=setInterval(function(){
    rotateZodiacCard();
  },7500);
}

function rotateZodiacCard(){
  var cardEl=document.getElementById('zodiac-card');
  if(!cardEl)return;
  cardEl.style.opacity='0';
  setTimeout(function(){
    S._waitSignIdx=(S._waitSignIdx+1)%12;
    renderZodiacCard(true);
  },500);
}

function renderZodiacCard(fadeIn){
  var cardEl=document.getElementById('zodiac-card');
  if(!cardEl)return;
  var data=getTodayFortunes();
  var sign=data.signs[S._waitSignIdx];
  cardEl.innerHTML=zodiacCardInnerHtml(sign);
  if(fadeIn){
    setTimeout(function(){cardEl.style.opacity='1';},30);
  }else{
    cardEl.style.opacity='1';
  }
}

function zodiacCardInnerHtml(sign){
  var rows=sign.cats.map(function(c){
    return '<div style="display:flex;align-items:center;gap:8px;padding:7px 0">'
      +'<span style="font-size:14px;width:20px;text-align:center">'+c.icon+'</span>'
      +'<span style="font-size:11.5px;color:var(--muted);width:52px;flex-shrink:0">'+c.label+'</span>'
      +'<span style="font-size:12px;color:var(--gold);letter-spacing:1px;width:78px;flex-shrink:0">'+starsHtmlSmall(c.stars)+'</span>'
      +'<span style="font-size:12px;color:var(--cream);line-height:1.5;flex:1">'+c.text+'</span>'

  if(!S.profile){

    }

    return;
  }
  if(!S.profile.stripe_customer_id){

    startPolling();

      S._reportTargetUserId=opponentR?opponentR.user_id:null;
      go('report');
    }else{
      go('splash');
    }
    return;
  }
  var lastScreen2=sessionStorage.getItem('ngo_screen');
  var restorable=['area_select','mode_select','recruit','profile_edit','terms','privacy','inquiry','faqbot','forgot_password'];
  var recruitFlowScreens=['area_select','mode_select','recruit'];
  var lastActive=parseInt(sessionStorage.getItem('ngo_last_active')||'0');
  var awayMs=Date.now()-lastActive;
  var wasAwayLong=lastActive>0&&awayMs>2*60*1000;
  if(lastScreen2&&recruitFlowScreens.indexOf(lastScreen2)!==-1&&wasAwayLong){
    S.form={area:null,slot:null,drink_style:null,timing:null,age_min:null,age_max:null,age_any:false};
    go('splash');
    return;
  }
  if(lastScreen2&&restorable.indexOf(lastScreen2)!==-1){
    var savedForm=sessionStorage.getItem('ngo_form');
    if(savedForm){
      try{
        var parsed=JSON.parse(savedForm);

    if(lastScreen2==='profile_edit'){
      goProfileEdit();

      if(!S.faqMsgs||!S.faqMsgs.length){goFaqBot();}else{go('faqbot');}
    }else{
      go(lastScreen2);
    }
    return;
  }
  go('splash');
}

// ===== йЎ”еҶҷзңҹж’®еҪұж©ҹиғҪпјҲгҒ“гҒ“гҒӢгӮүиҝҪеҠ пјү =====
var _faceStream=null;
var _faceDetectTimer=null;
var _faceStableCount=0;
var _faceCaptured=false;
var _faceCountdownTimer=null;
var _faceCountdownValue=0;

async function openFaceCamera(){
  S._faceCameraError='';
  S._faceCameraStatus='searching';
  _faceStableCount=0;
  _faceCaptured=false;
  _faceCountdownValue=0;
  if(_faceCountdownTimer){clearInterval(_faceCountdownTimer);_faceCountdownTimer=null;}
  re('id_verify');
  try{

  }catch(e){
    S._faceCameraError='гӮ«гғЎгғ©гӮ’иө·еӢ•гҒ§гҒҚгҒҫгҒӣгӮ“гҒ§гҒ—гҒҹгҖӮгӮ«гғЎгғ©гҒ®еҲ©з”ЁгӮ’иЁұеҸҜгҒ—гҒҰгҒҸгҒ гҒ•гҒ„гҖӮ';

  }
  S._faceCameraOpen=true;
  re('id_verify');
  setTimeout(function(){

// жһ гҒ®дёӯеӨ®гӮЁгғӘгӮўгӮ’дёҖе®ҡй–“йҡ”гҒ§гӮөгғігғ—гғӘгғігӮ°гҒ—гҖҒгҖҢйЎ”гӮүгҒ—гҒҚгӮӮгҒ®пјҲиӮҢиүІгғ»еҚҒеҲҶгҒӘжҳҺгӮӢгҒ•пјүгҖҚгҒҢ
// е®үе®ҡгҒ—гҒҰжҳ гҒЈгҒҰгҒ„гӮӢгҒӢгӮ’з°Ўжҳ“еҲӨе®ҡгҒҷгӮӢгҖӮеҺіеҜҶгҒӘйЎ”иӘҚиӯҳгҒ§гҒҜгҒӘгҒҸз°Ўжҳ“зҡ„гҒӘиҝ‘дјјеҲӨе®ҡгҖӮ
function startFaceDetectLoop(video){
  if(_faceDetectTimer)clearInterval(_faceDetectTimer);
  var canvas=document.createElement('canvas');
  var ctx=canvas.getContext('2d',{willReadFrequently:true});
  canvas.width=60;canvas.height=80;
  _faceDetectTimer=setInterval(function(){
    if(_faceCaptured||!video||video.readyState<2)return;
    try{
      ctx.drawImage(video,video.videoWidth*0.3,video.videoHeight*0.15,video.videoWidth*0.4,video.videoHeight*0.55,0,0,60,80);
      var data=ctx.getImageData(0,0,60,80).data;
      var skinPixels=0,totalBrightness=0,count=0;
      for(var i=0;i<data.length;i+=4){
        var r=data[i],g=data[i+1],b=data[i+2];
        var brightness=(r+g+b)/3;
        totalBrightness+=brightness;
        count++;
        // гҒ–гҒЈгҒҸгӮҠгҒЁгҒ—гҒҹиӮҢиүІгғ¬гғігӮёеҲӨе®ҡ
        if(r>60&&g>35&&b>20&&r>g&&r>b&&(r-g)>10&&(r-b)>10){skinPixels++;}
      }
      var avgBrightness=totalBrightness/count;
      var skinRatio=skinPixels/count;
      var looksLikeFace=avgBrightness>40&&avgBrightness<235&&skinRatio>0.18;

      if(looksLikeFace){
        _faceStableCount++;
      }else{
        _faceStableCount=0;
        // йЎ”гҒҢеӨ–гӮҢгҒҹгӮүгӮ«гӮҰгғігғҲгғҖгӮҰгғігӮ’дёӯж–ӯгҒ—гҒҰгӮ„гӮҠзӣҙгҒ—
        if(_faceCountdownTimer){clearInterval(_faceCountdownTimer);_faceCountdownTimer=null;}
        S._faceCameraStatus='searching';
        updateFaceCameraStatusUI();
      }

      // зӣ®е®үпјҡеҲӨе®ҡй–“йҡ”150msгҒ§4еӣһйҖЈз¶ҡе®үе®ҡ = зҙ„0.6з§’гӮӯгғјгғ—гҒ—гҒҹгӮүгӮ«гӮҰгғігғҲгғҖгӮҰгғій–Ӣе§Ӣ
      if(_faceStableCount>=4&&!_faceCaptured&&!_faceCountdownTimer){
        startFaceCountdown();
      }
    }catch(e){}
  },150);
}

// 3вҶ’2вҶ’1гҒ®гӮ«гӮҰгғігғҲгғҖгӮҰгғігӮ’иЎЁзӨәгҒ—гҖҒ0гҒ«гҒӘгҒЈгҒҹгӮүж’®еҪұгҒҷгӮӢ
function startFaceCountdown(){
  _faceCountdownValue=3;
  S._faceCameraStatus='counting';
  updateFaceCameraStatusUI();
  _faceCountdownTimer=setInterval(function(){
    _faceCountdownValue--;
    if(_faceCountdownValue<=0){
      clearInterval(_faceCountdownTimer);_faceCountdownTimer=null;
      if(_faceCaptured)return;
      _faceCaptured=true;
      S._faceCameraStatus='captured';
      updateFaceCameraStatusUI();
      setTimeout(function(){captureFacePhoto();},200);
      return;
    }
    updateFaceCameraStatusUI();
  },800);
}

// з”»йқўе…ЁдҪ“гӮ’еҶҚжҸҸз”»гҒӣгҒҡгҖҒзҠ¶ж…ӢгғҶгӮӯгӮ№гғҲгғ»гӮ«гӮҰгғігғҲгғҖгӮҰгғіж•°еӯ—гғ»гӮ¬гӮӨгғүжһ гҒ®иүІгҒ гҒ‘гӮ’зӣҙжҺҘжӣёгҒҚжҸӣгҒҲгӮӢпјҲгӮ«гғЎгғ©жҳ еғҸгҒ®еҶҚгғһгӮҰгғігғҲгӮ’йҳІгҒҗпјү
function updateFaceCameraStatusUI(){
  var label=document.getElementById('face-status-label');
  var ring=document.getElementById('face-guide-ring');
  var countEl=document.getElementById('face-countdown-num');
  if(!label||!ring)return;
  if(S._faceCameraStatus==='counting'){
    label.textContent='гҒқгҒ®гҒҫгҒҫеӢ•гҒӢгҒӘгҒ„гҒ§гҒҸгҒ гҒ•гҒ„';
    ring.style.borderColor='rgba(123,224,144,.95)';
    if(countEl){countEl.textContent=_faceCountdownValue>0?_faceCountdownValue:'';countEl.style.display='flex';}
  }else if(S._faceCameraStatus==='captured'){
    label.textContent='ж’®еҪұгҒ—гҒҫгҒ—гҒҹпјҒ';
    ring.style.borderColor='rgba(123,224,144,.95)';
    if(countEl)countEl.style.display='none';
  }else{
    label.textContent='жһ гҒ®дёӯгҒ«йЎ”гӮ’еҗҲгӮҸгҒӣгҒҰгҒҸгҒ гҒ•гҒ„';
    ring.style.borderColor='rgba(255,255,255,.85)';
    if(countEl)countEl.style.display='none';
  }
}

function closeFaceCamera(){
  if(_faceDetectTimer){clearInterval(_faceDetectTimer);_faceDetectTimer=null;}
  if(_faceCountdownTimer){clearInterval(_faceCountdownTimer);_faceCountdownTimer=null;}
  if(_faceStream){
    _faceStream.getTracks().forEach(function(t){t.stop();});

}

function captureFacePhoto(){
  var video=document.getElementById('face-camera-video');
  if(!video)return;
  if(_faceDetectTimer){clearInterval(_faceDetectTimer);_faceDetectTimer=null;}
  if(_faceCountdownTimer){clearInterval(_faceCountdownTimer);_faceCountdownTimer=null;}
  var canvas=document.createElement('canvas');
  canvas.width=video.videoWidth;
  canvas.height=video.videoHeight;
  var ctx=canvas.getContext('2d');
  ctx.drawImage(video,0,0,canvas.width,canvas.height);
  canvas.toBlob(function(blob){
    if(!blob)return;
    S._facePhotoFile=new File([blob],'face_'+Date.now()+'.jpg',{type:'image/jpeg'});
    S._facePhotoPreview=canvas.toDataURL('image/jpeg');
    closeFaceCamera();
  },'image/jpeg',0.9);
}

function retakeFacePhoto(){
  S._facePhotoFile=null;
  S._facePhotoPreview=null;
  openFaceCamera();
}

async function uploadFacePhoto(userId,file){
  if(!file)return {path:null,error:null};
  var path=userId+'/face_'+Date.now()+'.jpg';
  var up=await DB.storage.from('id_photos').upload(path,file,{upsert:true});
  if(up.error)return {path:null,error:up.error.message||JSON.stringify(up.error)};
  return {path:path,error:null};
}

var _idVerifySubmitting=false;
async function submitIdVerify(){
  if(_idVerifySubmitting)return;
  if(!S._idPhotoFile){S.error='иә«еҲҶиЁјгҒ®еҶҷзңҹгӮ’йҒёгӮ“гҒ§гҒҸгҒ гҒ•гҒ„';re('id_verify');return;}
  if(!S._facePhotoFile){S.error='йЎ”еҶҷзңҹгӮӮж’®еҪұгҒ—гҒҰгҒҸгҒ гҒ•гҒ„';re('id_verify');return;}
  _idVerifySubmitting=true;
  go('loading');
  var sessionCheck=await DB.auth.getSession();
  var hasSession=!!(sessionCheck.data&&sessionCheck.data.session);
  var result=await uploadIdPhoto(S.user.id,S._idPhotoFile);
  if(!result.path){
    _idVerifySubmitting=false;
    S.error='гӮўгғғгғ—гғӯгғјгғүеӨұж•—: '+(result.error||'дёҚжҳҺ')+' / гғӯгӮ°гӮӨгғізҠ¶ж…Ӣ:'+(hasSession?'гҒӮгӮҠ':'гҒӘгҒ—');
    re('id_verify');
    return;
  }
  var faceResult=await uploadFacePhoto(S.user.id,S._facePhotoFile);
  if(!faceResult.path){
    _idVerifySubmitting=false;
    S.error='йЎ”еҶҷзңҹгҒ®гӮўгғғгғ—гғӯгғјгғүгҒ«еӨұж•—гҒ—гҒҫгҒ—гҒҹ: '+(faceResult.error||'дёҚжҳҺ');
    re('id_verify');
    return;
  }
  var path=result.path;
  var facePath=faceResult.path;
  var upd=await DB.from('profiles').update({id_photo_url:path,face_photo_url:facePath,id_verify_status:'pending'}).eq('user_id',S.user.id).select().single();
  _idVerifySubmitting=false;
  if(upd.error){S.error='дҝқеӯҳгҒ«еӨұж•—гҒ—гҒҫгҒ—гҒҹ: '+upd.error.message;re('id_verify');return;}
  S.profile.id_photo_url=path;
  S.profile.face_photo_url=facePath;
  S.profile.id_verify_status='pending';
  S._idPhotoFile=null;S._idPhotoPreview=null;S._facePhotoFile=null;S._facePhotoPreview=null;
  go('id_verify_pending');
  startIdVerifyPolling();
}

function startIdVerifyPolling(){
  if(S._idVerifyTimer)clearInterval(S._idVerifyTimer);
  S._idVerifyTimer=setInterval(async function(){
    if(S.screen!=='id_verify_pending'){clearInterval(S._idVerifyTimer);S._idVerifyTimer=null;return;}
    var res=await DB.from('profiles').select('id_verify_status').eq('user_id',S.user.id).single();
    if(res.data&&res.data.id_verify_status==='approved'){
      clearInterval(S._idVerifyTimer);S._idVerifyTimer=null;
      S.profile.id_verify_status='approved';
      go('splash');
    }else if(res.data&&res.data.id_verify_status==='rejected'){
      clearInterval(S._idVerifyTimer);S._idVerifyTimer=null;
      S.profile.id_verify_status='rejected';
      re('id_verify_pending');
    }
  },5000);
}

async function goRecruit(){
  if(!S.user){go('email');return;}
  if(!S.profile){S.pf={nickname:'',age:'',gender:null,job:null,smoke:null,alcohol:null};go('profile_new');return;}
  if(S.match&&S.registration&&S.registration.status==='matched'){
    alert('зҸҫеңЁгғһгғғгғҒдёӯгҒ§гҒҷгҖӮзҸҫеңЁгҒ®гғһгғғгғҒгҒҢзөӮдәҶгҒҷгӮӢгҒЁгҖҒж–°гҒ—гҒ„гҒҠзӣёжүӢгӮ’жҺўгҒӣгҒҫгҒҷгҖӮ');
    return;
  }
  var cancelCheck=await DB.from('registrations').select('id',{count:'exact',head:true}).eq('user_id',S.user.id).eq('status','cancelled').not('match_id','is',null);
  if(cancelCheck.count!=null&&cancelCheck.count>=2){
    var proceed=confirm('йҒҺеҺ»гҒ«гғһгғғгғҒжҲҗз«ӢеҫҢгҒ®гӮӯгғЈгғігӮ»гғ«гҒҢ2еӣһд»ҘдёҠгҒӮгӮҠгҒҫгҒҷгҖӮгғһгғғгғҒжҲҗз«ӢеҫҢгҒ®гӮӯгғЈгғігӮ»гғ«гҒ«гҒҜгғҡгғҠгғ«гғҶгӮЈгҒҢзҷәз”ҹгҒ—гҒҫгҒҷгҖӮгҒ“гҒ®гҒҫгҒҫеӢҹйӣҶгӮ’з¶ҡгҒ‘гҒҫгҒҷгҒӢпјҹ');
    if(!proceed)return;
  }
  var registered=await isCardRegistered();
  if(!registered){go('cardregister');return;}
  var idStatus=await getIdVerifyStatus();
  if(idStatus!=='approved'){
    if(!idStatus||idStatus==='none'){go('id_verify');}else{go('id_verify_pending');}
    return;
  }
  await loadAreaStats();
  go('area_select');
}

async function getIdVerifyStatus(){
  if(!S.user)return 'none';
  var res=await DB.from('profiles').select('id_photo_url,id_verify_status').eq('user_id',S.user.id).single();
  if(res.error||!res.data)return 'none';
  if(S.profile){S.profile.id_photo_url=res.data.id_photo_url;S.profile.id_verify_status=res.data.id_verify_status;}
  if(!res.data.id_photo_url)return 'none';
  return res.data.id_verify_status||'pending';
}

async function isCardRegistered(){

async function chargeForTicket(customerId){
  if(_ticketPurchasing)return;
  _ticketPurchasing=true;
  try{
    var res=await fetch('/api/charge',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({mode:'charge_customer',customer_id:customerId,amount:3000,description:'Nomi Go гғҒгӮұгғғгғҲиіје…Ҙ'})});
    var data=await res.json();
    if(!data.success){
      S.error=data.error||'жұәжёҲгҒ«еӨұж•—гҒ—гҒҫгҒ—гҒҹ';
      _ticketPurchasing=false;
      return;
    }
    var current=await DB.from('profiles').select('ticket_count').eq('user_id',S.user.id).single();
    var newCount=(current.data&&current.data.ticket_count?current.data.ticket_count:0)+1;
    var upd=await DB.from('profiles').update({ticket_count:newCount}).eq('user_id',S.user.id).select().single();
    if(upd.error||!upd.data){
      S.error='гғҒгӮұгғғгғҲеҸҚжҳ гӮЁгғ©гғј: '+(upd.error?upd.error.message:'дёҚжҳҺгҒӘгӮЁгғ©гғј');
      _ticketPurchasing=false;
      return;
    }
    S.profile.ticket_count=upd.data.ticket_count;
    S.error='';
    S.ticketPurchaseSuccess=true;
    render();

    setTimeout(function(){S.ticketPurchaseSuccess=false;_ticketPurchasing=false;render();},4000);
  }catch(e){
    S.error='гӮЁгғ©гғј: '+e.message;
    _ticketPurchasing=false;
  }
}

async function doRegister(){
  go('loading');
  var timeoutFlag={hit:false};
  var timeoutId=setTimeout(function(){
    timeoutFlag.hit=true;
    _isSubmitting=false;
    S.error='йҖҡдҝЎгҒ«жҷӮй–“гҒҢгҒӢгҒӢгҒЈгҒҰгҒ„гҒҫгҒҷгҖӮгӮӮгҒҶдёҖеәҰгҒҠи©ҰгҒ—гҒҸгҒ гҒ•гҒ„гҖӮ';
    re('recruit');
  },10000);
  try{
    var existing=await DB.from('registrations').select('id').eq('user_id',S.user.id).eq('status','waiting').single();
    if(timeoutFlag.hit)return;
    if(existing.data){clearTimeout(timeoutId);_isSubmitting=false;S.registration=existing.data;startPolling();go('waiting');return;}
    var ins=await DB.from('registrations').insert({
      user_id:S.user.id,
      area_id:S.form.area,
      slot:S.form.slot,
      mode:S.form.mode||'1v1',
      gender:S.profile.gender,
      drink_style:S.form.drink_style,
      timing:'гҒ©гҒЎгӮүгҒ§гӮӮOK',
      duration_pref:S.form.slot==='д»ҠгҒҷгҒҗ'?(S.form.duration_pref||null):null,
      age_any:!!S.form.age_any,
      age_min:S.form.age_any?null:parseInt(S.form.age_min),
      age_max:S.form.age_any?null:parseInt(S.form.age_max),
      age:S.profile.age,
      smoke:S.profile.smoke,
      alcohol:S.profile.alcohol,
      partner_age:S.form.mode==='2v2'&&S.form.partner_age?parseInt(S.form.partner_age):null,
      payment_intent_id:S.chargeId||null,
      status:'waiting'
    }).select().single();
    if(timeoutFlag.hit)return;
    if(ins.error){clearTimeout(timeoutId);_isSubmitting=false;S.error='зҷ»йҢІгӮЁгғ©гғј: '+ins.error.message;re('recruit');return;}
    clearTimeout(timeoutId);
    S.registration=ins.data;
    var matched=await tryMatch();
    if(matched){go('matched');}else{startPolling();go('waiting');}
  }catch(e){clearTimeout(timeoutId);if(!timeoutFlag.hit){_isSubmitting=false;S.error='зҷ»йҢІгҒ«еӨұж•—гҒ—гҒҫгҒ—гҒҹ: '+e.message;re('recruit');}}
}

async function tryMatch(){
  if(!S.registration){dbgLog('S0: registration=null');return false;}
  var p=S.profile;
  dbgLog('S1: area='+S.form.area+' slot='+S.form.slot+' timing='+S.form.timing);

  var candidates=await DB.from('registrations').select('*').eq('status','waiting').eq('area_id',S.form.area).eq('mode',S.registration.mode||'1v1').neq('gender',p.gender).neq('user_id',S.user.id);
  dbgLog('S2: err='+(candidates.error?candidates.error.message:'гҒӘгҒ—')+' д»¶ж•°='+(candidates.data?candidates.data.length:0));
  if(!candidates.data||candidates.data.length===0){return false;}

  var filtered=candidates.data.filter(function(c){
    if(c.drink_style!==S.form.drink_style)return false;
    var iWantThem=ageMatches(S.form.age_any,S.form.age_min?parseInt(S.form.age_min):null,S.form.age_max?parseInt(S.form.age_max):null,c.age);
    var theyWantMe=ageMatches(c.age_any,c.age_min,c.age_max,p.age);
    return iWantThem&&theyWantMe;
  });
  dbgLog('S3: filtered='+filtered.length);
  if(filtered.length===0){return false;}

  var best=filtered[0];
  var prof=await DB.from('profiles').select('*').eq('user_id',best.user_id).single();
  dbgLog('S4: prof='+(prof.data?prof.data.nickname:'null')+' err='+(prof.error?prof.error.message:'гҒӘгҒ—'));
  best.profileData=prof.data||{};

  if(!S.form.slot){dbgLog('S4x: slot=undefined abort');return false;}

  var lockOpponent=await DB.from('registrations').update({status:'processing'}).eq('id',best.id).eq('status','waiting').select().single();
  dbgLog('S4b: lock err='+(lockOpponent.error?lockOpponent.error.message:'гҒӘгҒ—')+' data='+(lockOpponent.data?'OK':'null'));
  if(lockOpponent.error||!lockOpponent.data){
    dbgLog('S4b: д»–з«Ҝжң«гҒҢе…ҲгҒ«зўәдҝқжёҲгҒҝгҒ®гҒҹгӮҒдёӯж–ӯ');
    return false;
  }

  var matchRes=await DB.from('matches').insert({
    area_id:S.form.area,
    slot:S.form.slot,
    mode:'1v1',
    timing:S.form.timing,
    status:'confirmed'
  }).select().single();
  dbgLog('S5: err='+(matchRes.error?matchRes.error.message:'гҒӘгҒ—')+' id='+(matchRes.data?matchRes.data.id.slice(0,8):'null'));
  if(matchRes.error){
    await DB.from('registrations').update({status:'waiting'}).eq('id',best.id);
    return false;
  }
  S.match=matchRes.data;

  var u1=await DB.from('registrations').update({status:'matched',match_id:matchRes.data.id}).eq('id',S.registration.id);
  var u2=await DB.from('registrations').update({status:'matched',match_id:matchRes.data.id}).eq('id',best.id);
  dbgLog('S6: u1='+(u1.error?u1.error.message:'OK')+' u2='+(u2.error?u2.error.message:'OK'));

  if(u1.error||u2.error)return false;

  S.registration.status='matched';
  S.registration.match_id=matchRes.data.id;

  var maleUserId=(p.gender==='male')?S.user.id:best.user_id;
  await consumeTicket(matchRes.data.id,maleUserId);
  
  await syncUserState();

  await loadMatchMembers();
  sendMatchLineNotify(p,best.profileData);
  render();
  return true;
}

function sendMatchLineNotify(myProfile,otherProfile){
  var targets=[myProfile,otherProfile];
  targets.forEach(function(t){
    if(t&&t.line_user_id){
      fetch('/api/line-notify',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({lineUserId:t.line_user_id,message:'рҹҚ» гғһгғғгғҒгҒҢжҲҗз«ӢгҒ—гҒҫгҒ—гҒҹпјҒNomi GoгӮўгғ—гғӘгӮ’й–ӢгҒ„гҒҰгғҒгғЈгғғгғҲгӮ’зўәиӘҚгҒ—гҒҰгҒҸгҒ гҒ•гҒ„гҖӮ'})}).catch(function(){});
    }
  });
}

async function consumeTicket(matchId,targetUserId){
  dbgLog('T0: consumeTicketе‘јгҒіеҮәгҒ— matchId='+matchId.slice(0,8));
  var lockRes=await DB.from('matches').update({ticket_consumed:true}).eq('id',matchId).eq('ticket_consumed',false).select().single();
  dbgLog('T1: lockRes err='+(lockRes.error?lockRes.error.message:'гҒӘгҒ—')+' data='+(lockRes.data?JSON.stringify(lockRes.data).slice(0,80):'null'));
  if(lockRes.error||!lockRes.data){
    dbgLog('T1x: ж¶ҲиІ»жёҲгҒҝorеҜҫиұЎгҒӘгҒ—гҒ®гҒҹгӮҒдёӯж–ӯ');
    return;
  }
  var current=await DB.from('profiles').select('ticket_count').eq('user_id',targetUserId).single();
  dbgLog('T2: current err='+(current.error?current.error.message:'гҒӘгҒ—')+' ticket_count='+(current.data?current.data.ticket_count:'null'));
  var oldCount=current.data&&current.data.ticket_count?current.data.ticket_count:0;
  var newCount=oldCount-1;
  if(newCount<0)newCount=0;
  var upd=await DB.from('profiles').update({ticket_count:newCount}).eq('user_id',targetUserId).eq('ticket_count',oldCount).select().single();
  dbgLog('T3: upd err='+(upd.error?upd.error.message:'гҒӘгҒ—')+' newCount='+(upd.data?upd.data.ticket_count:'null'));
  if(upd.error||!upd.data){
    dbgLog('T3x: DBжӣҙж–°еӨұж•—');
  }
}

function startPolling(){
  if(S.pollTimer)clearInterval(S.pollTimer);
  dbgLog('pollingй–Ӣе§Ӣ reg='+(S.registration?S.registration.id.slice(0,8):'null'));
  S.pollTimer=setInterval(async function(){
    try{
      if(S.registration){
        var reg=await DB.from('registrations').select('status,match_id').eq('id',S.registration.id).single();
        if(reg.data&&reg.data.status==='matched'&&reg.data.match_id){
          clearInterval(S.pollTimer);
          var m=await DB.from('matches').select('*').eq('id',reg.data.match_id).single();
          if(m.data){
            S.registration.status='matched';
            S.registration.match_id=reg.data.match_id;
            S.match=m.data;await loadMatchMembers();_isSubmitting=false;go('matched');return;
          }
        }
      }
      var matched=await tryMatch();
      if(matched){clearInterval(S.pollTimer);_isSubmitting=false;go('matched');}
      loadStats();
    }catch(e){}
  },8000);
}

async function setMatchResultOnce(matchId,newStatus,extraFields){
  if(!matchId)return false;
  var updateData=Object.assign({status:newStatus},extraFields||{});
  var res=await DB.from('matches').update(updateData).eq('id',matchId).eq('status','confirmed').select().single();
  if(res.error||!res.data){
    return false;
  }
  return true;
}

async function saveUserResult(matchId,userResult){
  if(!matchId||!S.user)return;
  var cur=await DB.from('matches').select('*').eq('id',matchId).single();
  if(cur.error||!cur.data)return;
  var m=cur.data;
  var updateData={};
  var otherResult=null;

  if(!m.result_a_user_id){
    updateData.result_a=userResult;
    updateData.result_a_user_id=S.user.id;
    otherResult=null;
  }else if(m.result_a_user_id===S.user.id){
    return;
  }else if(!m.result_b_user_id){
    updateData.result_b=userResult;
    updateData.result_b_user_id=S.user.id;
    otherResult=m.result_a;
  }else if(m.result_b_user_id===S.user.id){
    return;
  }else{
    return;
  }

  if(otherResult){
    var myResult=userResult;
    var theirResult=otherResult;
    if(myResult==='completed'&&theirResult==='completed'){
      updateData.verdict='normal';
    }else if(myResult==='cancelled'&&theirResult==='cancelled'){
      updateData.verdict='both_cancelled';
    }else{
      updateData.verdict='needs_review';
    }
  }

  if(Object.keys(updateData).length>0){
    await DB.from('matches').update(updateData).eq('id',matchId);
  }
}

async function cancelAfterMatch(){
  if(S.match){
    await setMatchResultOnce(S.match.id,'cancelled');
    await saveUserResult(S.match.id,'cancelled');
  }
  if(S.registration)await DB.from('registrations').update({status:'cancelled'}).eq('id',S.registration.id);
  S.registration=null;S.match=null;S.chargeId=null;_isSubmitting=false;
  S.form={area:null,slot:null,drink_style:null,timing:null,age_min:null,age_max:null,age_any:false};
  go('splash');
}

var _cancelSubmitting=false;
function confirmCancelAfterMatch(){
  if(_cancelSubmitting)return;
  if(!confirm('гӮӯгғЈгғігӮ»гғ«гҒҷгӮӢгҒЁ3,000еҶҶгҒ®гғҡгғҠгғ«гғҶгӮЈгҒҢзҷәз”ҹгҒ—гҒҫгҒҷгҖӮгӮҲгӮҚгҒ—гҒ„гҒ§гҒҷгҒӢпјҹ'))return;
  _cancelSubmitting=true;

function applyMessages(data){
  var sys=[{type:'system',id:'sys-0',content:'гғһгғғгғҒгғігӮ°жҲҗз«ӢпјҒгғҒгғЈгғғгғҲгҒҢдҪңжҲҗгҒ•гӮҢгҒҫгҒ—гҒҹ'}];
  if(S.match.ticket_consumed&&S.profile&&S.profile.gender==='male'){
    sys.push({type:'system',id:'sys-1',content:'рҹҺ« гғҒгӮұгғғгғҲгӮ’1жһҡдҪҝз”ЁгҒ—гҒҫгҒ—гҒҹ'});
  }
  var msgs=data.map(function(m){
    var nick='?';
    if(m.user_id===S.user.id&&S.profile){nick=S.profile.nickname;}
    else{var mm=S.matchMembers.find(function(x){return x.user_id===m.user_id;});if(mm&&mm.profiles)nick=mm.profiles.nickname||'?';}
    return {id:m.id,user_id:m.user_id,content:m.content,mine:m.user_id===S.user.id,nickname:nick};
  });
  var newMsgs=sys.concat(msgs);
  var currentIds=S.chatMsgs.map(function(m){return m.id;}).join(',');
  var newIds=newMsgs.map(function(m){return m.id;}).join(',');
  if(currentIds!==newIds){
    S.chatMsgs=newMsgs;
    if(S.screen==='chat'){
      render();
      setTimeout(function(){var el=document.querySelector('.chat-msgs');if(el)el.scrollTop=el.scrollHeight;},50);
    }
  }
}

}

var _reviewSubmitting=false;

function setReviewStars(n){
  var wasLow=S.reviewStars>0&&S.reviewStars<=2;
  var isLow=n<=2;
  if(wasLow!==isLow){
    S.reviewChecks=REVIEW_TAGS.map(function(){return false;});
    S.reviewOtherText='';
  }
  S.reviewStars=n;
  re('review');
}

function confirmSubmitReview(){
  if(_reviewSubmitting)return;
  if(!S.match||S.reviewStars===0)return;
  var anyTagSelected=S.reviewChecks.some(function(c){return c;});
  if(!anyTagSelected){alert('и©•дҫЎгӮҝгӮ°гӮ’1гҒӨд»ҘдёҠйҒёгӮ“гҒ§гҒҸгҒ гҒ•гҒ„');return;}
  var isLowNow=S.reviewStars>0&&S.reviewStars<=2;
  var checksNow=isLowNow?REVIEW_TAGS_LOW:REVIEW_TAGS;
  var otherIdxNow=checksNow.length-1;
  if(S.reviewChecks[otherIdxNow]&&(!S.reviewOtherText||!S.reviewOtherText.trim())){
    alert('гҖҢгҒқгҒ®д»–гҖҚгӮ’йҒёгӮ“гҒ е ҙеҗҲгҒҜеҶ…е®№гӮ’е…ҘеҠӣгҒ—гҒҰгҒҸгҒ гҒ•гҒ„');
    return;
  }
  if(!confirm('и©•дҫЎгӮ’йҖҒдҝЎгҒ—гҒҫгҒҷгҒӢпјҹ\nгҒ“гҒ®ж“ҚдҪңгҒҜйҖҒдҝЎеҫҢгҒ«еӨүжӣҙгҒ§гҒҚгҒҫгҒӣгӮ“гҖӮ'))return;
  _reviewSubmitting=true;
  re('review');
  submitReview().catch(function(){}).finally(function(){_reviewSubmitting=false;});
}

async function submitReview(){
  if(!S.match||S.reviewStars===0)return;
  var matchId=S.match.id;
  var targets=S.matchMembers.filter(function(m){return m.user_id!==S.user.id;});
  for(var i=0;i<targets.length;i++){
    var tagSource=(S.reviewStars>0&&S.reviewStars<=2)?REVIEW_TAGS_LOW:REVIEW_TAGS;
    var otherIdxSubmit=tagSource.length-1;
    var selectedTags=S.reviewChecks.map(function(checked,idx){
      if(!checked)return null;
      if(idx===otherIdxSubmit&&S.reviewOtherText&&S.reviewOtherText.trim()){
        return S.reviewOtherText.trim();
      }
      return tagSource[idx];
    }).filter(function(t){return t!==null;});
    var isLowNow2=S.reviewStars>0&&S.reviewStars<=2;
    var legacyPunctual=isLowNow2?false:S.reviewChecks[0];
    var legacyFriendly=isLowNow2?false:S.reviewChecks[1];
    var legacyAgain=isLowNow2?false:S.reviewChecks[2];
    await DB.from('reviews').insert({match_id:matchId,reviewer_id:S.user.id,reviewee_id:targets[i].user_id,stars:S.reviewStars,tag_punctual:legacyPunctual,tag_friendly:legacyFriendly,tag_again:legacyAgain,review_tags:selectedTags});
  }
  await setMatchResultOnce(matchId,'completed',{completed_at:new Date().toISOString()});
  await saveUserResult(matchId,'completed');
  if(S.registration)await DB.from('registrations').update({status:'completed'}).eq('id',S.registration.id);
  S.registration=null;S.match=null;S.matchMembers=[];S.form={area:null,slot:null,drink_style:null,timing:null,age_min:null,age_max:null,age_any:false};_isSubmitting=false;
  S.reviewStars=0;S.reviewChecks=[false,false,false];S.reviewOtherText='';S.chatMsgs=[];S.chargeId=null;go('splash');
}

async function submitEmailVerify(){
  var inp=document.getElementById('everify-inp');
  var errEl=document.getElementById('everify-err');
  var code=inp?inp.value.trim():'';
  if(!code){if(errEl)errEl.textContent='гӮігғјгғүгӮ’е…ҘеҠӣгҒ—гҒҰгҒҸгҒ гҒ•гҒ„';return;}
  var res=await DB.from('email_verifications').select('code').eq('user_id',S.user.id);
  var savedCode=res.data&&res.data.length>0?res.data[0].code:null;
  if(savedCode&&savedCode===code){
    await DB.from('email_verifications').delete().eq('user_id',S.user.id);
    S._emailVerified=true;
    if(S.profile){
      await DB.from('profiles').update({email_verified:true}).eq('user_id',S.user.id);
      S.profile.email_verified=true;

    }else{
      S.pf={nickname:'',age:'',gender:null,job:null,smoke:null,alcohol:null};
      go('profile_new');
    }
  }else{
    if(errEl)errEl.textContent='гӮігғјгғүгҒҢйҒ•гҒ„гҒҫгҒҷ';
  }
}

  if(p.photoFile){

async function goSplashFromMatched(){
  if(S.match&&S.matchMembers.length===0){
    await loadMatchMembers();
  }
  await syncReportStatus();
  var savedMatch=S.match;
  var savedReg=S.registration;
  var savedMembers=S.matchMembers.slice();
  go('splash');
  if(savedMatch&&savedReg&&savedReg.status==='matched'){
    S.match=savedMatch;
    S.registration=savedReg;
    S.matchMembers=savedMembers;
    render();
  }
}

  var otherInput=S.reviewChecks[otherIdx]?'<div style="padding:0 20px 16px"><input class="inp" id="review-other-inp" type="text" placeholder="иҮӘз”ұгҒ«е…ҘеҠӣгҒ—гҒҰгҒҸгҒ гҒ•гҒ„" maxlength="50" value="'+(S.reviewOtherText||'')+'" oninput="S.reviewOtherText=this.value;updateReviewSubmitBtn()"></div>':'';
  var checksSection=S.reviewStars>0?'<div style="padding:16px 20px;display:flex;flex-wrap:wrap;gap:8px">'+checksHtml+'</div>'+otherInput:'';

function updateRecruitSubmitBtn(){
  var btn=document.getElementById('recruit-submit-btn');
  if(!btn)return;
  var f=S.form;
  var isPair=f.mode==='2v2';
  var allOk=f.area&&f.slot&&f.drink_style&&(!isPair||f.partner_age);
  btn.disabled=!(allOk&&!_isSubmitting);
}

function updateReviewSubmitBtn(){
  var btn=document.getElementById('review-submit-btn');
  if(!btn)return;
  var isLow=S.reviewStars>0&&S.reviewStars<=2;
  var checks=isLow?REVIEW_TAGS_LOW:REVIEW_TAGS;
  var otherIdx=checks.length-1;
  var anyTagSelected=S.reviewChecks.some(function(c){return c;});
  var otherOk=!S.reviewChecks[otherIdx]||(S.reviewOtherText&&S.reviewOtherText.trim().length>0);
  var canSubmit=S.reviewStars>0&&anyTagSelected&&otherOk&&!_reviewSubmitting;
  btn.disabled=!canSubmit;
}

function findFaqAnswer(text){
  for(var i=0;i<FAQ_QA.length;i++){
    var kws=FAQ_QA[i].keywords;
    for(var j=0;j<kws.length;j++){
      if(text.indexOf(kws[j])!==-1)return FAQ_QA[i].answer;
    }
  }
  return null;
}

function sendFaqMsg(){
  var inp=document.getElementById('faq-input');
  var txt=inp?inp.value.trim():'';
  if(!txt)return;
  inp.value='';
  S.faqMsgs.push({type:'user',content:txt});
  var answer=findFaqAnswer(txt);
  if(answer){
    S.faqMsgs.push({type:'bot',content:answer});
  }else{
    S.faqMsgs.push({type:'bot',content:'з”ігҒ—иЁігҒӮгӮҠгҒҫгҒӣгӮ“гҖҒгҒҶгҒҫгҒҸгҒҠзӯ”гҒҲгҒ§гҒҚгҒҫгҒӣгӮ“гҒ§гҒ—гҒҹгҖӮ',showInquiryBtn:true});
    DB.from('faq_misses').insert({user_id:S.user?S.user.id:null,question:txt}).then(function(){}).catch(function(){});
  }
  re('faqbot');
  setTimeout(function(){var el=document.querySelector('.chat-msgs');if(el)el.scrollTop=el.scrollHeight;},50);
}

function tapFaqQuestion(label,answer){
  S.faqMsgs.push({type:'user',content:label});
  S.faqMsgs.push({type:'bot',content:answer});
  re('faqbot');
  setTimeout(function(){var el=document.querySelector('.chat-msgs');if(el)el.scrollTop=el.scrollHeight;},50);
}

function faqBotH(){
  var msgsHtml=(S.faqMsgs||[]).map(function(m){
    var isBot=m.type==='bot';
    var inquiryBtn=m.showInquiryBtn?'<button style="margin-top:8px;padding:8px 14px;border-radius:20px;border:1.5px solid var(--wine);background:transparent;color:var(--wine);font-family:inherit;font-size:12px;font-weight:700;cursor:pointer" onclick="go(\'inquiry\')">гҒҠе•ҸгҒ„еҗҲгӮҸгҒӣгҒҜгҒ“гҒЎгӮү вҶ’</button>':'';
    return '<div class="msg-row '+(isBot?'':'mine')+'">'+(isBot?'<div class="msg-av" style="background:var(--wine-bg);color:var(--wine)">рҹӨ–</div>':'')+'<div><div class="msg-bubble" style="background:'+(isBot?'var(--card)':'var(--wine)')+';color:'+(isBot?'var(--cream)':'#fff')+'">'+escapeHtml(m.content)+'</div>'+inquiryBtn+'</div></div>';
  }).join('');
  var quickList=[
    {label:'ж–ҷйҮ‘гҒҜгҒ„гҒҸгӮү?',ans:FAQ_QA[0].answer},
    {label:'гӮӯгғЈгғігӮ»гғ«гҒ—гҒҹгӮү?',ans:FAQ_QA[2].answer},
    {label:'2еҜҫ2гҒЈгҒҰгҒ©гҒҶгҒ„гҒҶгҒ“гҒЁ?',ans:FAQ_QA[6].answer},
    {label:'еҜҫеҝңгӮЁгғӘгӮўгҒҜ?',ans:FAQ_QA[4].answer},
    {label:'йҖҖдјҡгҒ—гҒҹгҒ„',ans:FAQ_QA[10].answer},
    {label:'е®үе…ЁжҖ§гҒҢеҝғй…Қ',ans:FAQ_QA[16].answer}
  ];
  var quickHtml='<div style="display:flex;flex-wrap:wrap;gap:8px;padding:12px 16px;border-bottom:1px solid var(--border2)">'+quickList.map(function(q){return '<button class="tag-chip" onclick="tapFaqQuestion(\''+q.label+'\',\''+q.ans.replace(/'/g,"\\'")+'\')" style="font-size:12px">'+q.label+'</button>';}).join('')+'</div>';
  return '<div class="screen" style="overflow:hidden"><div class="hdr"><button class="hdr-back" onclick="go(\'splash\')">вҶҗ жҲ»гӮӢ</button><div class="hdr-info"><div class="hdr-step">гӮөгғқгғјгғҲ</div><div class="hdr-title">гӮҲгҒҸгҒӮгӮӢиіӘе•Ҹ</div></div></div>'+quickHtml+'<div class="chat-wrap"><div class="chat-msgs" id="faqmsgs">'+msgsHtml+'</div><div class="chat-input"><input class="chat-inp" id="faq-input" type="text" placeholder="иіӘе•ҸгӮ’е…ҘеҠӣ..." onkeydown="if(event.key===\'Enter\')sendFaqMsg()"><button class="chat-send" onclick="sendFaqMsg()">вҶ‘</button></div></div></div>';
}

function inquiryH(){
  if(S._inquiryDone){
    return '<div class="screen"><div class="hdr"><button class="hdr-back" onclick="S._inquiryDone=false;go(\'splash\')">вҶҗ жҲ»гӮӢ</button><div class="hdr-info"><div class="hdr-title">гҒҠе•ҸгҒ„еҗҲгӮҸгҒӣ</div></div></div><div class="body" style="padding:40px 24px;text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px"><div style="font-size:40px">вң…</div><div style="font-size:16px;font-weight:800;color:var(--cream)">йҖҒдҝЎгҒҢе®ҢдәҶгҒ—гҒҫгҒ—гҒҹгҖӮ</div><div style="font-size:13px;color:var(--muted);line-height:1.7">гҒҠе•ҸгҒ„еҗҲгӮҸгҒӣгҒӮгӮҠгҒҢгҒЁгҒҶгҒ”гҒ–гҒ„гҒҫгҒҷгҖӮ<br>еҶ…е®№гӮ’зўәиӘҚгҒ®гҒҶгҒҲгҖҒеҜҫеҝңгҒ„гҒҹгҒ—гҒҫгҒҷгҖӮ</div></div><div class="ftr"><button class="btn btn-wine" onclick="S._inquiryDone=false;go(\'splash\')">гғҲгғғгғ—гҒ«жҲ»гӮӢ</button></div></div>';
  }
  return '<div class="screen"><div class="hdr"><button class="hdr-back" onclick="go(\'splash\')">вҶҗ жҲ»гӮӢ</button><div class="hdr-info"><div class="hdr-step">гҒҠе•ҸгҒ„еҗҲгӮҸгҒӣ</div><div class="hdr-title">йҒӢе–¶гҒёйҖЈзөЎгҒҷгӮӢ</div></div></div><div class="body" style="padding:24px;display:flex;flex-direction:column;gap:14px"><div class="sec-label" style="padding:0 0 8px">гҒҠеҗҚеүҚпјҲд»»ж„Ҹпјү</div><input id="inquiry-name" class="inp" type="text" placeholder="дҫӢпјҡеұұз”°еӨӘйғҺ"><div class="sec-label" style="padding:0 0 8px">гғЎгғјгғ«гӮўгғүгғ¬гӮ№пјҲеҝ…й Ҳпјү</div><input id="inquiry-email" class="inp" type="email" placeholder="дҫӢпјҡsample@mail.com"><div class="sec-label" style="padding:0 0 8px">гҒҠе•ҸгҒ„еҗҲгӮҸгҒӣеҶ…е®№</div><textarea id="inquiry-content" class="inp" style="height:160px;resize:none" placeholder="гҒ”иіӘе•Ҹгғ»гҒ”иҰҒжңӣгғ»гҒҠеӣ°гӮҠгҒ®гҒ“гҒЁгӮ’гҒ”иЁҳе…ҘгҒҸгҒ гҒ•гҒ„"></textarea><div id="inquiry-err" class="err-msg"></div></div><div class="ftr"><button class="btn btn-wine" id="inquiry-btn" onclick="submitInquiry()">йҖҒдҝЎгҒҷгӮӢ</button></div></div>';
}

document.addEventListener('visibilitychange',function(){
  if(document.hidden){sessionStorage.setItem('ngo_last_active',String(Date.now()));}
});
window.addEventListener('pagehide',function(){
  sessionStorage.setItem('ngo_last_active',String(Date.now()));
});

init();
setInterval(loadStats,30000);

</script>
