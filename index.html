<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Nomi Go</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://js.pay.jp/v2/pay.js"></script>
<style>
:root{--hero:#6B1A24;--bg:#160D0F;--surface:#221015;--card:#2E151A;--border:#4A2028;--border2:#38181E;--wine:#C04050;--wine-bg:rgba(192,64,80,.18);--cream:#EDE5E0;--muted:#9A8080;--lgray:#5A4040;--gold:#D4A050;--gold-bg:rgba(212,160,80,.15);--green:#5AAA70;--red:#CC4040;--red-bg:rgba(204,64,64,.12);}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#0A0507;font-family:-apple-system,'Hiragino Sans','Yu Gothic UI',sans-serif;color:var(--cream)}
#app{min-height:100%;max-width:430px;margin:0 auto;background:var(--bg);display:flex;flex-direction:column}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes pop{0%{transform:scale(.88);opacity:0}60%{transform:scale(1.04)}100%{transform:scale(1);opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
.screen{flex:1;display:flex;flex-direction:column;animation:fadeUp .28s ease both}
.hdr{padding:16px 20px;border-bottom:1px solid var(--border2);flex-shrink:0;background:var(--bg);display:flex;align-items:center;gap:12px}
.hdr-back{background:transparent;border:none;cursor:pointer;font-family:inherit;font-size:13px;color:var(--muted);padding:4px 0;font-weight:600;flex-shrink:0}
.hdr-info{flex:1}
.hdr-step{font-size:10px;font-weight:700;color:var(--wine);letter-spacing:.12em;margin-bottom:2px}
.hdr-title{font-size:20px;font-weight:800;letter-spacing:-.02em}
.body{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.body::-webkit-scrollbar{width:0}
.ftr{padding:14px 20px 28px;flex-shrink:0;border-top:1px solid var(--border2);background:var(--bg)}
.btn{display:flex;align-items:center;justify-content:center;border:none;cursor:pointer;font-family:inherit;font-weight:800;border-radius:10px;transition:all .15s;font-size:16px;padding:15px 20px;width:100%;letter-spacing:.01em}
.btn-wine{background:var(--wine);color:#fff}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.inp{width:100%;padding:13px 14px;border-radius:10px;border:1.5px solid var(--border);background:var(--card);color:var(--cream);font-family:inherit;font-size:16px;outline:none;transition:border-color .15s}
.inp::placeholder{color:var(--muted)}
.inp:focus{border-color:var(--wine)}
.sel-btn{flex:1;padding:14px 8px;border-radius:12px;border:1.5px solid var(--border);background:var(--card);color:var(--muted);font-family:inherit;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;transition:all .18s;font-size:13px;font-weight:700}
.sel-btn.on{border-color:var(--wine);background:var(--wine-bg);color:var(--cream)}
.choice-btn{width:100%;padding:14px 16px;border-radius:10px;border:1.5px solid var(--border);background:var(--card);color:var(--muted);font-family:inherit;cursor:pointer;text-align:left;font-size:14px;font-weight:600;transition:all .18s;display:flex;align-items:center;justify-content:space-between}
.choice-btn.on{border-color:var(--wine);background:var(--wine-bg);color:var(--cream)}
.sec-label{font-size:10px;font-weight:700;color:var(--wine);letter-spacing:.14em;padding:16px 20px 8px}
.err-msg{font-size:12px;color:var(--red);padding:4px 0;text-align:center}
.loading{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--wine);border-radius:50%;animation:spin 1s linear infinite}
.drow{display:flex;align-items:center;justify-content:space-between;padding:13px 20px;border-bottom:1px solid var(--border2)}
.drow-k{font-size:13px;color:var(--muted)}
.drow-v{font-size:14px;font-weight:700}
.match-wrap{flex:1;display:flex;flex-direction:column;overflow-y:auto;padding:0 0 40px}
.member-row{display:flex;align-items:center;gap:12px;padding:13px 20px;border-bottom:1px solid var(--border2)}
.chat-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden}
.chat-msgs{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:12px}
.chat-msgs::-webkit-scrollbar{width:0}
.msg-system{text-align:center;font-size:11px;color:var(--muted);padding:7px 14px;background:var(--surface);border-radius:20px;align-self:center}
.msg-row{display:flex;gap:10px;align-items:flex-end}
.msg-row.mine{flex-direction:row-reverse}
.msg-av{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.msg-bubble{padding:10px 13px;border-radius:14px;font-size:14px;max-width:200px;line-height:1.5}
.chat-input{padding:12px 16px;border-top:1px solid var(--border2);display:flex;gap:10px;background:var(--bg);flex-shrink:0}
.chat-inp{flex:1;padding:11px 14px;border-radius:24px;border:1.5px solid var(--border);background:var(--card);color:var(--cream);font-family:inherit;font-size:15px;outline:none}
.chat-inp:focus{border-color:var(--wine)}
.chat-send{width:42px;height:42px;border-radius:50%;background:var(--wine);border:none;cursor:pointer;color:#fff;font-size:18px;flex-shrink:0}
.star-btn{font-size:32px;cursor:pointer;background:none;border:none;padding:4px}
.check-item{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:10px;background:var(--card);border:1.5px solid var(--border);cursor:pointer;transition:all .15s;width:100%;font-family:inherit;text-align:left}
.check-item.on{border-color:var(--wine);background:var(--wine-bg)}
.tab-btn{flex:1;padding:11px;border:none;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s}
.range-row{display:flex;gap:6px;padding:0 20px}
.range-btn{flex:1;padding:10px 4px;border-radius:8px;border:1.5px solid var(--border);background:var(--card);color:var(--muted);font-family:inherit;cursor:pointer;font-size:11px;font-weight:700;text-align:center;transition:all .18s}
.range-btn.on{border-color:var(--wine);background:var(--wine-bg);color:var(--cream)}
</style>
</head>
<body>
<div id="app"><div class="loading"><div class="spinner"></div></div></div>
<script>
var _payjp=null,_payjpElements=null,_payjpCardEl=null;
var _sbReady=false;
var DB;

const SCORE={DRINK_MATCH:30,AGE_CLOSE_5:20,AGE_CLOSE_10:10,AGE_CLOSE_20:5,SMOKE_MATCH:20,ALCOHOL_MATCH:15,ALCOHOL_NEAR:8};
const AREAS=[
  {id:'umeda',name:'梅田'},
  {id:'shinjuku',name:'新宿'},
  {id:'shibuya',name:'渋谷'},
  {id:'ueno',name:'上野'}
];
const JOBS=['会社員','自営業・フリーランス','学生','公務員','医療・福祉','IT・エンジニア','クリエイター','サービス業','その他'];
const DRINK_STYLES=['ガッツリ飲みたい','ゆっくり飲みたい','ご飯メイン'];
const TIMINGS=['一次会','二次会','どちらでもOK'];
const AGE_PREFS=['年下','近い年齢','年上','年齢問わない','おまかせ'];
const SLOTS=['19:00','20:00','21:00','22:00'];
const ALCOHOL_LEVELS=['とても弱い','弱い','普通','強い','とても強い'];

function areaName(id){var a=AREAS.find(function(x){return x.id===id;});return a?a.name:id||'';}

var _isSubmitting=false;
var S={
  screen:'loading',user:null,profile:null,authTab:'register',
  form:{area:null,slot:null,drink_style:null,timing:null,age_pref:null},
  registration:null,match:null,matchMembers:[],
  chatMsgs:[],reviewStars:0,reviewChecks:[false,false,false],
  stats:{active:0,todayMatches:0},
  error:'',pollTimer:null,chargeId:null,
  pf:{nickname:'',age:'',gender:null,job:null,smoke:null,alcohol:null}
};

function render(){
  var map={loading:loadingH,splash:splashH,email:emailH,profile_new:profileNewH,recruit:recruitH,card:cardH,waiting:waitH,matched:matchedH,chat:chatH,review:reviewH};
  document.getElementById('app').innerHTML=(map[S.screen]||loadingH)();
}

function go(sc){
  if(sc!=='chat'&&S._chatTimer){clearInterval(S._chatTimer);S._chatTimer=null;}
  S.screen=sc;S.error='';
  if(sc!=='card'&&_payjpCardEl){try{_payjpCardEl.unmount();}catch(e){}_payjpCardEl=null;_payjpElements=null;}
  render();
  if(sc==='card'){
    _payjpCardEl=null;_payjpElements=null;
    var tries=0;
    function tryMount(){var el=document.getElementById('payjp-card-el');if(el){mountPayjp();}else if(tries++<20){setTimeout(tryMount,100);}}
    setTimeout(tryMount,150);
  }
}
function re(sc){S.screen=sc;render();}

function mountPayjp(){
  if(_payjpCardEl)return;
  var el=document.getElementById('payjp-card-el');
  if(!el)return;
  if(!_payjp)_payjp=Payjp('pk_test_5d6152d2f055a7440fccb417');
  _payjpElements=_payjp.elements();
  var style={base:{color:'#EDE5E0',fontSize:'16px','::placeholder':{color:'#9A8080'}},invalid:{color:'#CC4040'}};
  _payjpCardEl=_payjpElements.create('card',{style:style});
  _payjpCardEl.mount('#payjp-card-el');
}

async function init(){
  try{
    var sc=supabase;
    DB=sc.createClient('https://dwubothomxjwfudkeepy.supabase.co','sb_publishable_vpUd5hulLV1-gI1wsAkgWA_hrB9ZOJ9');
    var r=await Promise.race([DB.auth.getSession(),new Promise(function(res){setTimeout(function(){res({data:{session:null}});},5000);})]);
    var sess=r.data&&r.data.session;
    if(sess&&sess.user){S.user=sess.user;await loadProfile();}
    else{go('splash');}
    loadStats();
    DB.auth.onAuthStateChange(function(event,session){
      if(event==='SIGNED_IN'&&session&&session.user&&!S.user){S.user=session.user;loadProfile();}
    });
  }catch(e){go('splash');}
}

async function doSignUp(){
  var email=document.getElementById('einp').value.trim();
  var pass=document.getElementById('pinp').value;
  if(!email||!pass){S.error='メールとパスワードを入力してください';re('email');return;}
  if(pass.length<6){S.error='パスワードは6文字以上です';re('email');return;}
  go('loading');
  var res=await DB.auth.signUp({email:email,password:pass});
  if(res.error){var r2=await DB.auth.signInWithPassword({email:email,password:pass});if(r2.error){S.error='登録に失敗しました';go('email');return;}S.user=r2.data.user;await loadProfile();return;}
  if(res.data&&res.data.session){S.user=res.data.user;await loadProfile();return;}
  if(res.data&&res.data.user){var r3=await DB.auth.signInWithPassword({email:email,password:pass});if(r3.error){S.error='ログインタブからサインインしてください';go('email');return;}S.user=r3.data.user;await loadProfile();return;}
  S.error='登録に失敗しました';go('email');
}

async function doSignIn(){
  var email=document.getElementById('einp').value.trim();
  var pass=document.getElementById('pinp').value;
  if(!email||!pass){S.error='メールとパスワードを入力してください';re('email');return;}
  go('loading');
  var res=await DB.auth.signInWithPassword({email:email,password:pass});
  if(res.error){S.error='メールかパスワードが違います';go('email');return;}
  S.user=res.data.user;await loadProfile();
}

async function logout(){
  if(S.pollTimer)clearInterval(S.pollTimer);
  await DB.auth.signOut();
  S.user=null;S.profile=null;S.registration=null;S.match=null;go('splash');
}

async function loadProfile(){
  var res=await DB.from('profiles').select('*').eq('user_id',S.user.id).single();
  S.profile=res.data;
  if(S.profile){
    var reg=await DB.from('registrations').select('*').eq('user_id',S.user.id).eq('status','waiting').order('created_at',{ascending:false}).limit(1).single();
    if(reg.data){S.registration=reg.data;S.form={area:reg.data.area_id,slot:reg.data.slot,drink_style:reg.data.drink_style,timing:reg.data.timing,age_pref:reg.data.age_pref};startPolling();go('waiting');}
    else{go('splash');}
  }else{S.pf={nickname:'',age:'',gender:null,job:null,smoke:null,alcohol:null};go('splash');}
}

function saveInputs(){
  var nn=document.getElementById('pf-nn');var ag=document.getElementById('pf-ag');
  if(nn)S.pf.nickname=nn.value.trim();if(ag)S.pf.age=ag.value;
}

async function saveProfile(){
  var p=S.pf;
  if(!p.nickname||!p.age||!p.gender||!p.job||p.smoke===null||p.alcohol===null){S.error='すべての項目を入力してください';re('profile_new');return;}
  go('loading');
  await DB.from('profiles').upsert({user_id:S.user.id,nickname:p.nickname,age:parseInt(p.age),gender:p.gender,job:p.job,smoke:p.smoke,alcohol:p.alcohol,verified_level:1,updated_at:new Date().toISOString()});
  await DB.from('user_stats').upsert({user_id:S.user.id});
  S.profile={user_id:S.user.id,nickname:p.nickname,age:parseInt(p.age),gender:p.gender,job:p.job,smoke:p.smoke,alcohol:p.alcohol};
  go('splash');
}

async function loadStats(){
  try{
    var r1=await DB.from('registrations').select('*',{count:'exact',head:true}).eq('status','waiting');
    var r2=await DB.from('matches').select('*',{count:'exact',head:true}).gte('created_at',new Date().toISOString().split('T')[0]);
    S.stats.active=r1.count||0;S.stats.todayMatches=r2.count||0;
    var el=document.getElementById('live-n');if(el)el.textContent=S.stats.active;
  }catch(e){}
}

async function goRecruit(){
  if(!S.user){go('email');return;}
  if(!S.profile){S.pf={nickname:'',age:'',gender:null,job:null,smoke:null,alcohol:null};go('profile_new');return;}
  go('recruit');
}

async function startRecruit(){
  if(_isSubmitting)return;
  var f=S.form;
  if(!f.area||!f.slot||!f.drink_style||!f.timing||!f.age_pref){S.error='すべて選択してください';re('recruit');return;}
  _isSubmitting=true;
  if(S.profile&&S.profile.gender==='male'){
    var fp=await DB.from('profiles').select('stripe_customer_id').eq('user_id',S.user.id).single();
    var cid=fp.data&&fp.data.stripe_customer_id;
    if(!cid){_isSubmitting=false;go('card');return;}
  }
  await doRegister();
}

async function confirmCard(){
  var btn=document.getElementById('card-btn');
  var errEl=document.getElementById('card-err');
  if(!_payjp||!_payjpCardEl){if(errEl)errEl.textContent='カードが読み込まれていません';return;}
  if(btn){btn.disabled=true;btn.textContent='処理中...';}
  (async function(){
    try{
      var r=await _payjp.createToken(_payjpCardEl);
      if(r.error){if(errEl)errEl.textContent=r.error.message;if(btn){btn.disabled=false;btn.textContent='このカードで登録する →';}return;}
      var res=await fetch('/api/charge',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:r.id,amount:3000,description:'Nomi Go 参加費'})});
      var data=await res.json();
      if(!data.success){if(errEl)errEl.textContent=data.error||'決済に失敗しました';if(btn){btn.disabled=false;btn.textContent='このカードで登録する →';}return;}
      S.chargeId=data.charge_id;
      await DB.from('profiles').update({stripe_customer_id:data.charge_id}).eq('user_id',S.user.id);
      S.profile.stripe_customer_id=data.charge_id;
      await doRegister();
    }catch(e){if(errEl)errEl.textContent='エラー: '+e.message;if(btn){btn.disabled=false;btn.textContent='このカードで登録する →';}}
  })();
}

async function doRegister(){
  go('loading');
  try{
    var existing=await DB.from('registrations').select('id').eq('user_id',S.user.id).eq('status','waiting').single();
    if(existing.data){_isSubmitting=false;S.registration=existing.data;startPolling();go('waiting');return;}
    var ins=await DB.from('registrations').insert({
      user_id:S.user.id,
      area_id:S.form.area,
      slot:S.form.slot,
      mode:'1v1',
      gender:S.profile.gender,
      drink_style:S.form.drink_style,
      timing:S.form.timing,
      age_pref:S.form.age_pref,
      age:S.profile.age,
      smoke:S.profile.smoke,
      alcohol:S.profile.alcohol,
      payment_intent_id:S.chargeId||null,
      status:'waiting'
    }).select().single();
    if(ins.error){_isSubmitting=false;S.error='登録エラー: '+ins.error.message;go('recruit');return;}
    S.registration=ins.data;
    var matched=await tryMatch();
    if(matched){go('matched');}else{startPolling();go('waiting');}
  }catch(e){_isSubmitting=false;S.error='登録に失敗しました: '+e.message;go('recruit');}
}

function dbgLog(msg){
  S._dbg=(S._dbg||[]); S._dbg.push(msg);
  var el=document.getElementById('dbg-box');
  if(el){el.innerHTML=S._dbg.slice(-8).map(function(m){return '<div>'+m+'</div>';}).join('');}
}

async function tryMatch(){
  if(!S.registration){dbgLog('S0: registration=null');return false;}
  var p=S.profile;
  dbgLog('S1: area='+S.form.area+' slot='+S.form.slot+' timing='+S.form.timing);

  var candidates=await DB.from('registrations').select('*').eq('status','waiting').eq('area_id',S.form.area).neq('gender',p.gender).neq('user_id',S.user.id);
  dbgLog('S2: err='+(candidates.error?candidates.error.message:'なし')+' 件数='+(candidates.data?candidates.data.length:0));
  if(!candidates.data||candidates.data.length===0){return false;}

  var filtered=candidates.data.filter(function(c){
    var t1=S.form.timing;var t2=c.timing;
    return t1==='どちらでもOK'||t2==='どちらでもOK'||t1===t2;
  });
  dbgLog('S3: filtered='+filtered.length);
  if(filtered.length===0){return false;}

  var best=filtered[0];
  var prof=await DB.from('profiles').select('*').eq('user_id',best.user_id).single();
  dbgLog('S4: prof='+(prof.data?prof.data.nickname:'null')+' err='+(prof.error?prof.error.message:'なし'));
  best.profileData=prof.data||{};

  if(!S.form.slot){dbgLog('S4x: slot=undefined abort');return false;}
  var matchRes=await DB.from('matches').insert({
    area_id:S.form.area,
    slot:S.form.slot,
    mode:'1v1',
    timing:S.form.timing,
    status:'confirmed'
  }).select().single();
  dbgLog('S5: err='+(matchRes.error?matchRes.error.message:'なし')+' id='+(matchRes.data?matchRes.data.id.slice(0,8):'null'));
  if(matchRes.error){return false;}
  S.match=matchRes.data;

  var u1=await DB.from('registrations').update({status:'matched',match_id:matchRes.data.id}).eq('id',S.registration.id);
  var u2=await DB.from('registrations').update({status:'matched',match_id:matchRes.data.id}).eq('id',best.id);
  dbgLog('S6: u1='+(u1.error?u1.error.message:'OK')+' u2='+(u2.error?u2.error.message:'OK'));

  if(u1.error||u2.error)return false;
  await loadMatchMembers();
  return true;
}

function calcScore(myProfile,myForm,theirReg,theirProfile){
  var score=0;
  if(myForm.drink_style===theirReg.drink_style)score+=SCORE.DRINK_MATCH;
  var ageDiff=Math.abs((myProfile.age||25)-(theirProfile&&theirProfile.age?theirProfile.age:25));
  if(ageDiff<=5)score+=SCORE.AGE_CLOSE_5;else if(ageDiff<=10)score+=SCORE.AGE_CLOSE_10;else if(ageDiff<=20)score+=SCORE.AGE_CLOSE_20;
  if(myProfile.smoke&&theirProfile&&myProfile.smoke===theirProfile.smoke)score+=SCORE.SMOKE_MATCH;
  var a1=myProfile.alcohol||2;var a2=theirProfile&&theirProfile.alcohol!=null?theirProfile.alcohol:2;
  var alcoholDiff=Math.abs(a1-a2);
  if(alcoholDiff===0)score+=SCORE.ALCOHOL_MATCH;else if(alcoholDiff===1)score+=SCORE.ALCOHOL_NEAR;
  return score;
}

function startPolling(){
  if(S.pollTimer)clearInterval(S.pollTimer);
  dbgLog('polling開始 reg='+(S.registration?S.registration.id.slice(0,8):'null'));
  S.pollTimer=setInterval(async function(){
    try{
      if(S.registration){
        var reg=await DB.from('registrations').select('status,match_id').eq('id',S.registration.id).single();
        if(reg.data&&reg.data.status==='matched'&&reg.data.match_id){
          clearInterval(S.pollTimer);
          var m=await DB.from('matches').select('*').eq('id',reg.data.match_id).single();
          if(m.data){S.match=m.data;await loadMatchMembers();_isSubmitting=false;go('matched');return;}
        }
      }
      var matched=await tryMatch();
      if(matched){clearInterval(S.pollTimer);_isSubmitting=false;go('matched');}
      loadStats();
    }catch(e){}
  },8000);
}

async function cancelReg(){
  if(S.pollTimer)clearInterval(S.pollTimer);
  if(S.registration)await DB.from('registrations').update({status:'cancelled'}).eq('id',S.registration.id);
  S.registration=null;S.match=null;S.chargeId=null;go('splash');
}

async function cancelAfterMatch(){
  if(S.match)await DB.from('matches').update({status:'cancelled'}).eq('id',S.match.id);
  S.registration=null;S.match=null;S.chargeId=null;go('splash');
}

async function loadMatchMembers(){
  if(!S.match)return;
  var r=await DB.from('registrations').select('*').eq('match_id',S.match.id);
  if(!r.data)return;
  for(var i=0;i<r.data.length;i++){
    var prof=await DB.from('profiles').select('*').eq('user_id',r.data[i].user_id).single();
    r.data[i].profiles=prof.data||{};
  }
  S.matchMembers=r.data;
}

function initChat(){
  if(S._chatTimer)clearInterval(S._chatTimer);
  loadMessages();
  S._chatTimer=setInterval(function(){loadMessages();},3000);
}

function loadMessages(){
  if(!S.match||!S.match.id){dbgChat('match=null');return;}
  DB.from('messages').select('*').eq('match_id',S.match.id).order('created_at',{ascending:true}).then(function(res){
    dbgChat('err='+(res.error?res.error.message:'なし')+' 件数='+(res.data?res.data.length:0)+' mid='+S.match.id.slice(0,8));
    if(res.error)return;
    var sys=[{type:'system',content:'マッチング成立！チャットが作成されました'}];
    var msgs=res.data.map(function(m){return {user_id:m.user_id,content:m.content,mine:m.user_id===S.user.id};});
    var newMsgs=sys.concat(msgs);
    if(newMsgs.length!==S.chatMsgs.length){
      S.chatMsgs=newMsgs;
      render();
      setTimeout(function(){var el=document.querySelector('.chat-msgs');if(el)el.scrollTop=el.scrollHeight;},50);
    }
  });
}

function dbgChat(msg){
  var el=document.getElementById('chat-debug');
  if(el)el.textContent=msg;
}

function sendMsg(){
  var inp=document.getElementById('cinput');var txt=inp?inp.value.trim():'';if(!txt)return;inp.value='';
  DB.from('messages').insert({match_id:S.match.id,user_id:S.user.id,content:txt}).then(function(){
    loadMessages();
  });
}

async function submitReview(){
  if(!S.match||S.reviewStars===0)return;
  var targets=S.matchMembers.filter(function(m){return m.user_id!==S.user.id;});
  for(var i=0;i<targets.length;i++){await DB.from('reviews').insert({match_id:S.match.id,reviewer_id:S.user.id,reviewee_id:targets[i].user_id,stars:S.reviewStars,tag_punctual:S.reviewChecks[0],tag_friendly:S.reviewChecks[1],tag_again:S.reviewChecks[2]});}
  await DB.from('matches').update({status:'completed',completed_at:new Date().toISOString()}).eq('id',S.match.id);
  S.registration=null;S.match=null;S.matchMembers=[];S.form={area:null,slot:null,drink_style:null,timing:null,age_pref:null};
  S.reviewStars=0;S.reviewChecks=[false,false,false];S.chatMsgs=[];S.chargeId=null;go('splash');
}
