<style>
/* ===== デザイントークン（LPと統一） ===== */
:root{
  --night:#150A0C;--hero:#3A0E14;--bg:#1D0D10;--surface:#2A1014;--card:#31131A;
  --border:#5A2A32;--border2:#3A181E;
  --wine:#C9A063;--wine-bg:rgba(201,160,99,.14);--wine-true:#6B1A24;
  --cream:#F4E9DC;--muted:#C4B2A1;--lgray:#8A6E60;
  --gold:#C9A063;--gold-bright:#F3D9A4;--gold-bg:rgba(201,160,99,.16);
  --green:#7BC98F;--red:#FF8A6C;--red-bg:rgba(255,138,108,.12);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--cream);font-family:'Noto Sans JP',-apple-system,'Hiragino Sans',sans-serif}
#app{min-height:100%;max-width:430px;margin:0 auto;background:transparent;display:flex;flex-direction:column;position:relative;z-index:1}
#ngo-fx{position:fixed;top:0;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;pointer-events:none;z-index:0;overflow:hidden}
#ngo-fx::before{content:"";position:absolute;inset:0;background:
  radial-gradient(ellipse 320px 240px at 12% 4%,rgba(201,160,99,.10),transparent 60%),
  radial-gradient(ellipse 380px 300px at 90% 20%,rgba(107,26,36,.45),transparent 60%),
  radial-gradient(ellipse 300px 260px at 50% 100%,rgba(201,160,99,.06),transparent 60%);}
.ngo-bubble{position:absolute;bottom:-24px;border-radius:50%;pointer-events:none;opacity:0;
  background:radial-gradient(circle at 35% 30%,rgba(243,217,164,.35),rgba(243,217,164,.04));animation:bubbleRise linear infinite}
@keyframes bubbleRise{0%{transform:translateY(0);opacity:0}10%{opacity:.6}90%{opacity:.3}100%{transform:translateY(-105vh) translateX(24px);opacity:0}}
.screen,.match-wrap,.loading{position:relative;z-index:1}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes pop{0%{transform:scale(.88);opacity:0}60%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.015)}}
@keyframes shine{0%{left:-80%}45%{left:130%}100%{left:130%}}
@keyframes glowSoft{0%,100%{box-shadow:0 8px 30px rgba(201,160,99,.22)}50%{box-shadow:0 10px 42px rgba(201,160,99,.4)}}
@media(prefers-reduced-motion:reduce){*{animation-duration:.01s !important;transition-duration:.01s !important}}
.verify-waiting{position:relative;width:110px;height:110px;display:flex;align-items:center;justify-content:center}
.verify-waiting-ring{position:absolute;inset:0;border-radius:50%;border:2px solid var(--gold);opacity:0;animation:verifyPulse 2.6s ease-out infinite}
.verify-waiting-ring2{animation-delay:1.3s}
@keyframes verifyPulse{0%{transform:scale(.55);opacity:.7}70%{opacity:0}100%{transform:scale(1);opacity:0}}
.verify-waiting-core{width:56px;height:56px;border-radius:50%;background:var(--card);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:22px;animation:breathe 2.6s ease-in-out infinite}
.verify-dots span{opacity:0;animation:verifyDot 1.4s infinite}
.verify-dots span:nth-child(1){animation-delay:0s}
.verify-dots span:nth-child(2){animation-delay:.2s}
.verify-dots span:nth-child(3){animation-delay:.4s}
@keyframes verifyDot{0%,80%,100%{opacity:0}40%{opacity:1}}
.screen{flex:1;display:flex;flex-direction:column;animation:fadeUp .32s cubic-bezier(.2,.8,.2,1) both}
.hdr{padding:16px 20px;border-bottom:1px solid var(--border2);flex-shrink:0;background:rgba(29,13,16,.85);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:20}
.hdr-back{background:transparent;border:none;cursor:pointer;font-family:inherit;font-size:13px;color:var(--muted);padding:4px 0;font-weight:600;flex-shrink:0;transition:color .2s}
.hdr-back:active{color:var(--gold-bright)}
.hdr-info{flex:1}
.hdr-step{font-size:10px;font-weight:700;color:var(--gold);letter-spacing:.24em;margin-bottom:3px;font-family:'Zen Kaku Gothic New',sans-serif}
.hdr-title{font-size:20px;font-weight:800;letter-spacing:.01em;font-family:'Shippori Mincho',serif}
.body{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.body::-webkit-scrollbar{width:0}
.ftr{padding:14px 20px 30px;flex-shrink:0;border-top:1px solid var(--border2);background:rgba(29,13,16,.9);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.btn{display:flex;align-items:center;justify-content:center;border:none;cursor:pointer;font-family:'Zen Kaku Gothic New',sans-serif;
  font-weight:900;border-radius:999px;transition:transform .18s,box-shadow .25s,opacity .2s;font-size:16px;padding:16px 20px;width:100%;letter-spacing:.04em}
.btn-wine{position:relative;overflow:hidden;color:var(--night);background:linear-gradient(135deg,var(--gold-bright),var(--gold));
  box-shadow:0 8px 30px rgba(201,160,99,.28);animation:glowSoft 3.2s ease-in-out infinite}
.btn-wine::after{content:"";position:absolute;top:0;left:-80%;width:50%;height:100%;
  background:linear-gradient(105deg,transparent,rgba(255,255,255,.5),transparent);animation:shine 3.4s infinite}
.btn:active{transform:scale(.96)}
.btn:disabled{opacity:.45;cursor:not-allowed;animation:none;box-shadow:none}
.btn:disabled::after{display:none}
.inp{width:100%;padding:14px 16px;border-radius:14px;border:1.5px solid var(--border);background:rgba(244,233,220,.06);

.inp::placeholder{color:rgba(196,178,161,.5)}
.inp:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,160,99,.14);background:rgba(244,233,220,.09)}

select.inp{-webkit-appearance:none;appearance:none;background-image:linear-gradient(45deg,transparent 50%,var(--gold) 50%),linear-gradient(135deg,var(--gold) 50%,transparent 50%);
  background-position:calc(100% - 18px) calc(50% + 2px),calc(100% - 13px) calc(50% + 2px);background-size:5px 5px,5px 5px;background-repeat:no-repeat;padding-right:40px}
select.inp option{color:#3A2020;background:#fff}

.sel-btn{flex:1;padding:14px 8px;border-radius:14px;border:1.5px solid var(--border);background:rgba(244,233,220,.04);

.sel-btn:active{transform:scale(.97)}
.sel-btn.on{border-color:var(--gold);background:var(--gold-bg);color:var(--gold-bright);box-shadow:0 0 16px rgba(201,160,99,.18)}
.choice-btn{width:100%;padding:15px 16px;border-radius:14px;border:1.5px solid var(--border);background:rgba(244,233,220,.04);
  color:var(--muted);font-family:inherit;cursor:pointer;text-align:left;font-size:14px;font-weight:600;transition:all .18s;display:flex;align-items:center;justify-content:space-between}
.choice-btn:active{transform:scale(.98)}
.choice-btn.on{border-color:var(--gold);background:var(--gold-bg);color:var(--cream)}
.range-row{display:flex;gap:6px;padding:0 20px}
.range-btn{flex:1;padding:10px 4px;border-radius:10px;border:1.5px solid var(--border);background:rgba(244,233,220,.04);
  color:var(--muted);font-family:inherit;cursor:pointer;font-size:11px;font-weight:700;text-align:center;transition:all .18s}
.range-btn.on{border-color:var(--gold);background:var(--gold-bg);color:var(--gold-bright)}
.check-item{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:12px;background:var(--card);border:1.5px solid var(--border);cursor:pointer;transition:all .15s;width:100%;font-family:inherit;text-align:left}
.check-item.on{border-color:var(--gold);background:var(--gold-bg)}
.tag-chip{display:inline-flex;align-items:center;padding:9px 16px;border-radius:999px;background:rgba(244,233,220,.04);
  border:1.5px solid var(--border);cursor:pointer;transition:all .18s;font-family:inherit;font-size:13px;font-weight:700;color:var(--muted)}
.tag-chip:active{transform:scale(.95)}
.tag-chip.on{border-color:var(--gold);background:linear-gradient(135deg,var(--gold-bright),var(--gold));color:var(--night)}
.tab-btn{flex:1;padding:12px;border:none;font-family:'Zen Kaku Gothic New',sans-serif;font-size:14px;font-weight:900;cursor:pointer;transition:all .2s;letter-spacing:.04em}
.sec-label{font-size:10px;font-weight:700;color:var(--gold);letter-spacing:.28em;padding:18px 20px 8px;font-family:'Zen Kaku Gothic New',sans-serif}
.err-msg{font-size:12px;color:var(--red);padding:4px 0;text-align:center}
.loading{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite}
.drow{display:flex;align-items:center;justify-content:space-between;padding:13px 20px;border-bottom:1px solid var(--border2)}
.drow-k{font-size:13px;color:var(--muted)}
.drow-v{font-size:14px;font-weight:700}
.match-wrap{flex:1;display:flex;flex-direction:column;overflow-y:auto;padding:0 0 40px}
.member-row{display:flex;align-items:center;gap:12px;padding:14px 20px;border-bottom:1px solid var(--border2)}
.chat-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden}
.chat-msgs{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:12px}
.chat-msgs::-webkit-scrollbar{width:0}
.msg-system{text-align:center;font-size:11px;color:var(--muted);padding:7px 16px;background:rgba(244,233,220,.05);border:1px solid var(--border2);border-radius:20px;align-self:center}
.msg-row{display:flex;gap:10px;align-items:flex-end;animation:fadeUp .25s ease both}
.msg-row.mine{flex-direction:row-reverse}
.msg-av{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.msg-bubble{padding:11px 14px;border-radius:18px;font-size:14px;max-width:210px;line-height:1.6}
.msg-row.mine .msg-bubble{background:linear-gradient(135deg,#7A2230,var(--wine-true)) !important;color:#fff !important;border-bottom-right-radius:6px;box-shadow:0 3px 12px rgba(107,26,36,.4)}
.msg-row:not(.mine) .msg-bubble{border-bottom-left-radius:6px;border:1px solid var(--border2)}
.chat-input{padding:12px 16px;border-top:1px solid var(--border2);display:flex;gap:10px;background:rgba(29,13,16,.9);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);flex-shrink:0}
.chat-inp{flex:1;padding:12px 16px;border-radius:24px;border:1.5px solid var(--border);background:rgba(244,233,220,.06);color:var(--cream);font-family:inherit;font-size:15px;outline:none;transition:border-color .2s}
.chat-inp:focus{border-color:var(--gold)}
.chat-send{width:44px;height:44px;border-radius:50%;border:none;cursor:pointer;font-size:18px;flex-shrink:0;
  background:linear-gradient(135deg,var(--gold-bright),var(--gold));color:var(--night);font-weight:900;box-shadow:0 4px 14px rgba(201,160,99,.35);transition:transform .15s}
.chat-send:active{transform:scale(.88)}
.star-btn{cursor:pointer;background:none;border:none;padding:4px;outline:none;-webkit-appearance:none;appearance:none;display:inline-flex;transition:transform .18s cubic-bezier(.34,1.56,.64,1)}
.star-btn:active{transform:scale(1.25)}
.star-btn:focus-visible{outline:2px solid var(--gold) !important;outline-offset:2px;border-radius:6px}
.mode-card{position:relative;border-radius:20px;overflow:hidden;cursor:pointer;border:1.5px solid rgba(228,198,138,.2);transition:transform .3s,box-shadow .3s;box-shadow:0 10px 26px rgba(0,0,0,.35)}
.mode-card:active{transform:scale(.98)}
.mode-card img{width:100%;height:180px;object-fit:cover;object-position:center;display:block}
.mode-card-square img{object-position:center 25%}
.mode-card-label{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(10,5,7,.9));padding:22px 16px 14px}
.mode-card-title{font-size:18px;font-weight:800;color:#fff;font-family:'Shippori Mincho',serif;letter-spacing:.03em;text-shadow:0 2px 8px rgba(0,0,0,.6)}
.card-selected{border-color:var(--gold-bright) !important;box-shadow:0 0 0 3px rgba(243,217,164,.15),0 0 34px rgba(243,217,164,.45) !important;transition:box-shadow .15s,border-color .15s}
.area-card img{filter:saturate(.75) contrast(1.06) brightness(.85)}
.area-card-tint{position:absolute;inset:0;background:linear-gradient(180deg,rgba(21,10,12,.2),rgba(21,10,12,.1) 40%,rgba(10,5,7,.75));pointer-events:none}
.area-card-label{position:absolute;bottom:0;left:0;right:0;padding:16px}
.area-card-title{font-size:22px;font-weight:800;color:var(--cream);letter-spacing:.05em;font-family:'Shippori Mincho',serif;text-shadow:0 2px 10px rgba(0,0,0,.7)}
/* 準備中エリア：LPと同じ斜めリボン */
.area-soon{opacity:.72;filter:grayscale(.3)}
.area-soon img{filter:saturate(.35) contrast(1) brightness(.5)}
.area-soon .area-card-title{font-size:17px;color:rgba(244,233,220,.55)}
.area-soon-ribbon-wrap{position:absolute;inset:0;overflow:hidden;border-radius:20px;pointer-events:none;z-index:3}
.area-soon-ribbon{position:absolute;top:16px;right:-42px;width:160px;transform:rotate(40deg);text-align:center;
  background:linear-gradient(135deg,rgba(228,198,138,.95),rgba(196,163,90,.95));color:var(--night);
  font-family:'Zen Kaku Gothic New',sans-serif;font-size:11px;font-weight:900;letter-spacing:.12em;padding:5px 0;
  box-shadow:0 3px 10px rgba(0,0,0,.35),inset 0 1px 0 rgba(255,255,255,.3);border-top:1px solid rgba(255,255,255,.25);border-bottom:1px solid rgba(0,0,0,.15)}
.area-live-badge{position:absolute;top:12px;right:12px;display:flex;align-items:center;gap:5px;z-index:3;
  background:linear-gradient(135deg,var(--gold-bright),var(--gold));color:var(--night);font-family:'Zen Kaku Gothic New',sans-serif;

.area-live-badge .dot{width:5px;height:5px;border-radius:50%;background:var(--night);animation:pulse 1.6s infinite}
.area-quiet-badge{position:absolute;top:12px;right:12px;z-index:3;background:rgba(10,5,7,.6);color:rgba(244,233,220,.7);
  font-size:11px;font-weight:700;padding:5px 11px;border-radius:999px;border:1px solid rgba(244,233,220,.15)}
/* カード登録：主役1枚＋同一書式の補足 */
.cardreg-hero{border-radius:18px;padding:22px 18px;text-align:center;background:linear-gradient(160deg,rgba(201,160,99,.20),rgba(201,160,99,.06));
  border:1.5px solid rgba(201,160,99,.45);box-shadow:0 8px 28px rgba(0,0,0,.28)}
.cardreg-hero-icon{font-size:30px;margin-bottom:8px;line-height:1}

.cardreg-field-label{font-family:'Zen Kaku Gothic New',sans-serif;font-size:10px;font-weight:700;color:var(--gold);letter-spacing:.24em;margin-bottom:8px}
.cardreg-input{background:#FFFFFF;border:1.5px solid var(--border);border-radius:14px;padding:16px;transition:border-color .2s,box-shadow .2s}

.cardreg-notes-mark{color:var(--gold);flex:none;font-size:12px;line-height:1.7;font-weight:900}
.cardreg-secure{font-size:11px;color:var(--lgray);line-height:1.7;text-align:center;padding:0 8px}
/* 乾杯演出 */
.cheers-burst{position:fixed;top:0;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;pointer-events:none;z-index:60;display:flex;align-items:center;justify-content:center}
.cheers-burst .glass{font-size:64px;animation:cheersPop 1.4s cubic-bezier(.2,.8,.2,1) forwards;filter:drop-shadow(0 0 24px rgba(243,217,164,.7))}
@keyframes cheersPop{0%{transform:scale(.3) rotate(-12deg);opacity:0}30%{transform:scale(1.25) rotate(4deg);opacity:1}50%{transform:scale(1)}80%{opacity:1}100%{transform:scale(1.1);opacity:0}}

.intro-anim{display:none}
@keyframes faceCountPulse{0%{transform:scale(1.4);opacity:0}50%{transform:scale(1);opacity:1}100%{transform:scale(1);opacity:1}}
@keyframes faceRingPulse{0%,100%{box-shadow:0 0 0 2000px rgba(0,0,0,.45),0 0 0 0 rgba(123,224,144,.5)}50%{box-shadow:0 0 0 2000px rgba(0,0,0,.45),0 0 0 14px rgba(123,224,144,0)}}

</style>

function clampAgeMin(val,defaultMin){
  var n=parseInt(val);
  if(isNaN(n))return defaultMin;
  if(n>defaultMin)n=defaultMin;
  if(n<20)n=20;
  return n;
}
function clampAgeMax(val,defaultMax){
  var n=parseInt(val);
  if(isNaN(n))return defaultMax;
  if(n<defaultMax)n=defaultMax;
  if(n>99)n=99;
  return n;
}

function ageMatches(isAny,minAge,maxAge,otherAge){
  if(isAny)return true;
  if(otherAge==null||minAge==null||maxAge==null)return true;
  return otherAge>=minAge&&otherAge<=maxAge;
}

function escapeHtml(str){
  if(str==null)return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function calcAgeFromBirthdate(bd){
  if(!bd)return null;
  var b=new Date(bd);
  var today=new Date();
  var age=today.getFullYear()-b.getFullYear();
  var mdiff=today.getMonth()-b.getMonth();
  if(mdiff<0||(mdiff===0&&today.getDate()<b.getDate()))age--;
  return age;
}
function digitsOnly(el){
  var v=el.value.replace(/[０-９]/g,function(c){return String.fromCharCode(c.charCodeAt(0)-0xFEE0);});
  el.value=v.replace(/[^0-9]/g,'');
}

// ===== BAN照合 =====
// 本名+生年月日 で blacklist と突き合わせる。
// user_id だけでBANしてもメールを変えれば再登録できてしまうため、
// 変えにくい情報（身分証と一致する本名・生年月日）で照合する。
async function isBlacklisted(realName,birthdate){
  if(!realName||!birthdate)return false;
  try{
    var res=await DB.from('blacklist').select('id')
      .eq('real_name',realName.trim())
      .eq('birthdate',birthdate)
      .limit(1);
    if(res.error)return false; // 照合に失敗しても登録は止めない（誤ブロック防止）
    return !!(res.data&&res.data.length>0);
  }catch(e){return false;}
}

async function isLineBlacklisted(lineUserId){

    if(res.error)return false;
    return !!(res.data&&res.data.length>0);

}

async function saveProfile(){
  var p=S.pf;
  if(!p.nickname||!p.age||!p.gender||!p.job||p.smoke===null||p.alcohol===null){S.error='すべての項目を入力してください';re('profile_new');return;}
  if(!p.realname||!p.realname.trim()){S.error='本名を入力してください';re('profile_new');return;}
  if(!p.birthdate){S.error='生年月日を入力してください';re('profile_new');return;}
  if(parseInt(p.age)<20){S.error='Nomi Goは20歳以上の方がご利用いただけます';re('profile_new');return;}
  var bd=new Date(p.birthdate);
  var today=new Date();
  var calcAge=today.getFullYear()-bd.getFullYear();
  var mdiff=today.getMonth()-bd.getMonth();
  if(mdiff<0||(mdiff===0&&today.getDate()<bd.getDate()))calcAge--;
  if(calcAge<20){S.error='生年月日から20歳未満と判定されました。Nomi Goは20歳以上限定です';re('profile_new');return;}
  if(parseInt(p.age)!==calcAge){S.error='年齢と生年月日が一致しません（生年月日からは'+calcAge+'歳です）。どちらかをご確認ください';re('profile_new');return;}
  if(p.gender==='male'&&!p.photoFile){S.error='男性はご本人の顔写真の登録が必須です';re('profile_new');return;}
  var banned=await isBlacklisted(p.realname,p.birthdate);
  if(banned){S.error='ご利用いただけません。利用規約に違反したため、アカウントの作成を制限しています。';re('profile_new');return;}
  go('loading');
  var photoUrl=p.photoFile?await uploadProfilePhoto(S.user.id,p.photoFile):null;
  var freeTicket=(p.gender==='male')?1:0;
  await DB.from('profiles').upsert({user_id:S.user.id,nickname:p.nickname,age:parseInt(p.age),gender:p.gender,job:p.job,smoke:p.smoke,alcohol:p.alcohol,photo_url:photoUrl,tags:p.tags||[],real_name:p.realname.trim(),birthdate:p.birthdate,verified_level:1,email_verified:!!S._emailVerified,id_verify_status:'none',ticket_count:freeTicket,updated_at:new Date().toISOString()});
  await DB.from('user_stats').upsert({user_id:S.user.id});
  S.profile={user_id:S.user.id,nickname:p.nickname,age:parseInt(p.age),gender:p.gender,job:p.job,smoke:p.smoke,alcohol:p.alcohol,photo_url:photoUrl,tags:p.tags||[],real_name:p.realname.trim(),birthdate:p.birthdate,email_verified:!!S._emailVerified,id_verify_status:'none',ticket_count:freeTicket};
  if(p.gender==='male'){S._freeTicketGranted=true;}
  go('cardregister');
}

// ===== 顔写真撮影機能（ここから追加） =====
var _faceStream=null;
var _faceDetectTimer=null;
var _faceStableCount=0;
var _faceCaptured=false;
var _faceCountdownTimer=null;
var _faceCountdownValue=0;

async function openFaceCamera(){
  S._faceCameraError='';
  S._faceCameraStatus='searching';
  _faceStableCount=0;
  _faceCaptured=false;
  _faceCountdownValue=0;
  if(_faceCountdownTimer){clearInterval(_faceCountdownTimer);_faceCountdownTimer=null;}
  re('id_verify');
  try{
    _faceStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user'},audio:false});
  }catch(e){
    S._faceCameraError='カメラを起動できませんでした。カメラの利用を許可してください。';
    re('id_verify');
    return;
  }
  S._faceCameraOpen=true;
  re('id_verify');
  setTimeout(function(){
    var video=document.getElementById('face-camera-video');
    if(video){
      video.srcObject=_faceStream;
      video.play();
      startFaceDetectLoop(video);
    }
  },150);
}

// 枠の中央エリアを一定間隔でサンプリングし、「顔らしきもの（肌色・十分な明るさ）」が
// 安定して映っているかを簡易判定する。厳密な顔認識ではなく簡易的な近似判定。
function startFaceDetectLoop(video){
  if(_faceDetectTimer)clearInterval(_faceDetectTimer);
  var canvas=document.createElement('canvas');
  var ctx=canvas.getContext('2d',{willReadFrequently:true});
  canvas.width=60;canvas.height=80;
  _faceDetectTimer=setInterval(function(){
    if(_faceCaptured||!video||video.readyState<2)return;
    try{
      ctx.drawImage(video,video.videoWidth*0.3,video.videoHeight*0.15,video.videoWidth*0.4,video.videoHeight*0.55,0,0,60,80);
      var data=ctx.getImageData(0,0,60,80).data;
      var skinPixels=0,totalBrightness=0,count=0;
      for(var i=0;i<data.length;i+=4){
        var r=data[i],g=data[i+1],b=data[i+2];
        var brightness=(r+g+b)/3;
        totalBrightness+=brightness;
        count++;
        // ざっくりとした肌色レンジ判定
        if(r>60&&g>35&&b>20&&r>g&&r>b&&(r-g)>10&&(r-b)>10){skinPixels++;}
      }
      var avgBrightness=totalBrightness/count;
      var skinRatio=skinPixels/count;
      var looksLikeFace=avgBrightness>40&&avgBrightness<235&&skinRatio>0.18;

      if(looksLikeFace){
        _faceStableCount++;
      }else{
        _faceStableCount=0;
        // 顔が外れたらカウントダウンを中断してやり直し
        if(_faceCountdownTimer){clearInterval(_faceCountdownTimer);_faceCountdownTimer=null;}
        S._faceCameraStatus='searching';
        updateFaceCameraStatusUI();
      }

      // 目安：判定間隔150msで4回連続安定 = 約0.6秒キープしたらカウントダウン開始
      if(_faceStableCount>=4&&!_faceCaptured&&!_faceCountdownTimer){
        startFaceCountdown();
      }
    }catch(e){}
  },150);
}

// 3→2→1のカウントダウンを表示し、0になったら撮影する
function startFaceCountdown(){
  _faceCountdownValue=3;
  S._faceCameraStatus='counting';
  updateFaceCameraStatusUI();
  _faceCountdownTimer=setInterval(function(){
    _faceCountdownValue--;
    if(_faceCountdownValue<=0){
      clearInterval(_faceCountdownTimer);_faceCountdownTimer=null;
      if(_faceCaptured)return;
      _faceCaptured=true;
      S._faceCameraStatus='captured';
      updateFaceCameraStatusUI();
      setTimeout(function(){captureFacePhoto();},200);
      return;
    }
    updateFaceCameraStatusUI();
  },800);
}

// 画面全体を再描画せず、状態テキスト・カウントダウン数字・ガイド枠の色だけを直接書き換える（カメラ映像の再マウントを防ぐ）
function updateFaceCameraStatusUI(){
  var label=document.getElementById('face-status-label');
  var ring=document.getElementById('face-guide-ring');
  var countEl=document.getElementById('face-countdown-num');
  var wrap=document.getElementById('face-guide-wrap');
  if(!label||!ring)return;
  if(S._faceCameraStatus==='counting'){
    label.innerHTML='⚠️ そのまま動かないでください';
    label.style.background='rgba(224,150,40,.92)';
    ring.style.borderColor='rgba(123,224,144,.95)';
    ring.style.borderWidth='4px';
    ring.classList.add('face-ring-counting');
    if(wrap)wrap.classList.add('face-wrap-counting');
    if(countEl){countEl.textContent=_faceCountdownValue>0?_faceCountdownValue:'';countEl.style.display='flex';}
  }else if(S._faceCameraStatus==='captured'){
    label.innerHTML='✓ 撮影しました！';
    label.style.background='rgba(123,224,144,.92)';
    ring.style.borderColor='rgba(123,224,144,.95)';
    ring.style.borderWidth='4px';
    ring.classList.remove('face-ring-counting');
    if(wrap)wrap.classList.remove('face-wrap-counting');
    if(countEl)countEl.style.display='none';
  }else{
    label.innerHTML='枠の中に顔を合わせてください';
    label.style.background='rgba(0,0,0,.5)';
    ring.style.borderColor='rgba(255,255,255,.85)';
    ring.style.borderWidth='3px';
    ring.classList.remove('face-ring-counting');
    if(wrap)wrap.classList.remove('face-wrap-counting');
    if(countEl)countEl.style.display='none';
  }
}

function closeFaceCamera(){
  if(_faceDetectTimer){clearInterval(_faceDetectTimer);_faceDetectTimer=null;}
  if(_faceCountdownTimer){clearInterval(_faceCountdownTimer);_faceCountdownTimer=null;}
  if(_faceStream){
    _faceStream.getTracks().forEach(function(t){t.stop();});
    _faceStream=null;
  }
  S._faceCameraOpen=false;
  re('id_verify');
}

function captureFacePhoto(){
  var video=document.getElementById('face-camera-video');
  if(!video)return;
  if(_faceDetectTimer){clearInterval(_faceDetectTimer);_faceDetectTimer=null;}
  if(_faceCountdownTimer){clearInterval(_faceCountdownTimer);_faceCountdownTimer=null;}
  var canvas=document.createElement('canvas');
  canvas.width=video.videoWidth;
  canvas.height=video.videoHeight;
  var ctx=canvas.getContext('2d');
  ctx.drawImage(video,0,0,canvas.width,canvas.height);
  canvas.toBlob(function(blob){
    if(!blob)return;
    S._facePhotoFile=new File([blob],'face_'+Date.now()+'.jpg',{type:'image/jpeg'});
    S._facePhotoPreview=canvas.toDataURL('image/jpeg');
    closeFaceCamera();
  },'image/jpeg',0.9);
}

}

var _idVerifySubmitting=false;
async function submitIdVerify(){
  if(_idVerifySubmitting)return;
  if(!S._idPhotoFile){S.error='身分証の写真を選んでください';re('id_verify');return;}
  if(!S._facePhotoFile){S.error='顔写真も撮影してください';re('id_verify');return;}
  _idVerifySubmitting=true;
  go('loading');
  var sessionCheck=await DB.auth.getSession();
  var hasSession=!!(sessionCheck.data&&sessionCheck.data.session);
  var result=await uploadIdPhoto(S.user.id,S._idPhotoFile);
  if(!result.path){
    _idVerifySubmitting=false;
    S.error='アップロード失敗: '+(result.error||'不明')+' / ログイン状態:'+(hasSession?'あり':'なし');
    re('id_verify');
    return;
  }
  var faceResult=await uploadFacePhoto(S.user.id,S._facePhotoFile);
  if(!faceResult.path){
    _idVerifySubmitting=false;
    S.error='顔写真のアップロードに失敗しました: '+(faceResult.error||'不明');
    re('id_verify');
    return;
  }
  var path=result.path;
  var facePath=faceResult.path;
  var upd=await DB.from('profiles').update({id_photo_url:path,face_photo_url:facePath,id_verify_status:'pending'}).eq('user_id',S.user.id).select().single();
  _idVerifySubmitting=false;
  if(upd.error){S.error='保存に失敗しました: '+upd.error.message;re('id_verify');return;}
  S.profile.id_photo_url=path;
  S.profile.face_photo_url=facePath;
  S.profile.id_verify_status='pending';
  S._idPhotoFile=null;S._idPhotoPreview=null;S._facePhotoFile=null;S._facePhotoPreview=null;
  go('id_verify_pending');
  startIdVerifyPolling();
}

function startIdVerifyPolling(){
  if(S._idVerifyTimer)clearInterval(S._idVerifyTimer);
  S._idVerifyTimer=setInterval(async function(){
    if(S.screen!=='id_verify_pending'){clearInterval(S._idVerifyTimer);S._idVerifyTimer=null;return;}
    var res=await DB.from('profiles').select('id_verify_status').eq('user_id',S.user.id).single();
    if(res.data&&res.data.id_verify_status==='approved'){
      clearInterval(S._idVerifyTimer);S._idVerifyTimer=null;
      S.profile.id_verify_status='approved';
      await goAfterIdApproved();
    }else if(res.data&&res.data.id_verify_status==='rejected'){
      clearInterval(S._idVerifyTimer);S._idVerifyTimer=null;
      S.profile.id_verify_status='rejected';
      re('id_verify_pending');
    }
  },5000);
}

// ===== トップ画面「今夜のノミゴー待ち」カード =====
// 実際に募集中の異性のデータを、テキストのみ（写真・アイコンなし）で数秒おきに入れ替え表示する。
// 年齢は「20代後半」のように丸めて個人特定を防ぐ。架空データは絶対に混ぜない（0人ならカード非表示）。
function ageBand(age){
  if(!age)return '';
  var dec=Math.floor(age/10)*10;
  var half=(age%10<5)?'前半':'後半';
  return dec+'代'+half;
}
async function loadWaitFeed(){
  try{
    if(!S.user||!S.profile||!S.profile.gender){S._waitFeed=[];return;}
    var opp=S.profile.gender==='male'?'female':'male';
    // 「今募集中」だけでなく、昨日〜今日（過去48時間）に実際に募集した人まで対象を広げる。
    // 架空データは絶対に混ぜない（実データのみ）。今募集中の人を先頭に出す。
    var since=new Date(Date.now()-48*60*60*1000).toISOString();
    var regs=await DB.from('registrations').select('user_id,area_id,drink_style,purpose,gender,age,status,created_at').eq('gender',opp).in('status',['waiting','matched','completed']).gte('created_at',since).order('created_at',{ascending:false}).limit(12);
    if(!regs.data||!regs.data.length){S._waitFeed=[];return;}
    // 同じ人が複数回募集していても1回だけ表示
    var seen={},uniq=[];
    regs.data.forEach(function(r){if(!seen[r.user_id]){seen[r.user_id]=true;uniq.push(r);}});
    // 今募集中を先頭に
    uniq.sort(function(a,b){return (b.status==='waiting'?1:0)-(a.status==='waiting'?1:0);});
    uniq=uniq.slice(0,6);
    var feed=[];
    for(var i=0;i<uniq.length;i++){
      var r=uniq[i];
      var pr=await DB.from('profiles').select('job,tags').eq('user_id',r.user_id).single();
      feed.push({
        live:r.status==='waiting',
        band:ageBand(r.age),
        gender:r.gender==='male'?'男性':'女性',
        job:pr.data&&pr.data.job?pr.data.job:'',
        area:areaName(r.area_id),
        style:r.drink_style||'',
        purpose:r.purpose?purposeLabel(r.purpose):'',
        tag:pr.data&&pr.data.tags&&pr.data.tags.length?pr.data.tags[0]:''
      });
    }
    S._waitFeed=feed;
  }catch(e){S._waitFeed=[];}
}
function waitFeedItemH(f){
  var line1=[f.band,f.gender,f.job].filter(function(x){return x;}).join('・');
  var line2=[f.area,f.style].filter(function(x){return x;}).join('｜');
  if(f.tag)line2+=(line2?'｜':'')+f.tag;
  var badge=f.live
    ?'<span style="display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:800;color:#7BE090;margin-left:6px"><span style="width:5px;height:5px;border-radius:50%;background:#7BE090;display:inline-block;animation:pulse 1.5s infinite"></span>募集中</span>'
    :'<span style="font-size:10px;color:rgba(237,229,224,.45);margin-left:6px">最近の募集</span>';
  return '<div style="animation:fadeUp .4s ease both"><div style="font-size:13.5px;font-weight:800;color:var(--cream)">'+escapeHtml(line1)+badge+'</div><div style="font-size:11.5px;color:rgba(237,229,224,.7);margin-top:3px">'+escapeHtml(line2)+'</div>'+(f.purpose?'<div style="font-size:11px;color:var(--gold);font-weight:700;margin-top:3px">'+f.purpose+'</div>':'')+'</div>';
}
function startWaitFeed(){
  stopWaitFeed();
  loadWaitFeed().then(function(){
    if(S.screen==='splash'&&S._waitFeed&&S._waitFeed.length)render();
  });
  S._waitFeedIdx=0;
  S._waitFeedTimer=setInterval(function(){
    if(S.screen!=='splash'){stopWaitFeed();return;}
    if(!S._waitFeed||!S._waitFeed.length)return;
    S._waitFeedIdx=(S._waitFeedIdx+1)%S._waitFeed.length;
    var el=document.getElementById('wait-feed-body');
    if(el)el.innerHTML=waitFeedItemH(S._waitFeed[S._waitFeedIdx]);
  },4500);
  S._waitFeedReload=setInterval(function(){
    if(S.screen!=='splash'){stopWaitFeed();return;}
    loadWaitFeed();
  },60*1000);
}
function stopWaitFeed(){
  if(S._waitFeedTimer){clearInterval(S._waitFeedTimer);S._waitFeedTimer=null;}
  if(S._waitFeedReload){clearInterval(S._waitFeedReload);S._waitFeedReload=null;}
}
function waitFeedCardH(){
  if(!S._waitFeed||!S._waitFeed.length)return '';
  return '<div style="background:rgba(0,0,0,.22);border:1px solid rgba(201,160,99,.35);border-radius:12px;padding:14px 16px;margin-bottom:20px"><div style="display:flex;align-items:center;gap:6px;margin-bottom:8px"><span style="font-size:14px">🍷</span><span style="font-size:11px;font-weight:800;color:var(--gold);letter-spacing:.08em">今夜のノミゴー待ち</span></div><div id="wait-feed-body" style="min-height:44px">'+waitFeedItemH(S._waitFeed[S._waitFeedIdx||0])+'</div></div>';
}

async function doRegister(){
  go('loading');
  var timeoutFlag={hit:false};
  var timeoutId=setTimeout(function(){
    timeoutFlag.hit=true;
    _isSubmitting=false;
    S.error='通信に時間がかかっています。もう一度お試しください。';
    re('recruit');
  },10000);
  try{
    var existing=await DB.from('registrations').select('id').eq('user_id',S.user.id).eq('status','waiting').single();
    if(timeoutFlag.hit)return;
    if(existing.data){clearTimeout(timeoutId);_isSubmitting=false;S.registration=existing.data;startPolling();go('waiting');return;}
    var ins=await DB.from('registrations').insert({
      user_id:S.user.id,
      area_id:S.form.area,
      slot:S.form.slot,
      mode:S.form.mode||'1v1',
      gender:S.profile.gender,
      drink_style:S.form.drink_style,
      purpose:S.form.purpose||null,
      ok_nodrink:!!S.form.ok_nodrink,
      timing:'どちらでもOK',
      duration_pref:S.form.slot==='今すぐ'?(S.form.duration_pref||null):null,
      age_any:!!S.form.age_any,
      age_min:S.form.age_any?null:parseInt(S.form.age_min),
      age_max:S.form.age_any?null:parseInt(S.form.age_max),
      age:S.profile.age,
      smoke:S.profile.smoke,
      alcohol:S.profile.alcohol,
      partner_age:S.form.mode==='2v2'&&S.form.partner_age?parseInt(S.form.partner_age):null,
      payment_intent_id:S.chargeId||null,
      status:'waiting'
    }).select().single();
    if(timeoutFlag.hit)return;
    if(ins.error){clearTimeout(timeoutId);_isSubmitting=false;S.error='登録エラー: '+ins.error.message;re('recruit');return;}
    clearTimeout(timeoutId);
    S.registration=ins.data;
    var matched=await tryMatch();
    if(matched==='choice'){_isSubmitting=false;return;}
    if(matched===true){go('matched');}else{startPolling();go('waiting');}
  }catch(e){clearTimeout(timeoutId);if(!timeoutFlag.hit){_isSubmitting=false;S.error='登録に失敗しました: '+e.message;re('recruit');}}
}

// ===== 飲みスタイルの相性判定 =====
// 同じスタイル同士はOK。片方が「ご飯メイン」でも、相手が「ご飯メインの人とでもOK」なら成立する
function drinkCompat(myStyle,myOk,theirStyle,theirOk){
  if(myStyle===theirStyle)return true;
  if(myStyle==='ご飯メイン'&&theirOk)return true;
  if(theirStyle==='ご飯メイン'&&myOk)return true;
  return false;
}

// 候補の優先度スコア：目的一致 > 年齢の近さ
function candidateScore(c){
  var score=0;
  if(S.form.purpose&&c.purpose&&c.purpose===S.form.purpose)score+=100;
  var myAge=S.profile&&S.profile.age?S.profile.age:25;
  score-=Math.abs((c.age||myAge)-myAge);
  return score;
}

async function tryMatch(){
  if(!S.registration){dbgLog('S0: registration=null');return false;}
  var p=S.profile;

  // マッチの実行は女性側の端末のみが行う（女性が候補を確認・選択する設計のため）。
  // 男性側は startPolling で自分の状態が matched になるのを待つだけ。
  if(p.gender!=='female')return false;

  var candidates=await DB.from('registrations').select('*').eq('status','waiting').eq('area_id',S.form.area).eq('mode',S.registration.mode||'1v1').neq('gender',p.gender).neq('user_id',S.user.id);
  if(!candidates.data||candidates.data.length===0){return false;}

  var filtered=candidates.data.filter(function(c){
    if(!drinkCompat(S.form.drink_style,S.form.ok_nodrink,c.drink_style,c.ok_nodrink))return false;
    var iWantThem=ageMatches(S.form.age_any,S.form.age_min?parseInt(S.form.age_min):null,S.form.age_max?parseInt(S.form.age_max):null,c.age);
    var theyWantMe=ageMatches(c.age_any,c.age_min,c.age_max,p.age);
    return iWantThem&&theyWantMe;
  });
  if(filtered.length===0){return false;}

  // 目的一致・年齢の近さで並べ替え
  filtered.sort(function(a,b){return candidateScore(b)-candidateScore(a);});

  if(!S.form.slot){return false;}

  // ----- 候補が1人：そのまま自動成立 -----
  if(filtered.length===1){
    var only=filtered[0];
    var lock1=await DB.from('registrations').update({status:'processing'}).eq('id',only.id).eq('status','waiting').select().single();
    if(lock1.error||!lock1.data)return false;
    return await finalizeMatchWith(only,null);
  }

  // ----- 候補が2人以上：上位2人を確保して2択画面へ -----
  var c1=filtered[0],c2=filtered[1];
  var lockA=await DB.from('registrations').update({status:'processing'}).eq('id',c1.id).eq('status','waiting').select().single();
  if(lockA.error||!lockA.data){return false;}
  var lockB=await DB.from('registrations').update({status:'processing'}).eq('id',c2.id).eq('status','waiting').select().single();
  if(lockB.error||!lockB.data){
    // 2人目を確保できなかったら1人目とそのまま成立
    return await finalizeMatchWith(c1,null);
  }
  var pr1=await DB.from('profiles').select('*').eq('user_id',c1.user_id).single();
  var pr2=await DB.from('profiles').select('*').eq('user_id',c2.user_id).single();
  c1.profileData=pr1.data||{};
  c2.profileData=pr2.data||{};
  S._choice={cands:[c1,c2],deadline:Date.now()+90*1000,submitting:false};
  if(S.pollTimer){clearInterval(S.pollTimer);S.pollTimer=null;}
  go('choose');
  startChoiceCountdown();
  return 'choice';
}

// ===== マッチ確定処理（選ばれた相手と成立させ、選ばれなかった相手は募集中に戻す）=====
async function finalizeMatchWith(bestReg,otherReg){
  var p=S.profile;
  var prof=bestReg.profileData?{data:bestReg.profileData}:await DB.from('profiles').select('*').eq('user_id',bestReg.user_id).single();
  bestReg.profileData=prof.data||{};

  var matchRes=await DB.from('matches').insert({
    area_id:S.form.area,
    slot:S.form.slot,
    mode:'1v1',
    timing:S.form.timing,
    status:'confirmed'
  }).select().single();
  if(matchRes.error){
    await DB.from('registrations').update({status:'waiting'}).eq('id',bestReg.id).eq('status','processing');
    if(otherReg)await DB.from('registrations').update({status:'waiting'}).eq('id',otherReg.id).eq('status','processing');
    return false;
  }
  S.match=matchRes.data;

  var u1=await DB.from('registrations').update({status:'matched',match_id:matchRes.data.id}).eq('id',S.registration.id);
  var u2=await DB.from('registrations').update({status:'matched',match_id:matchRes.data.id}).eq('id',bestReg.id);
  // 選ばれなかった候補は募集中に戻す（本人には何も通知されない）
  if(otherReg)await DB.from('registrations').update({status:'waiting'}).eq('id',otherReg.id).eq('status','processing');
  if(u1.error||u2.error)return false;

  S.registration.status='matched';
  S.registration.match_id=matchRes.data.id;

  var maleUserId=(p.gender==='male')?S.user.id:bestReg.user_id;
  await consumeTicket(matchRes.data.id,maleUserId);
  await syncUserState();
  await loadMatchMembers();
  sendMatchLineNotify(p,bestReg.profileData);
  render();
  return true;
}

function startChoiceCountdown(){
  if(S._choiceTimer)clearInterval(S._choiceTimer);
  S._choiceTimer=setInterval(function(){
    if(!S._choice){clearInterval(S._choiceTimer);S._choiceTimer=null;return;}
    var remain=Math.max(0,Math.ceil((S._choice.deadline-Date.now())/1000));
    var el=document.getElementById('choice-timer');
    if(el)el.textContent=remain+'秒';
    if(remain<=0){
      clearInterval(S._choiceTimer);S._choiceTimer=null;
      // 時間切れ：条件一致度が高い方（1人目）と自動成立
      submitChoice(0,true);
    }
  },500);
}

async function submitChoice(idx,isAuto){
  if(!S._choice||S._choice.submitting)return;
  S._choice.submitting=true;
  if(S._choiceTimer){clearInterval(S._choiceTimer);S._choiceTimer=null;}
  var chosen=S._choice.cands[idx];
  var other=S._choice.cands[idx===0?1:0];
  go('loading');
  var ok=await finalizeMatchWith(chosen,other);
  S._choice=null;
  if(ok){go('matched');}
  else{
    // 成立に失敗したら募集中に戻る
    startPolling();
    go('waiting');
  }
}

async function consumeTicket(matchId,targetUserId){
  dbgLog('T0: consumeTicket呼び出し matchId='+matchId.slice(0,8));
  var lockRes=await DB.from('matches').update({ticket_consumed:true}).eq('id',matchId).eq('ticket_consumed',false).select().single();
  dbgLog('T1: lockRes err='+(lockRes.error?lockRes.error.message:'なし')+' data='+(lockRes.data?JSON.stringify(lockRes.data).slice(0,80):'null'));
  if(lockRes.error||!lockRes.data){
    dbgLog('T1x: 消費済みor対象なしのため中断');
    return;
  }
  var current=await DB.from('profiles').select('ticket_count').eq('user_id',targetUserId).single();
  dbgLog('T2: current err='+(current.error?current.error.message:'なし')+' ticket_count='+(current.data?current.data.ticket_count:'null'));
  var oldCount=current.data&&current.data.ticket_count?current.data.ticket_count:0;
  var newCount=oldCount-1;
  if(newCount<0)newCount=0;
  var upd=await DB.from('profiles').update({ticket_count:newCount}).eq('user_id',targetUserId).eq('ticket_count',oldCount).select().single();
  dbgLog('T3: upd err='+(upd.error?upd.error.message:'なし')+' newCount='+(upd.data?upd.data.ticket_count:'null'));
  if(upd.error||!upd.data){
    dbgLog('T3x: DB更新失敗');
  }
}

function startPolling(){
  if(S.pollTimer)clearInterval(S.pollTimer);
  dbgLog('polling開始 reg='+(S.registration?S.registration.id.slice(0,8):'null'));
  S._procSince=null;
  S.pollTimer=setInterval(async function(){
    try{
      if(S.registration){
        var reg=await DB.from('registrations').select('status,match_id').eq('id',S.registration.id).single();
        // 相手（女性）の選択待ちで自分が processing のまま長時間経過した場合の自己復旧
        // （女性側のアプリが途中で閉じられた等の保険。4分で自動的に募集中へ戻す）
        if(reg.data&&reg.data.status==='processing'){
          if(!S._procSince)S._procSince=Date.now();
          if(Date.now()-S._procSince>4*60*1000){
            await DB.from('registrations').update({status:'waiting'}).eq('id',S.registration.id).eq('status','processing');
            S._procSince=null;
          }
        }else{S._procSince=null;}
        if(reg.data&&reg.data.status==='matched'&&reg.data.match_id){
          clearInterval(S.pollTimer);
          var m=await DB.from('matches').select('*').eq('id',reg.data.match_id).single();
          if(m.data){
            S.registration.status='matched';
            S.registration.match_id=reg.data.match_id;
            S.match=m.data;await loadMatchMembers();_isSubmitting=false;go('matched');return;
          }
        }
      }
      var matched=await tryMatch();
      if(matched==='choice'){_isSubmitting=false;return;}
      if(matched===true){clearInterval(S.pollTimer);_isSubmitting=false;go('matched');}
      loadStats();
    }catch(e){}
  },8000);
}

}

async function setMatchResultOnce(matchId,newStatus,extraFields){
  if(!matchId)return false;
  var updateData=Object.assign({status:newStatus},extraFields||{});
  var res=await DB.from('matches').update(updateData).eq('id',matchId).eq('status','confirmed').select().single();
  if(res.error||!res.data){
    return false;
  }
  return true;
}

async function saveUserResult(matchId,userResult){
  if(!matchId||!S.user)return;
  var cur=await DB.from('matches').select('*').eq('id',matchId).single();
  if(cur.error||!cur.data)return;
  var m=cur.data;
  var updateData={};
  var otherResult=null;

  if(!m.result_a_user_id){
    updateData.result_a=userResult;
    updateData.result_a_user_id=S.user.id;
    otherResult=null;
  }else if(m.result_a_user_id===S.user.id){
    return;
  }else if(!m.result_b_user_id){
    updateData.result_b=userResult;
    updateData.result_b_user_id=S.user.id;
    otherResult=m.result_a;
  }else if(m.result_b_user_id===S.user.id){
    return;
  }else{
    return;
  }

  if(otherResult){
    var myResult=userResult;
    var theirResult=otherResult;
    if(myResult==='completed'&&theirResult==='completed'){
      updateData.verdict='normal';
    }else if(myResult==='cancelled'&&theirResult==='cancelled'){
      updateData.verdict='both_cancelled';
    }else{
      updateData.verdict='needs_review';
    }
  }

  if(Object.keys(updateData).length>0){
    await DB.from('matches').update(updateData).eq('id',matchId);
  }
}

async function cancelAfterMatch(){

  S.registration=null;S.match=null;S.chargeId=null;_isSubmitting=false;
  S.form={area:null,slot:null,drink_style:null,purpose:null,ok_nodrink:false,timing:null,age_min:null,age_max:null,age_any:false};
  go('splash');
}

// ===== 飲み終わりリマインド =====
// マッチから3時間経っても「飲み終わった」アクションが無い人に、アプリ内バナーとLINEで通知
var REMIND_AFTER_MS=3*60*60*1000;
function shouldRemindFinish(){
  if(!S.match||!S.registration)return false;
  if(S.registration.status!=='matched')return false;
  if(S.match.status!=='confirmed')return false;
  if(!S.match.created_at)return false;
  return (Date.now()-new Date(S.match.created_at).getTime())>=REMIND_AFTER_MS;
}
function finishReminderBanner(){
  if(!shouldRemindFinish())return '';
  return '<div style="margin:0 20px 12px;padding:14px 16px;background:var(--gold-bg);border:1.5px solid rgba(201,160,99,.5);border-radius:12px">'
    +'<div style="font-size:13px;font-weight:800;color:var(--gold-bright);margin-bottom:6px">飲み会は終わりましたか？</div>'
    +'<div style="font-size:12px;color:var(--muted);line-height:1.7;margin-bottom:10px">「飲み終わった」を押して評価すると、次の募集ができるようになります。</div>'
    +'<button class="btn btn-wine" style="padding:11px;font-size:13px" onclick="go(\'review\')">飲み終わった →</button></div>';
}
// LINE通知は1マッチにつき1回だけ。reminder_sent を排他更新して二重送信を防ぐ
async function sendFinishReminderOnce(){
  if(!shouldRemindFinish())return;
  var lock=await DB.from('matches').update({reminder_sent:true}).eq('id',S.match.id).eq('reminder_sent',false).select().single();
  if(lock.error||!lock.data)return;
  S.match.reminder_sent=true;
  for(var i=0;i<S.matchMembers.length;i++){
    var pr=S.matchMembers[i].profiles;
    if(pr&&pr.line_user_id){
      fetch('/api/line-notify',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({lineUserId:pr.line_user_id,message:'🍺 今夜の飲み会はいかがでしたか？\nNomi Goを開いて「飲み終わった」から評価をお願いします。'})}).catch(function(){});
    }
  }
}
function startFinishReminderTimer(){
  if(S._remindTimer)clearInterval(S._remindTimer);
  S._remindTimer=setInterval(function(){
    if(!S.match||!S.registration||S.registration.status!=='matched'){
      clearInterval(S._remindTimer);S._remindTimer=null;return;
    }
    if(shouldRemindFinish()){
      sendFinishReminderOnce();
      if(S.screen==='matched'||S.screen==='chat'||S.screen==='splash')render();
    }
  },60*1000);
}

async function loadMatchMembers(){

  if(!r.data)return;

    r.data[i].profiles=prof.data||{};
  }
  S.matchMembers=r.data;
  await syncReportStatus();
  startFinishReminderTimer();
}

function applyMessages(data){
  var sys=[{type:'system',id:'sys-0',content:'マッチング成立！チャットが作成されました'}];
  if(S.match.ticket_consumed&&S.profile&&S.profile.gender==='male'){
    sys.push({type:'system',id:'sys-1',content:'🎫 チケットを1枚使用しました'});
  }
  var msgs=data.map(function(m){
    var nick='?';
    if(m.user_id===S.user.id&&S.profile){nick=S.profile.nickname;}
    else{var mm=S.matchMembers.find(function(x){return x.user_id===m.user_id;});if(mm&&mm.profiles)nick=mm.profiles.nickname||'?';}
    return {id:m.id,user_id:m.user_id,content:m.content,mine:m.user_id===S.user.id,nickname:nick};
  });
  var newMsgs=sys.concat(msgs);
  var currentIds=S.chatMsgs.map(function(m){return m.id;}).join(',');
  var newIds=newMsgs.map(function(m){return m.id;}).join(',');
  if(currentIds!==newIds){
    S.chatMsgs=newMsgs;
    if(S.screen==='chat'){
      render();
      setTimeout(function(){var el=document.querySelector('.chat-msgs');if(el)el.scrollTop=el.scrollHeight;},50);
    }
  }
}

var _reviewSubmitting=false;

function setReviewStars(n){
  var wasLow=S.reviewStars>0&&S.reviewStars<=2;
  var isLow=n<=2;
  if(wasLow!==isLow){
    S.reviewChecks=REVIEW_TAGS.map(function(){return false;});
    S.reviewOtherText='';
  }
  S.reviewStars=n;
  re('review');
}

function confirmSubmitReview(){
  if(_reviewSubmitting)return;
  if(!S.match||S.reviewStars===0)return;
  var anyTagSelected=S.reviewChecks.some(function(c){return c;});
  if(!anyTagSelected){alert('評価タグを1つ以上選んでください');return;}
  var isLowNow=S.reviewStars>0&&S.reviewStars<=2;
  var checksNow=isLowNow?REVIEW_TAGS_LOW:REVIEW_TAGS;
  var otherIdxNow=checksNow.length-1;
  if(S.reviewChecks[otherIdxNow]&&(!S.reviewOtherText||!S.reviewOtherText.trim())){
    alert('「その他」を選んだ場合は内容を入力してください');
    return;
  }
  if(!confirm('評価を送信しますか？\nこの操作は送信後に変更できません。'))return;
  _reviewSubmitting=true;
  re('review');
  submitReview().catch(function(){}).finally(function(){_reviewSubmitting=false;});
}

async function submitReview(){
  if(!S.match||S.reviewStars===0)return;
  var matchId=S.match.id;
  var targets=S.matchMembers.filter(function(m){return m.user_id!==S.user.id;});
  for(var i=0;i<targets.length;i++){
    var tagSource=(S.reviewStars>0&&S.reviewStars<=2)?REVIEW_TAGS_LOW:REVIEW_TAGS;
    var otherIdxSubmit=tagSource.length-1;
    var selectedTags=S.reviewChecks.map(function(checked,idx){
      if(!checked)return null;
      if(idx===otherIdxSubmit&&S.reviewOtherText&&S.reviewOtherText.trim()){
        return S.reviewOtherText.trim();
      }
      return tagSource[idx];
    }).filter(function(t){return t!==null;});
    var isLowNow2=S.reviewStars>0&&S.reviewStars<=2;
    var legacyPunctual=isLowNow2?false:S.reviewChecks[0];
    var legacyFriendly=isLowNow2?false:S.reviewChecks[1];
    var legacyAgain=isLowNow2?false:S.reviewChecks[2];
    await DB.from('reviews').insert({match_id:matchId,reviewer_id:S.user.id,reviewee_id:targets[i].user_id,stars:S.reviewStars,tag_punctual:legacyPunctual,tag_friendly:legacyFriendly,tag_again:legacyAgain,review_tags:selectedTags});
  }
  await setMatchResultOnce(matchId,'completed',{completed_at:new Date().toISOString()});
  await saveUserResult(matchId,'completed');
  if(S.registration)await DB.from('registrations').update({status:'completed'}).eq('id',S.registration.id);
  S.registration=null;S.match=null;S.matchMembers=[];S.form={area:null,slot:null,drink_style:null,purpose:null,ok_nodrink:false,timing:null,age_min:null,age_max:null,age_any:false};_isSubmitting=false;
  S.reviewStars=0;S.reviewChecks=[false,false,false];S.reviewOtherText='';S.chatMsgs=[];S.chargeId=null;go('splash');
}

async function syncReportStatus(){

    S._hasReported=!!(rep.data&&rep.data.length>0);
  }catch(e){S._hasReported=false;}

async function submitReport(){

async function goEmailVerify(){
  var code=String(Math.floor(100000+Math.random()*900000));
  await DB.from('email_verifications').delete().eq('user_id',S.user.id);
  await DB.from('email_verifications').insert({user_id:S.user.id,code:code});
  var emailTo=S.user.email;
  fetch('/api/send-email',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({to:emailTo,subject:'【Nomi Go】確認コード',message:'確認コードは '+code+' です。アプリに入力してください。'})}).catch(function(){});
  go('email_verify');
}

async function submitEmailVerify(){
  var inp=document.getElementById('everify-inp');
  var errEl=document.getElementById('everify-err');
  var code=inp?inp.value.trim():'';
  if(!code){if(errEl)errEl.textContent='コードを入力してください';return;}
  var res=await DB.from('email_verifications').select('code').eq('user_id',S.user.id);
  var savedCode=res.data&&res.data.length>0?res.data[0].code:null;
  if(savedCode&&savedCode===code){
    await DB.from('email_verifications').delete().eq('user_id',S.user.id);
    S._emailVerified=true;
    if(S.profile){
      await DB.from('profiles').update({email_verified:true}).eq('user_id',S.user.id);
      S.profile.email_verified=true;
      go('splash');
    }else{
      S.pf={nickname:'',age:'',gender:null,job:null,smoke:null,alcohol:null};
      go('profile_new');
    }
  }else{
    if(errEl)errEl.textContent='コードが違います';
  }
}

function startLineLinkPolling(){
  if(S._lineLinkTimer)clearInterval(S._lineLinkTimer);
  S._lineLinkTimer=setInterval(async function(){
    if(S.screen!=='line_connect'){clearInterval(S._lineLinkTimer);S._lineLinkTimer=null;return;}
    var res=await DB.from('profiles').select('line_user_id').eq('user_id',S.user.id).single();
    if(res.data&&res.data.line_user_id){
      clearInterval(S._lineLinkTimer);S._lineLinkTimer=null;
      if(S.profile)S.profile.line_user_id=res.data.line_user_id;

async function saveProfileEdit(){
  var p=S.pf;
  if(!p.nickname||!p.age||!p.gender||!p.job||p.smoke===null||p.alcohol===null){S.error='すべての項目を入力してください';re('profile_edit');return;}
  if(parseInt(p.age)<20){S.error='Nomi Goは20歳以上の方がご利用いただけます';re('profile_edit');return;}
  if(p.gender==='male'&&!p.photoFile&&!(S.profile&&S.profile.photo_url)){S.error='男性はご本人の顔写真の登録が必須です';re('profile_edit');return;}
  go('loading');
  var photoUrl=S.profile.photo_url;
  if(p.photoFile){
    var uploaded=await uploadProfilePhoto(S.user.id,p.photoFile);
    if(uploaded)photoUrl=uploaded;
  }
  var upd=await DB.from('profiles').update({nickname:p.nickname,age:parseInt(p.age),gender:p.gender,job:p.job,smoke:p.smoke,alcohol:p.alcohol,photo_url:photoUrl,tags:p.tags||[],updated_at:new Date().toISOString()}).eq('user_id',S.user.id);
  if(upd.error){S.error='保存に失敗しました: '+upd.error.message;re('profile_edit');return;}
  S.profile.nickname=p.nickname;S.profile.age=parseInt(p.age);S.profile.gender=p.gender;S.profile.job=p.job;S.profile.smoke=p.smoke;S.profile.alcohol=p.alcohol;S.profile.photo_url=photoUrl;S.profile.tags=p.tags||[];
  go('splash');
}

async function goSplashFromMatched(){
  if(S.match&&S.matchMembers.length===0){
    await loadMatchMembers();
  }
  await syncReportStatus();
  var savedMatch=S.match;
  var savedReg=S.registration;
  var savedMembers=S.matchMembers.slice();
  go('splash');
  if(savedMatch&&savedReg&&savedReg.status==='matched'){
    S.match=savedMatch;
    S.registration=savedReg;
    S.matchMembers=savedMembers;
    render();
  }
}

function reviewH(){

    var gid='starGrad'+n,sid='starShadow'+n;
    var svg='<svg width="42" height="42" viewBox="0 0 24 24"><defs><linearGradient id="'+gid+'" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FFE9B0"/><stop offset="55%" stop-color="var(--gold)"/><stop offset="100%" stop-color="#A9701E"/></linearGradient><filter id="'+sid+'" x="-50%" y="-50%" width="200%" height="200%"><feDropShadow dx="0" dy="2" stdDeviation="1.4" flood-color="#000" flood-opacity="0.65"/></filter></defs><path d="M12 2l2.9 6.6 7.1.6-5.4 4.7 1.6 7-6.2-3.8-6.2 3.8 1.6-7L2 9.2l7.1-.6z" fill="'+(n<=S.reviewStars?'url(#'+gid+')':'transparent')+'" stroke="var(--gold)" stroke-width="1.5" filter="url(#'+sid+')"/></svg>';
    return '<button class="star-btn" onclick="setReviewStars('+n+')">'+svg+'</button>';
  }).join('');
  var checksHtml=checks.map(function(c,i){return '<button class="tag-chip '+(S.reviewChecks[i]?'on':'')+'" onclick="S.reviewChecks['+i+']=!S.reviewChecks['+i+'];re(\'review\')">'+c+'</button>';}).join('');

  var checksSection=S.reviewStars>0?'<div style="padding:16px 20px;display:flex;flex-wrap:wrap;gap:8px">'+checksHtml+'</div>'+otherInput:'';

function updateRecruitSubmitBtn(){
  var btn=document.getElementById('recruit-submit-btn');

function updateReviewSubmitBtn(){
  var btn=document.getElementById('review-submit-btn');
  if(!btn)return;
  var isLow=S.reviewStars>0&&S.reviewStars<=2;
  var checks=isLow?REVIEW_TAGS_LOW:REVIEW_TAGS;
  var otherIdx=checks.length-1;
  var anyTagSelected=S.reviewChecks.some(function(c){return c;});
  var otherOk=!S.reviewChecks[otherIdx]||(S.reviewOtherText&&S.reviewOtherText.trim().length>0);
  var canSubmit=S.reviewStars>0&&anyTagSelected&&otherOk&&!_reviewSubmitting;
  btn.disabled=!canSubmit;
}

function findFaqAnswer(text){
  for(var i=0;i<FAQ_QA.length;i++){
    var kws=FAQ_QA[i].keywords;
    for(var j=0;j<kws.length;j++){
      if(text.indexOf(kws[j])!==-1)return FAQ_QA[i].answer;
    }
  }
  return null;
}

function sendFaqMsg(){
  var inp=document.getElementById('faq-input');
  var txt=inp?inp.value.trim():'';
  if(!txt)return;
  inp.value='';
  S.faqMsgs.push({type:'user',content:txt});
  var answer=findFaqAnswer(txt);
  if(answer){
    S.faqMsgs.push({type:'bot',content:answer});
  }else{
    S.faqMsgs.push({type:'bot',content:'申し訳ありません、うまくお答えできませんでした。',showInquiryBtn:true});
    DB.from('faq_misses').insert({user_id:S.user?S.user.id:null,question:txt}).then(function(){}).catch(function(){});
  }
  re('faqbot');
  setTimeout(function(){var el=document.querySelector('.chat-msgs');if(el)el.scrollTop=el.scrollHeight;},50);
}

function tapFaqQuestion(label,answer){
  S.faqMsgs.push({type:'user',content:label});
  S.faqMsgs.push({type:'bot',content:answer});
  re('faqbot');
  setTimeout(function(){var el=document.querySelector('.chat-msgs');if(el)el.scrollTop=el.scrollHeight;},50);
}

function faqBotH(){
  var msgsHtml=(S.faqMsgs||[]).map(function(m){
    var isBot=m.type==='bot';
    var inquiryBtn=m.showInquiryBtn?'<button style="margin-top:8px;padding:8px 14px;border-radius:20px;border:1.5px solid var(--wine);background:transparent;color:var(--wine);font-family:inherit;font-size:12px;font-weight:700;cursor:pointer" onclick="go(\'inquiry\')">お問い合わせはこちら →</button>':'';
    return '<div class="msg-row '+(isBot?'':'mine')+'">'+(isBot?'<div class="msg-av" style="background:var(--wine-bg);color:var(--wine)">🤖</div>':'')+'<div><div class="msg-bubble" style="background:'+(isBot?'var(--card)':'var(--wine)')+';color:'+(isBot?'var(--cream)':'#fff')+'">'+escapeHtml(m.content)+'</div>'+inquiryBtn+'</div></div>';
  }).join('');
  var quickList=[
    {label:'料金はいくら?',ans:FAQ_QA[0].answer},
    {label:'キャンセルしたら?',ans:FAQ_QA[2].answer},
    {label:'2対2ってどういうこと?',ans:FAQ_QA[6].answer},
    {label:'対応エリアは?',ans:FAQ_QA[4].answer},
    {label:'退会したい',ans:FAQ_QA[10].answer},
    {label:'安全性が心配',ans:FAQ_QA[16].answer}
  ];
  var quickHtml='<div style="display:flex;flex-wrap:wrap;gap:8px;padding:12px 16px;border-bottom:1px solid var(--border2)">'+quickList.map(function(q){return '<button class="tag-chip" onclick="tapFaqQuestion(\''+q.label+'\',\''+q.ans.replace(/'/g,"\\'")+'\')" style="font-size:12px">'+q.label+'</button>';}).join('')+'</div>';
  return '<div class="screen" style="overflow:hidden"><div class="hdr"><button class="hdr-back" onclick="go(\'splash\')">← 戻る</button><div class="hdr-info"><div class="hdr-step">サポート</div><div class="hdr-title">よくある質問</div></div></div>'+quickHtml+'<div class="chat-wrap"><div class="chat-msgs" id="faqmsgs">'+msgsHtml+'</div><div class="chat-input"><input class="chat-inp" id="faq-input" type="text" placeholder="質問を入力..." onkeydown="if(event.key===\'Enter\')sendFaqMsg()"><button class="chat-send" onclick="sendFaqMsg()">↑</button></div></div></div>';
}

function inquiryH(){
  if(S._inquiryDone){
    return '<div class="screen"><div class="hdr"><button class="hdr-back" onclick="S._inquiryDone=false;go(\'splash\')">← 戻る</button><div class="hdr-info"><div class="hdr-title">お問い合わせ</div></div></div><div class="body" style="padding:40px 24px;text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px"><div style="font-size:40px">✅</div><div style="font-size:16px;font-weight:800;color:var(--cream)">送信が完了しました。</div><div style="font-size:13px;color:var(--muted);line-height:1.7">お問い合わせありがとうございます。<br>内容を確認のうえ、対応いたします。</div></div><div class="ftr"><button class="btn btn-wine" onclick="S._inquiryDone=false;go(\'splash\')">トップに戻る</button></div></div>';
  }
  return '<div class="screen"><div class="hdr"><button class="hdr-back" onclick="go(\'splash\')">← 戻る</button><div class="hdr-info"><div class="hdr-step">お問い合わせ</div><div class="hdr-title">運営へ連絡する</div></div></div><div class="body" style="padding:24px;display:flex;flex-direction:column;gap:14px"><div class="sec-label" style="padding:0 0 8px">お名前（任意）</div><input id="inquiry-name" class="inp" type="text" placeholder="例：山田太郎"><div class="sec-label" style="padding:0 0 8px">メールアドレス（必須）</div><input id="inquiry-email" class="inp" type="email" placeholder="例：sample@mail.com"><div class="sec-label" style="padding:0 0 8px">お問い合わせ内容</div><textarea id="inquiry-content" class="inp" style="height:160px;resize:none" placeholder="ご質問・ご要望・お困りのことをご記入ください"></textarea><div id="inquiry-err" class="err-msg"></div></div><div class="ftr"><button class="btn btn-wine" id="inquiry-btn" onclick="submitInquiry()">送信する</button></div></div>';
}

document.addEventListener('visibilitychange',function(){
  if(document.hidden){sessionStorage.setItem('ngo_last_active',String(Date.now()));}
});
window.addEventListener('pagehide',function(){
  sessionStorage.setItem('ngo_last_active',String(Date.now()));
});

// ===== 背景に上品な泡を漂わせる（LPと同じ演出） =====
(function(){
  if(window.matchMedia('(prefers-reduced-motion: reduce)').matches)return;
  var layer=document.createElement('div');
  layer.id='ngo-fx';
  document.body.appendChild(layer);
  for(var i=0;i<7;i++){
    var b=document.createElement('div');
    b.className='ngo-bubble';
    var size=4+Math.random()*9;
    b.style.width=size+'px';b.style.height=size+'px';
    b.style.left=(5+Math.random()*90)+'%';
    b.style.animationDuration=(10+Math.random()*10)+'s';
    b.style.animationDelay=(Math.random()*10)+'s';
    layer.appendChild(b);
  }
})();

// ===== マッチ成立の瞬間に乾杯エフェクトを一度だけ出す =====
var _lastScreenForFx='';
var _origRender=render;
render=function(){
  _origRender();
  if(S.screen==='matched'&&_lastScreenForFx!=='matched'&&_lastScreenForFx!=='chat'&&_lastScreenForFx!=='review'&&_lastScreenForFx!=='report'){
    showCheersFx();
  }
  _lastScreenForFx=S.screen;
};
function showCheersFx(){
  if(window.matchMedia('(prefers-reduced-motion: reduce)').matches)return;
  var wrap=document.createElement('div');
  wrap.className='cheers-burst';
  var html='<div class="glass">\ud83e\udd42</div>';
  for(var i=0;i<10;i++){
    var ang=(Math.PI*2/10)*i;
    var dist=70+Math.random()*60;
    html+='<div class="spark" style="--dx:'+Math.round(Math.cos(ang)*dist)+'px;--dy:'+Math.round(Math.sin(ang)*dist)+'px"></div>';
  }
  wrap.innerHTML=html;
  document.body.appendChild(wrap);
  setTimeout(function(){if(wrap.parentNode)wrap.parentNode.removeChild(wrap);},1500);
}

init();
setInterval(loadStats,30000);

</script>
